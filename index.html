<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Financeiro | F.I.R.E & Portfólio</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 { text-align: center; margin-bottom: 30px; }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background-color: var(--card-bg);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }
        .card h2 { margin-top: 0; color: var(--accent); border-bottom: 2px solid #334155; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-size: 0.9em; color: #cbd5e1; }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: 1px solid #475569;
            background: #334155;
            color: white;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 12px;
            margin-top: 20px;
            background-color: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: background 0.3s;
        }
        button:hover { background-color: var(--accent-hover); }
        .result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(16, 185, 129, 0.1);
            border-left: 4px solid var(--success);
            border-radius: 4px;
            font-weight: bold;
        }
        canvas { margin-top: 20px; max-height: 250px; }
    </style>
</head>
<body>

    <h1>🚀 O Meu Dashboard Financeiro</h1>

    <div class="grid-container">
        
        <div class="card">
            <h2>📈 Juros Compostos</h2>
            <label>Capital Inicial (€)</label>
            <input type="number" id="jc-inicial" value="1000">
            
            <label>Reforço Mensal (€)</label>
            <input type="number" id="jc-mensal" value="100">
            
            <label>Taxa de Juro Anual (%)</label>
            <input type="number" id="jc-taxa" value="8">
            
            <label>Prazo de Investimento (Anos)</label>
            <input type="number" id="jc-anos" value="10">
            
            <button onclick="calcularJuros()">Calcular Crescimento</button>
            <div id="jc-resultado" class="result" style="display:none;"></div>
            <canvas id="jcChart"></canvas>
        </div>

        <div class="card">
            <h2>🔥 Calculadora F.I.R.E.</h2>
            <label>Idade Atual</label>
            <input type="number" id="fire-idade" value="14">
            
            <label>Despesas Anuais Estimadas (€)</label>
            <input type="number" id="fire-despesas" value="15000">
            
            <label>Património Atual (€)</label>
            <input type="number" id="fire-patrimonio" value="0">
            
            <button onclick="calcularFIRE()">Calcular Meta F.I.R.E</button>
            <div id="fire-resultado" class="result" style="display:none;"></div>
            <p style="font-size: 0.8em; color: #94a3b8; margin-top: 10px;">*Baseado na Regra dos 4% (Taxa de Retirada Segura).</p>
        </div>

        <div class="card">
            <h2>pie_chart Simulador de Portfólio</h2>
            <p style="font-size: 0.8em; color: #cbd5e1;">Define a tua alocação ideal (em %):</p>
            
            <label>Ações a Longo Prazo / ETFs (%)</label>
            <input type="number" id="port-acoes" value="60" oninput="atualizarPortfolio()">
            
            <label>Ativos Estáveis (Manter 2 a 3 anos) (%)</label>
            <input type="number" id="port-curto" value="30" oninput="atualizarPortfolio()">
            
            <label>Criptomoedas / Alto Risco (%)</label>
            <input type="number" id="port-cripto" value="10" oninput="atualizarPortfolio()">
            
            <canvas id="portfolioChart"></canvas>
        </div>

    </div>

    <script>
        // Variáveis globais para os gráficos para podermos destruí-los ao atualizar
        let jcChartInstance = null;
        let portChartInstance = null;

        // --- LÓGICA JUROS COMPOSTOS ---
        function calcularJuros() {
            const inicial = parseFloat(document.getElementById('jc-inicial').value);
            const mensal = parseFloat(document.getElementById('jc-mensal').value);
            const taxa = parseFloat(document.getElementById('jc-taxa').value) / 100;
            const anos = parseInt(document.getElementById('jc-anos').value);

            let capital = inicial;
            let totalInvestido = inicial;
            const labels = [];
            const dadosTotal = [];

            for (let i = 0; i <= anos; i++) {
                labels.push(`Ano ${i}`);
                dadosTotal.push(capital.toFixed(2));
                
                // Calcula para o próximo ano
                capital = capital * (1 + taxa) + (mensal * 12);
                totalInvestido += (mensal * 12);
            }

            const valorFinal = dadosTotal[dadosTotal.length - 1];
            
            const divRes = document.getElementById('jc-resultado');
            divRes.style.display = 'block';
            divRes.innerHTML = `Valor Final: ${parseFloat(valorFinal).toLocaleString('pt-PT', {style:'currency', currency:'EUR'})} <br> 
                                <span style="font-size:0.8em; color:#475569;">Total investido do teu bolso: ${totalInvestido.toLocaleString('pt-PT', {style:'currency', currency:'EUR'})}</span>`;

            // Desenhar Gráfico
            const ctx = document.getElementById('jcChart').getContext('2d');
            if (jcChartInstance) jcChartInstance.destroy();
            
            jcChartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Evolução do Património',
                        data: dadosTotal,
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.2)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, color: '#f8fafc' }
            });
        }

        // --- LÓGICA F.I.R.E. ---
        function calcularFIRE() {
            const despesas = parseFloat(document.getElementById('fire-despesas').value);
            const patrimonio = parseFloat(document.getElementById('fire-patrimonio').value);
            
            // Regra dos 4% (Despesas / 0.04 = Meta FIRE)
            const metaFIRE = despesas * 25; 
            const falta = metaFIRE - patrimonio;

            const divRes = document.getElementById('fire-resultado');
            divRes.style.display = 'block';
            
            if (falta <= 0) {
                divRes.innerHTML = `Parabéns! Já atingiste o teu número F.I.R.E. de ${metaFIRE.toLocaleString('pt-PT', {style:'currency', currency:'EUR'})}!`;
            } else {
                divRes.innerHTML = `O teu número F.I.R.E. é: <strong>${metaFIRE.toLocaleString('pt-PT', {style:'currency', currency:'EUR'})}</strong><br>
                                    <span style="font-size:0.85em; font-weight:normal;">Faltam-te ${falta.toLocaleString('pt-PT', {style:'currency', currency:'EUR'})} para a independência.</span>`;
            }
        }

        // --- LÓGICA PORTFÓLIO ---
        function atualizarPortfolio() {
            const acoes = parseFloat(document.getElementById('port-acoes').value) || 0;
            const curto = parseFloat(document.getElementById('port-curto').value) || 0;
            const cripto = parseFloat(document.getElementById('port-cripto').value) || 0;

            const total = acoes + curto + cripto;
            
            // Ajustar visualmente se não bater nos 100%
            const labelExtra = total !== 100 ? ` (Aviso: Total = ${total}%)` : '';

            const ctx = document.getElementById('portfolioChart').getContext('2d');
            if (portChartInstance) portChartInstance.destroy();

            portChartInstance = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['Ações (Longo Prazo)', 'Ativos (2-3 Anos)', 'Cripto/Alto Risco'],
                    datasets: [{
                        data: [acoes, curto, cripto],
                        backgroundColor: ['#3b82f6', '#10b981', '#f59e0b'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    color: '#f8fafc',
                    plugins: {
                        legend: { position: 'bottom', labels: { color: '#f8fafc' } },
                        title: { display: total !== 100, text: labelExtra, color: '#ef4444' }
                    }
                }
            });
        }

        // Iniciar gráficos ao carregar a página
        window.onload = function() {
            calcularJuros();
            atualizarPortfolio();
        };
    </script>
</body>
</html>
