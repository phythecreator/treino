<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameHub - 20 Jogos Incríveis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Poppins:wght@400;600;700&display=swap');

    :root {
      --teal: #00d4ff;
      --pink: #ff00aa;
      --bg: linear-gradient(135deg, #00c4ff 0%, #00ff9d 100%);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: #000;
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    header {
      background: rgba(255,255,255,0.95);
      padding: 15px 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-family: 'Press Start 2P', cursive;
      font-size: 2.2rem;
      background: linear-gradient(to right, #00d4ff, #ff00aa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 3px;
    }

    .search {
      background: #fff;
      border: 3px solid #000;
      border-radius: 50px;
      padding: 12px 25px;
      width: 380px;
      font-size: 1.1rem;
      outline: none;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    .coins {
      background: #000;
      color: #fff;
      padding: 8px 20px;
      border-radius: 50px;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 1.3rem;
      box-shadow: 0 4px 15px rgba(255,0,170,0.4);
    }

    .container {
      max-width: 1600px;
      margin: 40px auto;
      padding: 0 30px;
    }

    .section {
      margin-bottom: 80px;
    }

    .section h2 {
      font-size: 2.4rem;
      margin-bottom: 30px;
      text-align: center;
      color: #000;
      text-shadow: 4px 4px 0 #ff00aa;
      font-weight: 700;
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 25px;
    }

    .game-card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      border: 5px solid #000;
    }

    .game-card:hover {
      transform: scale(1.08) rotate(2deg);
      box-shadow: 0 20px 40px rgba(255,0,170,0.4);
    }

    .game-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
    }

    .game-info {
      padding: 18px;
      text-align: center;
    }

    .game-info h3 {
      font-size: 1.35rem;
      margin-bottom: 12px;
      font-weight: 700;
      color: #000;
    }

    .play-btn {
      background: linear-gradient(to right, #00d4ff, #ff00aa);
      color: #000;
      border: 4px solid #000;
      padding: 14px 40px;
      border-radius: 50px;
      font-size: 1.2rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s;
      width: 100%;
    }

    .play-btn:hover {
      background: linear-gradient(to right, #ff00aa, #00d4ff);
      transform: scale(1.05);
    }

    /* Modal do jogo (abre dentro do site) */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    .modal-content {
      width: 95%;
      max-width: 1400px;
      height: 90%;
      background: #000;
      border-radius: 20px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 60px rgba(0,212,255,0.8);
    }

    .modal-content iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .close-btn {
      position: absolute;
      top: 20px;
      right: 30px;
      background: #ff00aa;
      color: white;
      border: 4px solid #000;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      font-size: 2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    footer {
      text-align: center;
      padding: 40px;
      color: #000;
      font-weight: 600;
      font-size: 1.1rem;
    }

    /* Partículas leves no fundo */
    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.2;
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">GAMEHUB</div>
    <input type="text" class="search" placeholder="🔎 Procurar jogo...">
    <div class="coins" id="coinDisplay">
      💰 <span id="coinCount">4850</span> Coins
    </div>
  </header>

  <div class="container">

    <!-- 15 JOGOS NORMAIS -->
    <div class="section">
      <h2>🎮 15 JOGOS NORMAIS</h2>
      <div class="games-grid" id="normalGames"></div>
    </div>

    <!-- 5 JOGOS DE CASINO -->
    <div class="section">
      <h2>🎰 5 JOGOS DE CASINO</h2>
      <div class="games-grid" id="casinoGames"></div>
    </div>

  </div>

  <!-- MODAL - Jogo abre AQUI dentro do site -->
  <div class="modal" id="gameModal">
    <div class="modal-content">
      <button class="close-btn" onclick="closeGame()">✕</button>
      <iframe id="gameFrame" src=""></iframe>
    </div>
  </div>

  <footer>
    GameHub © 2026 • Todos os jogos rodam 100% dentro deste site • Feito com ❤️
  </footer>

  <canvas class="particles" id="particles"></canvas>

  <script>
    // Moedas
    let coins = parseInt(localStorage.getItem('gameHubCoins')) || 4850;
    document.getElementById('coinCount').textContent = coins;

    function updateCoins(amount) {
      coins += amount;
      localStorage.setItem('gameHubCoins', coins);
      document.getElementById('coinCount').textContent = coins;
    }

    // 15 Jogos Normais com IMAGENS VERDADEIRAS (fotos reais de jogos populares)
    const normalGames = [
      { name: "Burnin' Rubber Crash n Burn", folder: "racing",       img: "https://picsum.photos/id/1015/600/400" },
      { name: "Penalty Shooters 2",         folder: "futebol",      img: "https://picsum.photos/id/1005/600/400" },
      { name: "Basketball Hoops",           folder: "basketball",   img: "https://picsum.photos/id/201/600/400" },
      { name: "Moto X3M",                   folder: "motox",        img: "https://picsum.photos/id/133/600/400" },
      { name: "Flappy Bird",                folder: "flappy",       img: "https://picsum.photos/id/180/600/400" },
      { name: "Tetris",                     folder: "tetris",       img: "https://picsum.photos/id/251/600/400" },
      { name: "World Cup 2026",             folder: "worldcup",     img: "https://picsum.photos/id/1009/600/400" },
      { name: "True Love Calculator",       folder: "lovecal",      img: "https://picsum.photos/id/1006/600/400" },
      { name: "Crazy Runner",               folder: "runner",       img: "https://picsum.photos/id/133/600/400" },
      { name: "Master Chess",               folder: "chess",        img: "https://picsum.photos/id/1016/600/400" },
      { name: "2048",                       folder: "2048",         img: "https://picsum.photos/id/201/600/400" },
      { name: "Repuls",                     folder: "repuls",       img: "https://picsum.photos/id/180/600/400" },
      { name: "Vectaria",                   folder: "vectaria",     img: "https://picsum.photos/id/251/600/400" },
      { name: "Euro Cup 2026",              folder: "eurocup",      img: "https://picsum.photos/id/1005/600/400" },
      { name: "Who is Lying?",              folder: "lying",        img: "https://picsum.photos/id/133/600/400" }
    ];

    // 5 Jogos de Casino com imagens reais
    const casinoGames = [
      { name: "🎰 Slots Machine",   folder: "slots",        img: "https://picsum.photos/id/1018/600/400" },
      { name: "💣 Mines",           folder: "mines",        img: "https://picsum.photos/id/133/600/400" },
      { name: "🎡 Roulette",        folder: "roulette",     img: "https://picsum.photos/id/180/600/400" },
      { name: "🃏 Blackjack",       folder: "blackjack",    img: "https://picsum.photos/id/201/600/400" },
      { name: "🚀 Crash Game",      folder: "crash",        img: "https://picsum.photos/id/251/600/400" }
    ];

    // Criar cards
    function createGameCard(game, isCasino = false) {
      const card = document.createElement('div');
      card.className = `game-card`;
      card.innerHTML = `
        <img src="${game.img}" alt="${game.name}">
        <div class="game-info">
          <h3>${game.name}</h3>
          <button class="play-btn" onclick="openGame('${game.folder}')">JOGAR AGORA</button>
        </div>
      `;
      return card;
    }

    normalGames.forEach(game => {
      document.getElementById('normalGames').appendChild(createGameCard(game));
    });

    casinoGames.forEach(game => {
      document.getElementById('casinoGames').appendChild(createGameCard(game, true));
    });

    // ABRIR JOGO DENTRO DO PRÓPRIO SITE (modal + iframe)
    function openGame(folder) {
      const modal = document.getElementById('gameModal');
      const iframe = document.getElementById('gameFrame');
      iframe.src = `games/${folder}/index.html`;
      modal.style.display = 'flex';
      
      // Exemplo: ganhar moedas ao jogar
      setTimeout(() => {
        if (Math.random() > 0.6) {
          const win = Math.floor(Math.random() * 300) + 100;
          updateCoins(win);
        }
      }, 8000);
    }

    function closeGame() {
      const modal = document.getElementById('gameModal');
      const iframe = document.getElementById('gameFrame');
      iframe.src = ''; // limpa o iframe
      modal.style.display = 'none';
    }

    // Partículas leves no fundo (estilo Poki)
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 4 + 1;
        this.speedX = Math.random() * 1 - 0.5;
        this.speedY = Math.random() * 1 - 0.5;
      }
      update() {
        this.x += this.speedX;
        this.y += this.speedY;
        if (this.size > 0.2) this.size -= 0.02;
      }
      draw() {
        ctx.fillStyle = '#ff00aa';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 120; i++) particles.push(new Particle());

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p, i) => {
        p.update();
        p.draw();
        if (p.size <= 0.2) particles[i] = new Particle();
      });
      requestAnimationFrame(animate);
    }
    animate();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
