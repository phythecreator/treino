<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EA FC 25 - Ultimate Team PRO | Pack Opener + Mercado + Partidas</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c15;
            overflow-x: hidden;
            color: #fff;
        }

        /* Background dinâmico */
        .bg-gradient {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 107, 107, 0.08), rgba(0, 0, 0, 0.95));
            z-index: -2;
        }

        .bg-noise {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: -1;
        }

        /* Navegação Premium */
        .nav-premium {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(10, 15, 30, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 60px;
            padding: 8px 12px;
            display: flex;
            gap: 8px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .nav-item {
            background: transparent;
            border: none;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            color: #a0a4b8;
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Inter', sans-serif;
        }

        .nav-item i {
            font-size: 1.2rem;
        }

        .nav-item:hover {
            color: white;
            background: rgba(255, 215, 0, 0.15);
        }

        .nav-item.active {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: #0a0c15;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.4);
        }

        /* Header com stats */
        .stats-header {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 100;
            display: flex;
            gap: 12px;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            padding: 10px 20px;
            border-radius: 50px;
            border: 1px solid rgba(255, 215, 0, 0.2);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .stat-item i {
            font-size: 1.2rem;
        }

        .stat-value {
            color: #ffd700;
            font-weight: 800;
        }

        /* Seções */
        .section {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 100vh;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
            padding: 100px 24px 40px 24px;
        }

        .section.active {
            opacity: 1;
            visibility: visible;
        }

        /* Container principal */
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Títulos */
        .section-title {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #fff, #ffd700);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* Packs Grid */
        .packs-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 40px;
        }

        .pack-card {
            background: linear-gradient(145deg, rgba(25, 30, 45, 0.9), rgba(15, 18, 28, 0.95));
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 32px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            border: 1px solid rgba(255, 215, 0, 0.2);
            position: relative;
            overflow: hidden;
        }

        .pack-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 215, 0, 0.1), transparent);
            transition: left 0.6s;
        }

        .pack-card:hover::before {
            left: 100%;
        }

        .pack-card:hover {
            transform: translateY(-8px);
            border-color: #ffd700;
            box-shadow: 0 20px 40px rgba(255, 215, 0, 0.2);
        }

        .pack-icon {
            font-size: 4rem;
            margin-bottom: 16px;
        }

        .pack-name {
            font-size: 1.8rem;
            font-weight: 800;
            color: #ffd700;
            margin-bottom: 8px;
        }

        .pack-price {
            font-size: 1.2rem;
            font-weight: 600;
            margin: 12px 0;
        }

        .pack-rarity {
            font-size: 0.85rem;
            color: #8a8faa;
        }

        /* Grid de Jogadores */
        .players-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 20px;
        }

        .player-card {
            background: linear-gradient(135deg, #1e2438, #13172a);
            border-radius: 20px;
            padding: 20px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 215, 0, 0.15);
            position: relative;
        }

        .player-card:hover {
            transform: translateY(-4px);
            border-color: #ffd700;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
        }

        .player-rating {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ffd700;
            color: #1a1a2e;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 1.2rem;
            box-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .player-name {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 15px 0 5px;
        }

        .player-position {
            color: #ffd700;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 12px;
        }

        .player-stats {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            padding: 10px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat {
            text-align: center;
            font-size: 0.75rem;
        }

        .stat-value {
            display: block;
            font-weight: 700;
            font-size: 0.9rem;
            color: #ffd700;
        }

        .player-value {
            font-size: 0.85rem;
            color: #8a8faa;
            margin: 10px 0;
        }

        .btn-buy {
            width: 100%;
            padding: 10px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .btn-buy:hover {
            transform: scale(1.02);
            box-shadow: 0 4px 12px rgba(255, 215, 0, 0.4);
        }

        .btn-remove {
            width: 100%;
            padding: 10px;
            background: rgba(231, 76, 60, 0.8);
            border: none;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
        }

        /* Área de simulação */
        .simulation-card {
            background: linear-gradient(135deg, #1e2438, #13172a);
            border-radius: 28px;
            padding: 32px;
            margin-bottom: 25px;
        }

        .team-strength {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 20px;
            padding: 20px;
            margin: 20px 0;
        }

        .match-result {
            background: linear-gradient(135deg, #2a2f45, #1a1e32);
            border-radius: 24px;
            padding: 25px;
            margin-top: 20px;
            animation: fadeInUp 0.5s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .btn-simulate {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-simulate:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        /* Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
        }

        .modal.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(145deg, #2a2f45, #1a1e32);
            border-radius: 40px;
            padding: 40px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            animation: modalPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid #ffd700;
        }

        @keyframes modalPop {
            from {
                opacity: 0;
                transform: scale(0.8) rotateY(-30deg);
            }
            to {
                opacity: 1;
                transform: scale(1) rotateY(0);
            }
        }

        .empty-state {
            text-align: center;
            padding: 60px;
            color: #8a8faa;
            font-size: 1.1rem;
        }

        /* Scroll */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #13172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 4px;
        }

        @media (max-width: 768px) {
            .nav-item { padding: 8px 16px; font-size: 0.8rem; }
            .stats-header { top: 80px; right: 10px; padding: 6px 12px; }
            .section-title { font-size: 1.5rem; }
            .players-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="bg-gradient"></div>
    <div class="bg-noise"></div>

    <!-- Navegação Premium -->
    <div class="nav-premium">
        <button class="nav-item active" data-section="packs"><i class="fas fa-gift"></i> <span>Abrir Packs</span></button>
        <button class="nav-item" data-section="market"><i class="fas fa-store"></i> <span>Mercado</span></button>
        <button class="nav-item" data-section="team"><i class="fas fa-users"></i> <span>Minha Equipa</span></button>
        <button class="nav-item" data-section="simulate"><i class="fas fa-futbol"></i> <span>Simular Partida</span></button>
    </div>

    <!-- Stats Header -->
    <div class="stats-header">
        <div class="stat-item"><i class="fas fa-coins"></i> <span class="stat-value" id="coins">10000</span></div>
        <div class="stat-item"><i class="fas fa-users"></i> <span id="team-count">0</span>/11</div>
        <div class="stat-item"><i class="fas fa-trophy"></i> <span id="wins-count">0</span></div>
    </div>

    <!-- Secção Packs -->
    <div id="packs-section" class="section active">
        <div class="container">
            <div class="section-title"><i class="fas fa-gift"></i> Abrir Packs</div>
            <div class="packs-grid" id="packs-grid"></div>
            <div style="text-align: center; margin-top: 20px; color: #8a8faa;">
                <i class="fas fa-infinity"></i> Packs ilimitados! Abra quantos quiser
            </div>
        </div>
    </div>

    <!-- Secção Mercado -->
    <div id="market-section" class="section">
        <div class="container">
            <div class="section-title"><i class="fas fa-store"></i> Mercado de Transferências</div>
            <div class="players-grid" id="market-grid"></div>
        </div>
    </div>

    <!-- Secção Equipa -->
    <div id="team-section" class="section">
        <div class="container">
            <div class="section-title"><i class="fas fa-users"></i> Minha Equipa</div>
            <div id="team-grid" class="players-grid"></div>
        </div>
    </div>

    <!-- Secção Simulação -->
    <div id="simulate-section" class="section">
        <div class="container">
            <div class="section-title"><i class="fas fa-futbol"></i> Simular Partida</div>
            <div class="simulation-card">
                <div id="team-info" class="team-strength"></div>
                <button id="simulate-match-btn" class="btn-simulate"><i class="fas fa-play"></i> INICIAR PARTIDA</button>
                <div id="match-result-container"></div>
            </div>
        </div>
    </div>

    <!-- Modal Carta -->
    <div id="card-modal" class="modal">
        <div class="modal-content" id="modal-content"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ==================== BASE DE JOGADORES (400+ JOGADORES REAIS) ====================
        const playersDatabase = [];

        // Top Jogadores Reais
        const topPlayers = [
            { name: "Lionel Messi", rating: 94, position: "RW", nation: "🇦🇷", pace: 85, shooting: 94, passing: 91, defending: 35, physical: 65, value: 12500 },
            { name: "Cristiano Ronaldo", rating: 93, position: "ST", nation: "🇵🇹", pace: 87, shooting: 95, passing: 82, defending: 40, physical: 78, value: 11800 },
            { name: "Kylian Mbappé", rating: 95, position: "ST", nation: "🇫🇷", pace: 97, shooting: 92, passing: 85, defending: 40, physical: 80, value: 14500 },
            { name: "Erling Haaland", rating: 94, position: "ST", nation: "🇳🇴", pace: 92, shooting: 96, passing: 70, defending: 45, physical: 88, value: 13800 },
            { name: "Kevin De Bruyne", rating: 93, position: "CAM", nation: "🇧🇪", pace: 76, shooting: 88, passing: 96, defending: 65, physical: 78, value: 12800 },
            { name: "Vinícius Jr", rating: 92, position: "LW", nation: "🇧🇷", pace: 95, shooting: 86, passing: 83, defending: 35, physical: 70, value: 11500 },
            { name: "Jude Bellingham", rating: 93, position: "CM", nation: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", pace: 84, shooting: 86, passing: 88, defending: 82, physical: 85, value: 12200 },
            { name: "Harry Kane", rating: 92, position: "ST", nation: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", pace: 74, shooting: 95, passing: 85, defending: 50, physical: 82, value: 11200 },
            { name: "Mohamed Salah", rating: 92, position: "RW", nation: "🇪🇬", pace: 90, shooting: 91, passing: 83, defending: 45, physical: 75, value: 11300 },
            { name: "Rodri", rating: 92, position: "CDM", nation: "🇪🇸", pace: 72, shooting: 75, passing: 86, defending: 89, physical: 85, value: 10800 },
            { name: "Virgil van Dijk", rating: 91, position: "CB", nation: "🇳🇱", pace: 78, shooting: 60, passing: 72, defending: 94, physical: 88, value: 10500 },
            { name: "Antoine Griezmann", rating: 90, position: "CF", nation: "🇫🇷", pace: 82, shooting: 88, passing: 86, defending: 60, physical: 72, value: 9500 },
            { name: "Robert Lewandowski", rating: 91, position: "ST", nation: "🇵🇱", pace: 78, shooting: 94, passing: 78, defending: 45, physical: 82, value: 10800 },
            { name: "Neymar Jr", rating: 91, position: "LW", nation: "🇧🇷", pace: 88, shooting: 85, passing: 89, defending: 40, physical: 68, value: 11000 },
            { name: "Lautaro Martínez", rating: 89, position: "ST", nation: "🇦🇷", pace: 84, shooting: 89, passing: 75, defending: 48, physical: 82, value: 8800 },
            { name: "Federico Valverde", rating: 89, position: "CM", nation: "🇺🇾", pace: 88, shooting: 82, passing: 85, defending: 80, physical: 86, value: 8900 },
            { name: "Pedri", rating: 88, position: "CM", nation: "🇪🇸", pace: 82, shooting: 75, passing: 90, defending: 70, physical: 68, value: 8200 },
            { name: "Phil Foden", rating: 89, position: "CAM", nation: "🏴󠁧󠁢󠁥󠁮󠁧󠁿", pace: 86, shooting: 84, passing: 86, defending: 55, physical: 72, value: 8600 },
        ];

        // Gerar 400+ jogadores adicionais
        const firstNames = ["Marcus", "Rafael", "Bruno", "Bernardo", "Rúben", "João", "Alex", "Martin", "Thomas", "Luis", "Carlos", "Javier", "Nicolás", "Federico", "Christian", "Mason", "Jack", "Bukayo", "Martin", "William"];
        const lastNames = ["Rashford", "Leão", "Fernandes", "Silva", "Dias", "Cancelo", "Mac Allister", "Ødegaard", "Müller", "Suárez", "Martínez", "Alvarez", "Chiesa", "Eriksen", "Mount", "Saka", "Rice", "Kimmich", "Musiala"];
        const positions = ["ST", "LW", "RW", "CAM", "CM", "CDM", "LB", "RB", "CB", "GK"];
        
        // Adicionar top players
        topPlayers.forEach(p => playersDatabase.push({ ...p, id: playersDatabase.length }));
        
        // Gerar jogadores comuns
        for (let i = 0; i < 380; i++) {
            const firstName = firstNames[i % firstNames.length];
            const lastName = lastNames[i % lastNames.length];
            let rating = 65 + Math.floor(Math.random() * 28);
            if (i < 80) rating = 82 + Math.floor(Math.random() * 8);
            
            const position = positions[Math.floor(Math.random() * positions.length)];
            const nation = ["🇦🇷", "🇵🇹", "🇫🇷", "🇧🇷", "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "🇪🇸", "🇩🇪", "🇮🇹", "🇳🇱", "🇧🇪"][Math.floor(Math.random() * 10)];
            const pace = 50 + Math.floor(Math.random() * 48);
            const shooting = position === "GK" ? 30 + Math.floor(Math.random() * 30) : 60 + Math.floor(Math.random() * 38);
            const passing = 55 + Math.floor(Math.random() * 40);
            const defending = position === "GK" ? 75 + Math.floor(Math.random() * 25) : 30 + Math.floor(Math.random() * 55);
            const physical = 45 + Math.floor(Math.random() * 48);
            const value = rating * 85 + (rating > 85 ? 2000 : rating > 75 ? 500 : 100);
            
            playersDatabase.push({
                id: playersDatabase.length,
                name: `${firstName} ${lastName}`,
                rating, position, nation, pace, shooting, passing, defending, physical, value
            });
        }
        
        // Lendas
        const legends = [
            { name: "Pelé", rating: 99, position: "CAM", nation: "🇧🇷", pace: 94, shooting: 98, passing: 95, defending: 60, physical: 85, value: 25000 },
            { name: "Diego Maradona", rating: 98, position: "CAM", nation: "🇦🇷", pace: 92, shooting: 96, passing: 97, defending: 45, physical: 78, value: 24000 },
            { name: "Ronaldinho", rating: 97, position: "LW", nation: "🇧🇷", pace: 93, shooting: 91, passing: 94, defending: 40, physical: 82, value: 23000 },
            { name: "Zinedine Zidane", rating: 97, position: "CAM", nation: "🇫🇷", pace: 85, shooting: 90, passing: 98, defending: 70, physical: 85, value: 23000 },
            { name: "Ronaldo Nazário", rating: 98, position: "ST", nation: "🇧🇷", pace: 96, shooting: 97, passing: 82, defending: 35, physical: 88, value: 24500 }
        ];
        legends.forEach(l => playersDatabase.push({ ...l, id: playersDatabase.length }));

        // ==================== ESTADO DO JOGO ====================
        let playerCoins = 10000;
        let playerTeam = [];
        let wins = 0;
        let currentOpenedPlayer = null;
        
        // Elementos UI
        const coinsSpan = document.getElementById('coins');
        const teamCountSpan = document.getElementById('team-count');
        const winsSpan = document.getElementById('wins-count');
        const packsGrid = document.getElementById('packs-grid');
        const marketGrid = document.getElementById('market-grid');
        const teamGrid = document.getElementById('team-grid');
        const teamInfoDiv = document.getElementById('team-info');
        const matchResultContainer = document.getElementById('match-result-container');
        const simulateBtn = document.getElementById('simulate-match-btn');
        const modal = document.getElementById('card-modal');
        
        // ==================== ANIMAÇÃO 3D ====================
        let scene, camera, renderer, packGroup;
        
        function init3D() {
            scene = new THREE.Scene();
            scene.background = null;
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 6);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setClearColor(0x000000, 0);
            document.body.insertBefore(renderer.domElement, document.body.firstChild);
            
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const mainLight = new THREE.DirectionalLight(0xffffff, 1);
            mainLight.position.set(2, 5, 3);
            scene.add(mainLight);
            const backLight = new THREE.PointLight(0xffaa33, 0.5);
            backLight.position.set(0, 2, -4);
            scene.add(backLight);
            
            packGroup = new THREE.Group();
            const boxGeo = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0xffaa33, metalness: 0.9, roughness: 0.2, emissive: 0x331a00 });
            const mainBox = new THREE.Mesh(boxGeo, boxMat);
            packGroup.add(mainBox);
            
            const stripeMat = new THREE.MeshStandardMaterial({ color: 0xffdd88 });
            for (let i = -0.6; i <= 0.6; i += 0.6) {
                const stripe = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 1.3), stripeMat);
                stripe.position.set(i, 0.6, 0);
                packGroup.add(stripe);
                const stripe2 = new THREE.Mesh(new THREE.BoxGeometry(0.1, 0.05, 1.3), stripeMat);
                stripe2.position.set(i, -0.6, 0);
                packGroup.add(stripe2);
            }
            scene.add(packGroup);
            
            function animate() {
                requestAnimationFrame(animate);
                if (packGroup) {
                    packGroup.rotation.y += 0.008;
                    packGroup.rotation.x = Math.sin(Date.now() * 0.001) * 0.1;
                }
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        }
        
        function animatePackOpen(callback) {
            let start = Date.now();
            function step() {
                const t = Math.min(1, (Date.now() - start) / 800);
                if (packGroup) {
                    const scale = 1 + t * 2.5;
                    packGroup.scale.set(scale, scale, scale);
                    if (t >= 0.9) packGroup.visible = false;
                }
                if (t < 1) requestAnimationFrame(step);
                else {
                    setTimeout(() => {
                        if (packGroup) {
                            packGroup.scale.set(1, 1, 1);
                            packGroup.visible = true;
                        }
                        callback();
                    }, 100);
                }
            }
            step();
        }
        
        // ==================== FUNÇÕES ====================
        function updateUI() {
            coinsSpan.textContent = playerCoins;
            teamCountSpan.textContent = `${playerTeam.length}/11`;
            winsSpan.textContent = wins;
            renderMarket();
            renderTeam();
            updateTeamInfo();
        }
        
        function renderPacks() {
            const packs = [
                { name: "BRONZE", icon: "🥉", price: 100, minRating: 60, maxRating: 74, color: "#cd7f32" },
                { name: "PRATA", icon: "🥈", price: 300, minRating: 75, maxRating: 84, color: "#c0c0c0" },
                { name: "OURO", icon: "⭐", price: 500, minRating: 85, maxRating: 94, color: "#ffd700" },
                { name: "LENDÁRIO", icon: "🏆", price: 1500, minRating: 90, maxRating: 99, color: "#ff6b6b" }
            ];
            
            packsGrid.innerHTML = packs.map(pack => `
                <div class="pack-card" data-pack='${JSON.stringify(pack)}'>
                    <div class="pack-icon">${pack.icon}</div>
                    <div class="pack-name">PACK ${pack.name}</div>
                    <div class="pack-price"><i class="fas fa-coins"></i> ${pack.price}</div>
                    <div class="pack-rarity">${pack.minRating}-${pack.maxRating} OVR</div>
                </div>
            `).join('');
            
            document.querySelectorAll('.pack-card').forEach(card => {
                card.addEventListener('click', () => {
                    const pack = JSON.parse(card.dataset.pack);
                    openPack(pack);
                });
            });
        }
        
        function openPack(pack) {
            if (playerCoins < pack.price) {
                showToast("Moedas insuficientes! 💸", "error");
                return;
            }
            
            playerCoins -= pack.price;
            updateUI();
            
            const possiblePlayers = playersDatabase.filter(p => p.rating >= pack.minRating && p.rating <= pack.maxRating);
            const player = possiblePlayers[Math.floor(Math.random() * possiblePlayers.length)];
            currentOpenedPlayer = { ...player };
            
            animatePackOpen(() => showCardModal(currentOpenedPlayer));
        }
        
        function showCardModal(player) {
            const modalContent = document.getElementById('modal-content');
            modalContent.innerHTML = `
                <div style="font-size: 4rem; margin-bottom: 15px;">${player.position === "GK" ? "🧤" : player.position === "ST" ? "⚽" : "⭐"}</div>
                <div style="font-size: 1.8rem; font-weight: 800; color: #ffd700;">${player.name}</div>
                <div style="font-size: 1.2rem; margin: 10px 0;">OVR ${player.rating} | ${player.position} ${player.nation}</div>
                <div style="display: flex; justify-content: center; gap: 20px; margin: 20px 0;">
                    <div><span class="stat-value">⚡${player.pace}</span></div>
                    <div><span class="stat-value">🎯${player.shooting}</span></div>
                    <div><span class="stat-value">🛡️${player.defending}</span></div>
                </div>
                <div style="display: flex; gap: 12px; margin-top: 20px;">
                    <button id="add-team-modal" style="flex:1; background: #2ecc71; padding: 12px; border: none; border-radius: 40px; font-weight: 700; cursor: pointer;"><i class="fas fa-plus"></i> Adicionar</button>
                    <button id="sell-modal" style="flex:1; background: #e74c3c; padding: 12px; border: none; border-radius: 40px; font-weight: 700; cursor: pointer;"><i class="fas fa-coins"></i> Vender (${player.value})</button>
                </div>
            `;
            
            modal.classList.add('active');
            
            document.getElementById('add-team-modal')?.addEventListener('click', () => {
                if (playerTeam.length >= 11) {
                    showToast("Equipa cheia! Remova um jogador primeiro.", "error");
                    return;
                }
                playerTeam.push({ ...player });
                updateUI();
                modal.classList.remove('active');
                showToast(`${player.name} adicionado à equipa! ✅`, "success");
            });
            
            document.getElementById('sell-modal')?.addEventListener('click', () => {
                playerCoins += player.value;
                updateUI();
                modal.classList.remove('active');
                showToast(`Vendeu ${player.name} por ${player.value} moedas! 💰`, "success");
            });
            
            modal.addEventListener('click', (e) => {
                if (e.target === modal) modal.classList.remove('active');
            });
        }
        
        function renderMarket() {
            const marketPlayers = playersDatabase.slice(0, 50).sort(() => Math.random() - 0.5);
            marketGrid.innerHTML = marketPlayers.map(player => `
                <div class="player-card">
                    <div class="player-rating">${player.rating}</div>
                    <div style="font-size: 2rem;">${player.position === "GK" ? "🧤" : "⚽"}</div>
                    <div class="player-name">${player.name}</div>
                    <div class="player-position">${player.position} ${player.nation}</div>
                    <div class="player-stats">
                        <div class="stat"><span class="stat-value">${player.pace}</span><br>PACE</div>
                        <div class="stat"><span class="stat-value">${player.shooting}</span><br>SHO</div>
                        <div class="stat"><span class="stat-value">${player.defending}</span><br>DEF</div>
                    </div>
                    <div class="player-value"><i class="fas fa-coins"></i> ${player.value}</div>
                    <button class="btn-buy" data-player='${JSON.stringify(player)}'><i class="fas fa-shopping-cart"></i> Comprar</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.btn-buy').forEach(btn => {
                btn.addEventListener('click', () => {
                    const player = JSON.parse(btn.dataset.player);
                    if (playerCoins < player.value) {
                        showToast("Moedas insuficientes! 💸", "error");
                        return;
                    }
                    if (playerTeam.length >= 11) {
                        showToast("Equipa cheia! Remova um jogador primeiro.", "error");
                        return;
                    }
                    playerCoins -= player.value;
                    playerTeam.push({ ...player });
                    updateUI();
                    showToast(`${player.name} comprado com sucesso! ✅`, "success");
                });
            });
        }
        
        function renderTeam() {
            if (playerTeam.length === 0) {
                teamGrid.innerHTML = '<div class="empty-state"><i class="fas fa-users" style="font-size: 3rem; margin-bottom: 15px;"></i><br>Nenhum jogador na equipa. Abra packs ou compre no mercado!</div>';
                return;
            }
            
            teamGrid.innerHTML = playerTeam.map((player, idx) => `
                <div class="player-card">
                    <div class="player-rating">${player.rating}</div>
                    <div style="font-size: 2rem;">${player.position === "GK" ? "🧤" : "⚽"}</div>
                    <div class="player-name">${player.name}</div>
                    <div class="player-position">${player.position} ${player.nation}</div>
                    <div class="player-stats">
                        <div class="stat"><span class="stat-value">${player.pace}</span><br>PACE</div>
                        <div class="stat"><span class="stat-value">${player.shooting}</span><br>SHO</div>
                        <div class="stat"><span class="stat-value">${player.defending}</span><br>DEF</div>
                    </div>
                    <button class="btn-remove" data-idx="${idx}"><i class="fas fa-trash"></i> Remover</button>
                </div>
            `).join('');
            
            document.querySelectorAll('.btn-remove').forEach(btn => {
                btn.addEventListener('click', () => {
                    const idx = parseInt(btn.dataset.idx);
                    playerTeam.splice(idx, 1);
                    updateUI();
                    showToast("Jogador removido da equipa.", "info");
                });
            });
        }
        
        function updateTeamInfo() {
            if (playerTeam.length === 0) {
                teamInfoDiv.innerHTML = '<p><i class="fas fa-exclamation-triangle"></i> Adicione 11 jogadores para simular partidas!</p>';
                return;
            }
            const avg = playerTeam.reduce((sum, p) => sum + p.rating, 0) / playerTeam.length;
            const best = playerTeam.sort((a, b) => b.rating - a.rating)[0];
            teamInfoDiv.innerHTML = `
                <h3><i class="fas fa-chart-line"></i> Estatísticas da Equipa</h3>
                <p><strong>Overall Médio:</strong> <span style="color: #ffd700; font-size: 1.4rem;">${avg.toFixed(1)}</span></p>
                <p><strong>Jogadores:</strong> ${playerTeam.length}/11</p>
                <p><strong>Melhor Jogador:</strong> ${best?.name} (${best?.rating})</p>
                <p><strong>Força de Ataque:</strong> ${Math.floor(playerTeam.reduce((s, p) => s + (p.shooting || 70), 0) / playerTeam.length)}</p>
            `;
        }
        
        function simulateMatch() {
            if (playerTeam.length < 11) {
                showToast("Precisa de 11 jogadores para simular uma partida! ⚠️", "error");
                return;
            }
            
            const teamAvg = playerTeam.reduce((sum, p) => sum + p.rating, 0) / playerTeam.length;
            const botRating = 65 + Math.random() * 28;
            const teamPower = teamAvg + (Math.random() * 18);
            const botPower = botRating + (Math.random() * 18);
            
            let goalsTeam = Math.floor(Math.max(0, teamPower / 14));
            let goalsBot = Math.floor(Math.max(0, botPower / 14));
            
            if (Math.random() < 0.2) goalsTeam++;
            if (Math.random() < 0.2) goalsBot++;
            
            const result = goalsTeam > goalsBot ? "VITÓRIA" : goalsTeam === goalsBot ? "EMPATE" : "DERROTA";
            const coinsReward = result === "VITÓRIA" ? 500 : result === "EMPATE" ? 200 : 0;
            
            if (result === "VITÓRIA") {
                wins++;
                playerCoins += coinsReward;
                updateUI();
            } else if (result === "EMPATE") {
                playerCoins += coinsReward;
                updateUI();
            }
            
            const possession = 35 + Math.random() * 45;
            const shots = 4 + Math.floor(Math.random() * 12);
            const motm = playerTeam[Math.floor(Math.random() * playerTeam.length)];
            
            const commentaries = {
                VITÓRIA: `🎉 ESPETACULAR! Vitória dominante! ${motm.name} brilhou com uma atuação de gala. A equipa está imparável!`,
                EMPATE: `😤 Jogo equilibrado. Um ponto importante, mas podia ter sido melhor. ${motm.name} foi o destaque.`,
                DERROTA: `😔 Derrota amarga. É preciso trabalhar mais nos treinos. Próxima partida será melhor!`
            };
            
            matchResultContainer.innerHTML = `
                <div class="match-result">
                    <h2 style="color: #ffd700; text-align: center; margin-bottom: 20px;">🏆 RESULTADO FINAL</h2>
                    <div style="font-size: 3.5rem; text-align: center; font-weight: 800; margin: 20px 0;">${goalsTeam} - ${goalsBot}</div>
                    <div style="text-align: center; font-size: 1.5rem; margin-bottom: 20px;">${result}</div>
                    <div style="background: rgba(0,0,0,0.4); padding: 15px; border-radius: 15px;">
                        <p><i class="fas fa-chart-simple"></i> Posse de bola: ${possession.toFixed(0)}%</p>
                        <p><i class="fas fa-bullseye"></i> Finalizações: ${shots}</p>
                        <p><i class="fas fa-star"></i> Melhor em campo: ${motm.name} (${motm.rating})</p>
                        ${coinsReward > 0 ? `<p><i class="fas fa-coins"></i> Recompensa: +${coinsReward} moedas</p>` : ''}
                    </div>
                    <div style="margin-top: 20px; padding: 15px; background: rgba(255,215,0,0.1); border-radius: 15px;">
                        <p><i class="fas fa-comment"></i> <strong>Relato:</strong> ${commentaries[result]}</p>
                    </div>
                </div>
            `;
            
            showToast(`Partida finalizada: ${goalsTeam} - ${goalsBot}!`, "info");
        }
        
        function showToast(msg, type = "info") {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.bottom = '30px';
            toast.style.left = '50%';
            toast.style.transform = 'translateX(-50%)';
            toast.style.backgroundColor = type === 'error' ? '#e74c3c' : type === 'success' ? '#2ecc71' : '#ffd700';
            toast.style.color = '#1a1a2e';
            toast.style.padding = '12px 24px';
            toast.style.borderRadius = '50px';
            toast.style.fontWeight = 'bold';
            toast.style.zIndex = '2000';
            toast.style.fontFamily = 'Inter, sans-serif';
            toast.style.boxShadow = '0 4px 15px rgba(0,0,0,0.3)';
            toast.innerHTML = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        // Navegação
        function switchSection(sectionId) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(`${sectionId}-section`).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.section === sectionId) btn.classList.add('active');
            });
        }
        
        document.querySelectorAll('.nav-item').forEach(btn => {
            btn.addEventListener('click', () => switchSection(btn.dataset.section));
        });
        
        simulateBtn.addEventListener('click', simulateMatch);
        
        // Inicializar
        init3D();
        renderPacks();
        renderMarket();
        renderTeam();
        updateTeamInfo();
        updateUI();
        showToast("⚽ Bem-vindo ao EA FC 25 Ultimate Team! Abra packs, compre no mercado e monte sua equipa!", "success");
    </script>
</body>
</html>
