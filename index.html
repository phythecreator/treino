<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>EA FC Pack Opener - Ultimate Team</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Poppins', 'Segoe UI', sans-serif;
        }

        /* UI Overlay */
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .panel {
            pointer-events: auto;
            background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(10,20,30,0.9) 100%);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255,215,0,0.3);
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            padding: 15px 25px;
            color: white;
            font-weight: bold;
        }

        #top-bar {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            gap: 15px;
            flex-wrap: wrap;
        }

        .stats {
            display: flex;
            gap: 20px;
            background: rgba(0,0,0,0.7);
            padding: 10px 20px;
            border-radius: 40px;
            backdrop-filter: blur(5px);
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1.2em;
        }

        .stat-icon {
            font-size: 1.5em;
        }

        button {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            border: none;
            color: #1a2a3a;
            padding: 10px 25px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-size: 1em;
            font-family: inherit;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 20px rgba(0,0,0,0.4);
        }

        button:active {
            transform: scale(0.98);
        }

        #pack-container {
            position: absolute;
            bottom: 100px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            pointer-events: auto;
        }

        .pack-btn {
            background: linear-gradient(135deg, #2c3e50, #1a2a3a);
            border: 2px solid #ffd700;
            font-size: 1.2em;
            padding: 12px 30px;
        }

        #card-reveal {
            position: absolute;
            bottom: 200px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .card-display {
            background: linear-gradient(145deg, #2a2a2a, #1a1a1a);
            border-radius: 20px;
            padding: 20px 40px;
            text-align: center;
            animation: slideUp 0.5s ease-out;
            border: 2px solid gold;
            max-width: 300px;
            margin: 0 auto;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .player-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #ffd700;
        }

        .player-rating {
            font-size: 1.4em;
            color: #fff;
        }

        .player-position {
            font-size: 1.2em;
            color: #aaa;
        }

        .card-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .action-btn {
            background: rgba(255,255,255,0.2);
            padding: 5px 15px;
            font-size: 0.9em;
        }

        #match-panel {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 320px;
            max-height: 80vh;
            overflow-y: auto;
            pointer-events: auto;
        }

        #team-list {
            max-height: 200px;
            overflow-y: auto;
            margin: 10px 0;
        }

        .team-player {
            background: rgba(255,215,0,0.2);
            margin: 5px 0;
            padding: 5px 10px;
            border-radius: 8px;
            font-size: 0.9em;
            display: flex;
            justify-content: space-between;
        }

        .match-result {
            margin-top: 10px;
            padding: 10px;
            background: rgba(0,0,0,0.6);
            border-radius: 10px;
            font-size: 0.9em;
        }

        .commentary {
            font-style: italic;
            color: #ffd700;
            margin-top: 8px;
            font-size: 0.85em;
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a2e;
        }

        ::-webkit-scrollbar-thumb {
            background: #ffd700;
            border-radius: 3px;
        }

        @media (max-width: 768px) {
            .stats { font-size: 0.8em; padding: 5px 12px; }
            button { padding: 6px 15px; font-size: 0.8em; }
            #match-panel { width: 280px; }
        }
    </style>
</head>
<body>
    <div id="ui">
        <div id="top-bar">
            <div class="stats">
                <div class="stat"><span class="stat-icon">⭐</span> <span id="coins">5000</span></div>
                <div class="stat"><span class="stat-icon">👥</span> <span id="team-count">0</span>/11</div>
                <div class="stat"><span class="stat-icon">📦</span> <span id="pack-count">3</span></div>
            </div>
            <button id="quick-sell-btn" style="background:#e74c3c;">💰 Quick Sell (10 coins)</button>
        </div>

        <div id="pack-container">
            <button class="pack-btn" data-pack="bronze">🥉 Bronze Pack (100 coins)</button>
            <button class="pack-btn" data-pack="silver">🥈 Silver Pack (300 coins)</button>
            <button class="pack-btn" data-pack="gold">⭐ Gold Pack (500 coins)</button>
        </div>

        <div id="card-reveal"></div>

        <div id="match-panel" class="panel">
            <h3>⚽ Minha Equipe</h3>
            <div id="team-list"></div>
            <button id="simulate-match-btn" style="width:100%; margin-top:10px;">🎮 Simular Partida vs Bot</button>
            <div id="match-result" class="match-result"></div>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ---------- DATABASE DE JOGADORES (200+ jogadores) ----------
        const playersDB = [];
        const firstNames = ["Lionel", "Cristiano", "Kylian", "Erling", "Kevin", "Mohamed", "Robert", "Neymar", "Vinicius", "Jude", "Harry", "Antoine", "Phil", "Rodri", "Virgil", "Thibaut", "Marc", "Joshua", "Toni", "Luka"];
        const lastNames = ["Messi", "Ronaldo", "Mbappé", "Haaland", "De Bruyne", "Salah", "Lewandowski", "Jr", "Bellingham", "Kane", "Griezmann", "Foden", "Rodri", "Van Dijk", "Courtois", "Ter Stegen", "Kimmich", "Kroos", "Modrić"];
        const positions = ["ST", "LW", "RW", "CAM", "CM", "CDM", "LB", "RB", "CB", "GK"];
        const nations = ["🇦🇷", "🇵🇹", "🇫🇷", "🇳🇴", "🇧🇪", "🇪🇬", "🇵🇱", "🇧🇷", "🇪🇸", "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "🇫🇷", "🇭🇷", "🇩🇪"];
        
        // Gerar 220 jogadores únicos
        for (let i = 0; i < 220; i++) {
            const firstName = firstNames[Math.floor(Math.random() * firstNames.length)];
            const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
            let name = `${firstName} ${lastName}`;
            if (i < 30) name = `${firstName} ${lastName} ${Math.floor(Math.random() * 10)}`; // variedade
            
            const rating = Math.floor(Math.random() * 40) + 60; // 60-99
            const position = positions[Math.floor(Math.random() * positions.length)];
            const nation = nations[Math.floor(Math.random() * nations.length)];
            const value = Math.floor(rating * 100) + (rating > 85 ? 5000 : rating > 75 ? 1000 : 200);
            
            playersDB.push({
                id: i,
                name: name,
                rating: rating,
                position: position,
                nation: nation,
                value: value,
                pace: Math.floor(Math.random() * 40) + 60,
                shooting: Math.floor(Math.random() * 40) + 60,
                passing: Math.floor(Math.random() * 40) + 60,
                defending: position === "GK" ? Math.floor(Math.random() * 30) + 70 : Math.floor(Math.random() * 50) + 30,
                physical: Math.floor(Math.random() * 50) + 40
            });
        }
        
        // Adicionar alguns lendários
        playersDB.push({id: 220, name: "Pelé", rating: 99, position: "CAM", nation: "🇧🇷", value: 15000, pace: 95, shooting: 98, passing: 94, defending: 65, physical: 85});
        playersDB.push({id: 221, name: "Maradona", rating: 98, position: "CAM", nation: "🇦🇷", value: 14000, pace: 92, shooting: 97, passing: 96, defending: 50, physical: 80});
        playersDB.push({id: 222, name: "Ronaldinho", rating: 97, position: "LW", nation: "🇧🇷", value: 13000, pace: 94, shooting: 90, passing: 95, defending: 45, physical: 82});
        
        // Sistema de estado do jogo
        let playerCoins = 5000;
        let playerTeam = []; // até 11 jogadores
        let availablePacks = 3;
        let currentRevealedCard = null;
        
        // Elementos UI
        const coinsSpan = document.getElementById('coins');
        const teamCountSpan = document.getElementById('team-count');
        const packCountSpan = document.getElementById('pack-count');
        const teamListDiv = document.getElementById('team-list');
        const matchResultDiv = document.getElementById('match-result');
        const quickSellBtn = document.getElementById('quick-sell-btn');
        const simulateMatchBtn = document.getElementById('simulate-match-btn');
        
        // Função para atualizar UI
        function updateUI() {
            coinsSpan.textContent = playerCoins;
            teamCountSpan.textContent = `${playerTeam.length}/11`;
            packCountSpan.textContent = availablePacks;
            renderTeamList();
        }
        
        // Renderizar lista de equipa
        function renderTeamList() {
            teamListDiv.innerHTML = '';
            if (playerTeam.length === 0) {
                teamListDiv.innerHTML = '<div style="color:#aaa;">Nenhum jogador na equipa</div>';
                return;
            }
            playerTeam.forEach((player, idx) => {
                const div = document.createElement('div');
                div.className = 'team-player';
                div.innerHTML = `
                    <span><strong>${player.rating}</strong> ${player.name} (${player.position}) ${player.nation}</span>
                    <button class="remove-player" data-idx="${idx}" style="background:#c0392b; padding:2px 8px; font-size:0.7rem;">🗑️</button>
                `;
                teamListDiv.appendChild(div);
            });
            
            // Adicionar eventos de remover
            document.querySelectorAll('.remove-player').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const idx = parseInt(btn.dataset.idx);
                    playerTeam.splice(idx, 1);
                    updateUI();
                    showMessage(`Jogador removido da equipa.`, 1500);
                });
            });
        }
        
        function showMessage(msg, duration = 2000) {
            const msgDiv = document.createElement('div');
            msgDiv.textContent = msg;
            msgDiv.style.position = 'fixed';
            msgDiv.style.bottom = '50%';
            msgDiv.style.left = '50%';
            msgDiv.style.transform = 'translate(-50%, -50%)';
            msgDiv.style.backgroundColor = 'rgba(0,0,0,0.9)';
            msgDiv.style.color = '#ffd700';
            msgDiv.style.padding = '15px 30px';
            msgDiv.style.borderRadius = '40px';
            msgDiv.style.zIndex = '1000';
            msgDiv.style.fontWeight = 'bold';
            msgDiv.style.border = '2px solid gold';
            document.body.appendChild(msgDiv);
            setTimeout(() => msgDiv.remove(), duration);
        }
        
        // Abrir pack com animação 3D
        function openPack(packType) {
            let cost = 0;
            let minRating = 60, maxRating = 85;
            if (packType === 'bronze') { cost = 100; minRating = 60; maxRating = 74; }
            else if (packType === 'silver') { cost = 300; minRating = 75; maxRating = 84; }
            else if (packType === 'gold') { cost = 500; minRating = 85; maxRating = 99; }
            
            if (playerCoins < cost) {
                showMessage("Moedas insuficientes!", 1500);
                return;
            }
            if (availablePacks <= 0) {
                showMessage("Sem packs disponíveis! Compre mais na loja (simulado).", 1500);
                return;
            }
            
            playerCoins -= cost;
            availablePacks--;
            updateUI();
            
            // Sortear jogador baseado no rating
            const possiblePlayers = playersDB.filter(p => p.rating >= minRating && p.rating <= maxRating);
            if (possiblePlayers.length === 0) {
                showMessage("Erro: nenhum jogador encontrado!", 1500);
                return;
            }
            const drawnPlayer = possiblePlayers[Math.floor(Math.random() * possiblePlayers.length)];
            currentRevealedCard = { ...drawnPlayer };
            
            // Animação 3D do pack
            animatePackOpen(() => {
                showCardReveal(currentRevealedCard);
            });
        }
        
        // Animação 3D com Three.js
        let scene, camera, renderer, packMesh;
        function init3D() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050b1a);
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 2, 5);
            camera.lookAt(0, 0, 0);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);
            
            // Luzes
            const ambientLight = new THREE.AmbientLight(0x404060);
            scene.add(ambientLight);
            const dirLight = new THREE.DirectionalLight(0xffffff, 1);
            dirLight.position.set(2, 5, 3);
            dirLight.castShadow = true;
            scene.add(dirLight);
            const backLight = new THREE.PointLight(0xffaa00, 0.5);
            backLight.position.set(0, 1, -2);
            scene.add(backLight);
            
            // Pack 3D (caixa dourada)
            const geometry = new THREE.BoxGeometry(1.2, 1.2, 1.2);
            const material = new THREE.MeshStandardMaterial({ color: 0xffaa33, metalness: 0.8, roughness: 0.2, emissive: 0x442200 });
            packMesh = new THREE.Mesh(geometry, material);
            packMesh.castShadow = true;
            packMesh.position.y = 0;
            scene.add(packMesh);
            
            // Adicionar efeito de partículas ao redor
            const particleGeo = new THREE.BufferGeometry();
            const particleCount = 500;
            const positions = new Float32Array(particleCount * 3);
            for (let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 10;
                positions[i*3+1] = (Math.random() - 0.5) * 5;
                positions[i*3+2] = (Math.random() - 0.5) * 8 - 3;
            }
            particleGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const particleMat = new THREE.PointsMaterial({ color: 0xffaa55, size: 0.05 });
            const particles = new THREE.Points(particleGeo, particleMat);
            scene.add(particles);
            
            function animate() {
                requestAnimationFrame(animate);
                if (packMesh) {
                    packMesh.rotation.y += 0.01;
                    packMesh.rotation.x = Math.sin(Date.now() * 0.002) * 0.2;
                }
                particles.rotation.y += 0.005;
                renderer.render(scene, camera);
            }
            animate();
            
            window.addEventListener('resize', onWindowResize, false);
            function onWindowResize() {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            }
        }
        
        function animatePackOpen(callback) {
            // Animação de abertura: escala e rotação rápida, depois desaparece
            let startTime = Date.now();
            const duration = 800;
            function step() {
                const elapsed = Date.now() - startTime;
                const t = Math.min(1, elapsed / duration);
                if (packMesh) {
                    const scale = 1 + t * 2;
                    packMesh.scale.set(scale, scale, scale);
                    packMesh.material.emissiveIntensity = t * 2;
                    if (t >= 0.8) packMesh.visible = false;
                }
                if (t < 1) requestAnimationFrame(step);
                else {
                    // Reset pack para próximo
                    if (packMesh) {
                        packMesh.scale.set(1, 1, 1);
                        packMesh.material.emissiveIntensity = 0;
                        packMesh.visible = true;
                    }
                    callback();
                }
            }
            step();
        }
        
        function showCardReveal(player) {
            const revealDiv = document.getElementById('card-reveal');
            revealDiv.innerHTML = `
                <div class="card-display">
                    <div class="player-name">${player.name} ${player.nation}</div>
                    <div class="player-rating">⭐ Overall: ${player.rating}</div>
                    <div class="player-position">${player.position}</div>
                    <div class="card-actions">
                        <button class="action-btn add-to-team">➕ Meter na Equipa</button>
                        <button class="action-btn quick-sell-card">💰 Quick Sell (${player.value} coins)</button>
                    </div>
                </div>
            `;
            
            // Adicionar eventos
            document.querySelector('.add-to-team')?.addEventListener('click', () => {
                if (playerTeam.length >= 11) {
                    showMessage("Equipa cheia! Remova um jogador primeiro.", 1500);
                    return;
                }
                playerTeam.push({...player});
                updateUI();
                revealDiv.innerHTML = '';
                showMessage(`${player.name} adicionado à equipa!`, 1500);
                currentRevealedCard = null;
            });
            
            document.querySelector('.quick-sell-card')?.addEventListener('click', () => {
                playerCoins += player.value;
                updateUI();
                revealDiv.innerHTML = '';
                showMessage(`Vendeu ${player.name} por ${player.value} moedas!`, 1500);
                currentRevealedCard = null;
            });
            
            // Auto desaparecer após 15 segundos
            setTimeout(() => {
                if (revealDiv.innerHTML !== '') revealDiv.innerHTML = '';
            }, 15000);
        }
        
        // Simular partida contra bot
        function simulateMatch() {
            if (playerTeam.length < 11) {
                showMessage("Precisa de 11 jogadores para simular uma partida!", 1500);
                return;
            }
            
            // Calcular força da equipa
            const teamAvg = playerTeam.reduce((sum, p) => sum + p.rating, 0) / playerTeam.length;
            const botRating = 70 + Math.random() * 20;
            const homeAdvantage = 5;
            const teamScore = teamAvg + (Math.random() * 15);
            const botScore = botRating + (Math.random() * 15);
            
            let goalsTeam = Math.floor(Math.max(0, teamScore / 15));
            let goalsBot = Math.floor(Math.max(0, botScore / 15));
            
            // Aleatoriedade extra
            if (Math.random() < 0.2) goalsTeam++;
            if (Math.random() < 0.2) goalsBot++;
            
            const result = goalsTeam > goalsBot ? "VITÓRIA" : goalsTeam === goalsBot ? "EMPATE" : "DERROTA";
            const coinsReward = result === "VITÓRIA" ? 300 : result === "EMPATE" ? 100 : 0;
            if (coinsReward > 0) {
                playerCoins += coinsReward;
                updateUI();
            }
            
            // Estatísticas e relato
            const possessionTeam = 40 + Math.random() * 40;
            const shotsTeam = 5 + Math.floor(Math.random() * 12);
            const shotsBot = 3 + Math.floor(Math.random() * 10);
            const motm = playerTeam[Math.floor(Math.random() * playerTeam.length)];
            
            let commentary = "";
            if (result === "VITÓRIA") commentary = `🎉 Incrível! A equipa dominou e garantiu os 3 pontos! ${motm.name} foi eleito o melhor em campo.`;
            else if (result === "EMPATE") commentary = `😐 Jogo equilibrado, um ponto conquistado. A equipa precisa melhorar nas finalizações.`;
            else commentary = `😞 Derrota amarga. O adversário foi superior. É preciso treinar mais!`;
            
            matchResultDiv.innerHTML = `
                <strong>🏆 RESULTADO FINAL</strong><br>
                ⚽ ${goalsTeam} - ${goalsBot} ⚽<br>
                <strong>${result}</strong><br>
                📊 Posse: ${possessionTeam.toFixed(0)}% | Finalizações: ${shotsTeam} - ${shotsBot}<br>
                🌟 Melhor em campo: ${motm.name} (Rating ${motm.rating})<br>
                ${coinsReward > 0 ? `💰 +${coinsReward} moedas` : ''}<br>
                <div class="commentary">📝 ${commentary}</div>
            `;
            
            showMessage(`Partida finalizada: ${goalsTeam} - ${goalsBot}`, 2000);
        }
        
        // Quick Sell da última carta revelada ou venda em massa (apenas último)
        quickSellBtn.addEventListener('click', () => {
            if (currentRevealedCard) {
                playerCoins += currentRevealedCard.value;
                updateUI();
                document.getElementById('card-reveal').innerHTML = '';
                showMessage(`Quick Sell: ${currentRevealedCard.name} vendido por ${currentRevealedCard.value} coins!`, 1500);
                currentRevealedCard = null;
            } else {
                showMessage("Nenhuma carta aberta para vender rapidamente!", 1500);
            }
        });
        
        simulateMatchBtn.addEventListener('click', simulateMatch);
        
        // Eventos dos packs
        document.querySelectorAll('.pack-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const packType = btn.dataset.pack;
                openPack(packType);
            });
        });
        
        // Inicializar
        init3D();
        updateUI();
        
        // Adicionar alguns jogadores de exemplo à equipa para teste
        // (opcional: descomentar para demo)
        // playerTeam.push(playersDB[0], playersDB[5], playersDB[10]);
        // updateUI();
        
        showMessage("Bem-vindo ao EA FC Pack Opener! Abre packs, constrói a tua equipa e simula partidas!", 4000);
    </script>
</body>
</html>
