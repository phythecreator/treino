<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameHub - 20 Jogos Incríveis</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Orbitron:wght@400;700&display=swap');

    :root {
      --primary: #00ff9d;
      --accent: #ff00aa;
      --bg: #0a0a1f;
      --card: #1a1a3a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #0a0a1f 0%, #1a0033 100%);
      color: white;
      font-family: 'Orbitron', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
      background: rgba(0,0,0,0.6);
      border-bottom: 3px solid var(--primary);
    }

    h1 {
      font-family: 'Press Start 2P', cursive;
      font-size: 3.5rem;
      background: linear-gradient(to right, var(--primary), var(--accent));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 0 30px rgba(0,255,157,0.5);
    }

    .coins {
      position: absolute;
      top: 30px;
      right: 40px;
      background: var(--card);
      padding: 10px 20px;
      border-radius: 50px;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      gap: 10px;
      border: 2px solid var(--primary);
    }

    .container {
      max-width: 1400px;
      margin: 40px auto;
      padding: 0 20px;
    }

    .section {
      margin-bottom: 60px;
    }

    .section h2 {
      font-size: 2rem;
      margin-bottom: 25px;
      text-align: center;
      color: var(--primary);
      text-shadow: 0 0 15px var(--primary);
    }

    .games-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 25px;
    }

    .game-card {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      transition: all 0.4s ease;
      border: 2px solid transparent;
      position: relative;
    }

    .game-card:hover {
      transform: translateY(-15px) scale(1.05);
      box-shadow: 0 0 40px rgba(0, 255, 157, 0.6);
      border-color: var(--primary);
    }

    .game-card img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .game-info {
      padding: 20px;
      text-align: center;
    }

    .game-info h3 {
      font-size: 1.4rem;
      margin-bottom: 10px;
    }

    .play-btn {
      background: linear-gradient(to right, var(--primary), #00cc7a);
      color: black;
      border: none;
      padding: 12px 30px;
      border-radius: 50px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1.1rem;
    }

    .play-btn:hover {
      background: linear-gradient(to right, #ff00aa, var(--accent));
      color: white;
      transform: scale(1.1);
    }

    .casino {
      border-color: var(--accent);
    }

    footer {
      text-align: center;
      padding: 30px;
      color: #666;
      font-size: 0.9rem;
    }

    .particles {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: -1;
      opacity: 0.15;
    }
  </style>
</head>
<body>

  <header>
    <h1>GAMEHUB</h1>
    <div class="coins" id="coinDisplay">
      💰 <span id="coinCount">2500</span> Coins
    </div>
  </header>

  <div class="container">

    <!-- === JOGOS NORMAIS (15) === -->
    <div class="section">
      <h2>🎮 15 Jogos Normais</h2>
      <div class="games-grid" id="normalGames"></div>
    </div>

    <!-- === JOGOS DE CASINO (5) === -->
    <div class="section">
      <h2>🎰 5 Jogos de Casino</h2>
      <div class="games-grid" id="casinoGames"></div>
    </div>

  </div>

  <footer>
    GameHub © 2026 - Feito com ❤️ para diversão. Todos os jogos rodam no navegador.
  </footer>

  <canvas class="particles" id="particles"></canvas>

  <script>
    // Sistema de moedas (salvo no localStorage)
    let coins = parseInt(localStorage.getItem('gameHubCoins')) || 2500;
    document.getElementById('coinCount').textContent = coins;

    function updateCoins(amount) {
      coins += amount;
      localStorage.setItem('gameHubCoins', coins);
      document.getElementById('coinCount').textContent = coins;
    }

    // Lista de 15 jogos normais (podes mudar os nomes e pastas)
    const normalGames = [
      { name: "Racing Turbo",       folder: "racing",       img: "https://picsum.photos/id/1015/300/180" },
      { name: "Futebol Arena",      folder: "futebol",      img: "https://picsum.photos/id/201/300/180" },
      { name: "Basketball Hoops",   folder: "basketball",   img: "https://picsum.photos/id/237/300/180" },
      { name: "Flappy Bird",        folder: "flappy",       img: "https://picsum.photos/id/180/300/180" },
      { name: "Snake Classic",      folder: "snake",        img: "https://picsum.photos/id/251/300/180" },
      { name: "Tetris",             folder: "tetris",       img: "https://picsum.photos/id/133/300/180" },
      { name: "Pong 2P",            folder: "pong",         img: "https://picsum.photos/id/180/300/180" },
      { name: "Space Invaders",     folder: "space",        img: "https://picsum.photos/id/1016/300/180" },
      { name: "Platformer Hero",    folder: "platformer",   img: "https://picsum.photos/id/201/300/180" },
      { name: "Breakout",           folder: "breakout",     img: "https://picsum.photos/id/133/300/180" },
      { name: "2048",               folder: "2048",         img: "https://picsum.photos/id/251/300/180" },
      { name: "Memory Match",       folder: "memory",       img: "https://picsum.photos/id/180/300/180" },
      { name: "Rock Paper Scissors",folder: "rps",          img: "https://picsum.photos/id/1015/300/180" },
      { name: "Endless Runner",     folder: "runner",       img: "https://picsum.photos/id/201/300/180" },
      { name: "Pac-Man Clone",      folder: "pacman",       img: "https://picsum.photos/id/237/300/180" }
    ];

    // 5 jogos de casino
    const casinoGames = [
      { name: "🎰 Slots Machine",   folder: "slots",        img: "https://picsum.photos/id/1018/300/180" },
      { name: "💣 Mines",           folder: "mines",        img: "https://picsum.photos/id/133/300/180" },
      { name: "🎡 Roulette",        folder: "roulette",     img: "https://picsum.photos/id/180/300/180" },
      { name: "🃏 Blackjack",       folder: "blackjack",    img: "https://picsum.photos/id/201/300/180" },
      { name: "🚀 Crash",           folder: "crash",        img: "https://picsum.photos/id/251/300/180" }
    ];

    // Gerar cards
    function createGameCard(game, isCasino = false) {
      const card = document.createElement('div');
      card.className = `game-card ${isCasino ? 'casino' : ''}`;
      card.innerHTML = `
        <img src="${game.img}" alt="${game.name}">
        <div class="game-info">
          <h3>${game.name}</h3>
          <button class="play-btn" onclick="playGame('${game.folder}', ${isCasino})">JOGAR AGORA</button>
        </div>
      `;
      return card;
    }

    normalGames.forEach(game => {
      document.getElementById('normalGames').appendChild(createGameCard(game));
    });

    casinoGames.forEach(game => {
      document.getElementById('casinoGames').appendChild(createGameCard(game, true));
    });

    // Função para abrir o jogo
    function playGame(folder, isCasino) {
      window.open(`games/${folder}/index.html`, '_blank');
      // Exemplo: dar moedas ao voltar (podes melhorar depois)
      if (Math.random() > 0.7) {
        setTimeout(() => {
          updateCoins(isCasino ? 150 : 50);
          alert(`🎉 Ganhaste ${isCasino ? 150 : 50} coins!`);
        }, 3000);
      }
    }

    // Partículas de fundo simples
    const canvas = document.getElementById('particles');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let particles = [];
    class Particle {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 3 + 1;
        this.speed = Math.random() * 0.5 + 0.2;
      }
      update() {
        this.y += this.speed;
        if (this.y > canvas.height) this.y = 0;
      }
      draw() {
        ctx.fillStyle = '#00ff9d';
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < 80; i++) particles.push(new Particle());

    function animateParticles() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.update();
        p.draw();
      });
      requestAnimationFrame(animateParticles);
    }
    animateParticles();

    window.addEventListener('resize', () => {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    });
  </script>
</body>
</html>
