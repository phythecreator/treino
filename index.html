<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUILDFORGE — PC Builder</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Share+Tech+Mono&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#080c10;--bg2:#0d1117;--panel:#0f1822;--border:#1e3048;
  --accent:#00d4ff;--accent2:#ff6b2b;--green:#7fff00;
  --text:#c8d8e8;--dim:#4a6a8a;--bright:#e8f4ff;--red:#ff3a3a;--gold:#ffd700;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif}
a,button{cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
/* HEADER */
#header{position:fixed;top:0;left:0;right:0;height:56px;z-index:200;background:rgba(8,12,16,.95);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 1.5rem;gap:1rem}
#logo{font-size:1.6rem;font-weight:700;color:var(--accent);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
#logo span{color:var(--accent2)}
.nav-btn{background:none;border:1px solid transparent;color:var(--dim);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;padding:.35rem .9rem;border-radius:3px;transition:all .2s;white-space:nowrap}
.nav-btn:hover,.nav-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(0,212,255,.07)}
#mybuildBtn{margin-left:auto;background:linear-gradient(135deg,var(--accent2),#ff9500);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;border:none;padding:.4rem 1.2rem;border-radius:3px;white-space:nowrap;transition:all .2s}
#mybuildBtn:hover{box-shadow:0 3px 15px rgba(255,107,43,.5)}
/* LAYOUT */
#app{margin-top:56px;display:flex;min-height:calc(100vh - 56px)}
/* SIDEBAR */
#sidebar{width:340px;min-width:340px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:56px;bottom:0;left:-340px;overflow-y:auto;padding:1.2rem;transition:left .3s;z-index:150}
#sidebar.open{left:0}
.sb-title{font-size:1rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--accent);margin-bottom:1rem}
.slot{display:flex;align-items:center;gap:.6rem;padding:.5rem .7rem;background:var(--panel);border:1px solid var(--border);border-radius:4px;margin-bottom:.35rem;min-height:48px}
.slot-ico{font-size:1.1rem;width:22px;text-align:center}
.slot-info{flex:1;min-width:0}
.slot-type{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em}
.slot-name{font-size:.78rem;color:var(--bright);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.slot-price{font-size:.9rem;font-weight:700;color:var(--green);white-space:nowrap}
.slot-x{background:none;border:none;color:var(--dim);font-size:.9rem;padding:.2rem;transition:color .15s}
.slot-x:hover{color:var(--red)}
.slot.empty .slot-name{color:var(--dim);font-style:italic}
#totalRow{margin-top:.8rem;padding:.8rem 1rem;background:var(--panel);border:1px solid var(--accent);border-radius:4px;display:flex;justify-content:space-between;align-items:center}
#totalRow .lbl{font-weight:700;font-size:.9rem;text-transform:uppercase;letter-spacing:.08em}
#totalAmt{font-size:1.8rem;font-weight:700;color:var(--gold)}
#compatBox{margin-top:.6rem;padding:.6rem .8rem;border-radius:4px;font-size:.75rem;font-family:'Share Tech Mono',monospace;line-height:1.4}
.ok{background:rgba(127,255,0,.07);border:1px solid rgba(127,255,0,.3);color:var(--green)}
.warn{background:rgba(255,165,0,.07);border:1px solid rgba(255,165,0,.3);color:orange}
.err{background:rgba(255,58,58,.07);border:1px solid rgba(255,58,58,.3);color:var(--red)}
.sb-actions{margin-top:.8rem;display:flex;flex-direction:column;gap:.45rem}
.btn-p{background:linear-gradient(135deg,var(--accent2),#ff9500);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.9rem;letter-spacing:.08em;text-transform:uppercase;border:none;padding:.65rem;border-radius:4px;width:100%;transition:all .2s}
.btn-p:hover{box-shadow:0 3px 15px rgba(255,107,43,.4)}
.btn-s{background:transparent;color:var(--accent);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.85rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--accent);padding:.55rem;border-radius:4px;width:100%;transition:all .2s}
.btn-s:hover{background:rgba(0,212,255,.08)}
.btn-d{background:transparent;color:var(--dim);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.8rem;letter-spacing:.08em;text-transform:uppercase;border:1px solid var(--border);padding:.5rem;border-radius:4px;width:100%;transition:all .2s}
.btn-d:hover{border-color:var(--red);color:var(--red)}
/* MAIN */
#main{flex:1;overflow-y:auto;transition:margin-left .3s}
#main.shifted{margin-left:340px}
.page{display:none}
.page.active{display:block}
/* HERO */
#hero{position:relative;padding:3rem 2rem 2.5rem;text-align:center;overflow:hidden;background:radial-gradient(ellipse at 50% 0%,rgba(0,212,255,.08) 0%,transparent 70%)}
#hero::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,212,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.04) 1px,transparent 1px);background-size:50px 50px;animation:gm 20s linear infinite}
@keyframes gm{to{background-position:50px 50px}}
#hero h1{position:relative;font-size:clamp(2.2rem,6vw,4.5rem);font-weight:700;text-transform:uppercase;letter-spacing:.05em;background:linear-gradient(135deg,#fff 30%,var(--accent) 70%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#hero p{position:relative;font-family:'Share Tech Mono',monospace;font-size:.85rem;color:var(--dim);margin-top:.6rem;letter-spacing:.05em}
.hero-stats{position:relative;display:flex;justify-content:center;gap:3rem;margin-top:1.8rem;flex-wrap:wrap}
.hv{font-size:1.8rem;font-weight:700;color:var(--accent)}
.hl{font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:.1rem}
/* CAT TABS */
#catTabs{display:flex;overflow-x:auto;border-bottom:1px solid var(--border);background:var(--bg2);position:sticky;top:0;z-index:10;scrollbar-width:none}
#catTabs::-webkit-scrollbar{display:none}
.cat-btn{flex-shrink:0;background:none;border:none;border-bottom:2px solid transparent;color:var(--dim);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.82rem;letter-spacing:.08em;text-transform:uppercase;padding:.8rem 1.1rem;white-space:nowrap;transition:all .2s}
.cat-btn:hover{color:var(--text)}
.cat-btn.active{color:var(--accent);border-bottom-color:var(--accent);background:rgba(0,212,255,.05)}
/* FILTERS */
#filterBar{display:flex;gap:.4rem;padding:.9rem 1.5rem;flex-wrap:wrap;align-items:center;border-bottom:1px solid var(--border);background:var(--bg)}
.fbtn{background:var(--panel);border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.68rem;text-transform:uppercase;letter-spacing:.04em;padding:.3rem .7rem;border-radius:3px;transition:all .15s}
.fbtn:hover,.fbtn.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.07)}
#searchBox{margin-left:auto;background:var(--panel);border:1px solid var(--border);color:var(--text);font-family:'Share Tech Mono',monospace;font-size:.75rem;padding:.35rem .7rem;border-radius:3px;outline:none;width:200px;transition:border-color .2s}
#searchBox:focus{border-color:var(--accent)}
/* PRODUCT GRID */
#productGrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.9rem;padding:1.2rem 1.5rem}
.pcard{background:#0c1520;border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:all .2s;position:relative}
.pcard:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 6px 25px rgba(0,212,255,.1)}
.pcard.selected{border-color:var(--green);box-shadow:0 0 18px rgba(127,255,0,.12)}
.pbadge{position:absolute;top:.5rem;right:.5rem;font-family:'Share Tech Mono',monospace;font-size:.58rem;text-transform:uppercase;padding:.15rem .45rem;border-radius:2px;letter-spacing:.04em;z-index:1}
.badge-top{background:rgba(255,215,0,.12);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.badge-hot{background:rgba(255,58,58,.12);color:var(--red);border:1px solid rgba(255,58,58,.3)}
.badge-new{background:rgba(0,212,255,.12);color:var(--accent);border:1px solid rgba(0,212,255,.3)}
.badge-sale{background:rgba(127,255,0,.12);color:var(--green);border:1px solid rgba(127,255,0,.3)}
.pimg{height:110px;background:linear-gradient(135deg,#111820,var(--panel));display:flex;align-items:center;justify-content:center;font-size:3rem}
.pbody{padding:.75rem .9rem}
.pbrand{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--accent);text-transform:uppercase;letter-spacing:.08em}
.pname{font-size:.9rem;font-weight:700;color:var(--bright);line-height:1.3;margin:.15rem 0 .3rem}
.pspecs{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--dim);line-height:1.65}
.pfoot{display:flex;align-items:center;justify-content:space-between;padding:.6rem .9rem;background:rgba(0,0,0,.2);border-top:1px solid var(--border)}
.pprice{font-size:1.2rem;font-weight:700;color:var(--bright)}
.pprice .cur{font-size:.85rem;color:var(--dim)}
.pchange{font-family:'Share Tech Mono',monospace;font-size:.62rem;margin-top:.1rem}
.up{color:var(--red)}.dn{color:var(--green)}
.pbtns{display:flex;flex-direction:column;gap:.3rem;align-items:flex-end}
.addbtn{background:var(--accent);color:#000;font-family:'Rajdhani',sans-serif;font-weight:700;font-size:.75rem;letter-spacing:.05em;text-transform:uppercase;border:none;padding:.35rem .8rem;border-radius:3px;transition:all .15s}
.addbtn:hover{background:#33e0ff}
.addbtn.added{background:var(--green)}
.chartbtn{background:none;border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.6rem;padding:.2rem .5rem;border-radius:3px;transition:all .15s}
.chartbtn:hover{border-color:var(--accent);color:var(--accent)}
/* VIEWER */
#viewerPage{padding:2rem 1.5rem}
.viewer-box{background:var(--panel);border:1px solid var(--border);border-radius:8px;padding:2rem;display:flex;flex-direction:column;align-items:center;min-height:420px;position:relative;overflow:hidden}
.viewer-box::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 30%,rgba(0,212,255,.05) 0%,transparent 70%);pointer-events:none}
.pc-wrap{position:relative;width:240px;height:320px;perspective:800px;margin-bottom:1rem}
.pc-body{width:240px;height:320px;position:relative;transform-style:preserve-3d;animation:rotpc 10s linear infinite}
@keyframes rotpc{0%{transform:rotateY(0deg) rotateX(8deg)}100%{transform:rotateY(360deg) rotateX(8deg)}}
.pc-front{position:absolute;inset:0;background:linear-gradient(160deg,#1a2535,#0c1520);border:1px solid rgba(0,212,255,.25);border-radius:6px;display:flex;flex-direction:column;align-items:center;padding:16px;gap:10px}
.glass-panel{width:160px;height:210px;background:linear-gradient(135deg,rgba(0,212,255,.04),rgba(127,255,0,.02));border:1px solid rgba(0,212,255,.25);border-radius:4px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.rgb-wheel{position:absolute;inset:-30%;background:conic-gradient(rgba(255,0,0,.25) 0deg,rgba(255,165,0,.25) 60deg,rgba(255,255,0,.25) 120deg,rgba(0,255,0,.25) 180deg,rgba(0,212,255,.25) 240deg,rgba(0,0,255,.25) 300deg,rgba(255,0,255,.25) 360deg);animation:rgbs 4s linear infinite;border-radius:50%}
@keyframes rgbs{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.internals{position:relative;z-index:2;display:flex;flex-direction:column;gap:6px;align-items:center}
.mb{width:120px;height:80px;background:rgba(10,40,10,.85);border:1px solid rgba(0,200,50,.3);border-radius:3px}
.gpu-bar{width:110px;height:34px;background:rgba(10,10,50,.85);border:1px solid rgba(80,80,255,.35);border-radius:3px}
.ram-row{display:flex;gap:3px}
.ram-s{width:14px;height:44px;background:rgba(40,10,40,.85);border:1px solid rgba(180,80,180,.35);border-radius:2px}
.case-fan{position:absolute;top:8px;right:8px;width:50px;height:50px}
.fan-ring{width:50px;height:50px;border:2px solid rgba(0,212,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:fs .25s linear infinite}
@keyframes fs{from{transform:rotate(0)}to{transform:rotate(360deg)}}
.fblade{position:absolute;width:5px;height:18px;background:rgba(0,212,255,.5);border-radius:2px;transform-origin:bottom center}
.leds{display:flex;gap:6px;margin-top:6px}
.led{width:7px;height:7px;border-radius:50%;animation:lp 2s ease-in-out infinite}
.led:nth-child(1){background:var(--accent);animation-delay:0s}
.led:nth-child(2){background:var(--accent2);animation-delay:.3s}
.led:nth-child(3){background:var(--green);animation-delay:.6s}
@keyframes lp{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.1);box-shadow:0 0 6px currentColor}}
.viewer-label{font-family:'Share Tech Mono',monospace;font-size:.72rem;color:var(--dim);text-align:center;margin-top:.5rem}
#buildSpecTable{margin-top:1.5rem;background:var(--bg2);border:1px solid var(--border);border-radius:6px;overflow:hidden;width:100%;max-width:700px}
.bst-head{padding:.75rem 1.2rem;border-bottom:1px solid var(--border);font-size:.9rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--accent)}
.bst-row{display:flex;border-bottom:1px solid rgba(30,48,72,.4);align-items:center}
.bst-type{width:130px;flex-shrink:0;padding:.55rem 1.2rem;font-family:'Share Tech Mono',monospace;font-size:.65rem;color:var(--dim);text-transform:uppercase}
.bst-name{flex:1;padding:.55rem .8rem;font-size:.82rem;color:var(--bright)}
.bst-price{width:90px;flex-shrink:0;padding:.55rem 1.2rem;font-weight:700;color:var(--green);text-align:right;font-size:.88rem}
.bst-total{background:rgba(0,212,255,.05);display:flex;justify-content:space-between;padding:.8rem 1.2rem}
.bst-total .lbl{font-weight:700;text-transform:uppercase;letter-spacing:.08em;font-size:.9rem}
.bst-total .val{font-size:1.4rem;font-weight:700;color:var(--gold)}
/* GAMING */
#gamingPage{padding:2rem 1.5rem}
.game-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:.9rem}
.gcard{background:#0c1520;border:1px solid var(--border);border-radius:6px;overflow:hidden;transition:border-color .2s}
.gcard:hover{border-color:rgba(0,212,255,.3)}
.gcard-head{display:flex;align-items:center;gap:.9rem;padding:.9rem 1rem;border-bottom:1px solid var(--border)}
.gico{font-size:1.8rem}
.gtitle{flex:1}
.gname{font-size:.9rem;font-weight:700;color:var(--bright)}
.ggenre{font-family:'Share Tech Mono',monospace;font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.05em;margin-top:.1rem}
.grank{font-size:1.4rem;font-weight:700;color:var(--dim)}
.grank.g3{color:var(--gold)}
.fps-section{padding:.7rem 1rem .9rem}
.fps-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.4rem}
.fps-lbl{font-family:'Share Tech Mono',monospace;font-size:.62rem;color:var(--dim);text-align:right;width:45px;flex-shrink:0}
.fps-track{flex:1;height:13px;background:var(--panel);border-radius:2px;overflow:hidden}
.fps-fill{height:100%;border-radius:2px;display:flex;align-items:center;padding-right:5px;justify-content:flex-end;min-width:30px}
.fps-fill.f1{background:linear-gradient(90deg,var(--green),#5aad00)}
.fps-fill.f2{background:linear-gradient(90deg,var(--accent),#0099cc)}
.fps-fill.f3{background:linear-gradient(90deg,var(--accent2),#cc4400)}
.fps-num{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:rgba(0,0,0,.85);font-weight:bold}
.no-build{padding:2.5rem;text-align:center;border:1px dashed var(--border);border-radius:6px}
.no-build .ico{font-size:2.5rem;margin-bottom:.7rem}
.no-build p{font-family:'Share Tech Mono',monospace;font-size:.78rem;color:var(--dim);line-height:1.7}
/* MODAL */
#modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(12px);z-index:500;align-items:center;justify-content:center;padding:1.5rem}
#modal.open{display:flex}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:8px;width:100%;max-width:720px;max-height:90vh;overflow-y:auto}
.modal-head{padding:1.3rem 1.5rem;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:flex-start}
.modal-title{font-size:1.1rem;font-weight:700;color:var(--bright)}
.modal-sub{font-family:'Share Tech Mono',monospace;font-size:.68rem;color:var(--accent);margin-top:.2rem}
.modal-x{background:none;border:1px solid var(--border);color:var(--dim);width:30px;height:30px;border-radius:4px;font-size:1rem;flex-shrink:0;transition:all .15s}
.modal-x:hover{border-color:var(--red);color:var(--red)}
.modal-body{padding:1.3rem 1.5rem}
.ptabs{display:flex;gap:.3rem;margin-bottom:1rem}
.ptab{background:var(--panel);border:1px solid var(--border);color:var(--dim);font-family:'Share Tech Mono',monospace;font-size:.7rem;text-transform:uppercase;padding:.3rem .75rem;border-radius:3px;transition:all .15s}
.ptab.active{border-color:var(--accent);color:var(--accent);background:rgba(0,212,255,.07)}
#chartWrap{position:relative;height:220px;margin-bottom:.8rem;background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:.8rem}
#chartSvg{width:100%;height:100%}
.pstats{display:grid;grid-template-columns:repeat(4,1fr);gap:.6rem;margin-top:.8rem}
.ps{background:var(--panel);border:1px solid var(--border);border-radius:4px;padding:.6rem;text-align:center}
.ps-l{font-family:'Share Tech Mono',monospace;font-size:.58rem;color:var(--dim);text-transform:uppercase;letter-spacing:.04em}
.ps-v{font-size:1rem;font-weight:700;color:var(--bright);margin-top:.2rem}
.modal-actions{display:flex;gap:.5rem;margin-top:1.3rem}
.modal-actions .btn-p{flex:1}
.modal-actions .btn-s{width:140px}
</style>
</head>
<body>

<div id="header">
  <div id="logo">BUILD<span>FORGE</span></div>
  <button class="nav-btn active" onclick="showPage('builder',this)">🔧 Builder</button>
  <button class="nav-btn" onclick="showPage('viewer',this)">🖥️ 3D View</button>
  <button class="nav-btn" onclick="showPage('gaming',this)">🎮 Gaming</button>
  <button id="mybuildBtn" onclick="toggleSidebar()">⚡ MY BUILD</button>
</div>

<div id="app">
  <div id="sidebar">
    <div class="sb-title">⚡ My Build</div>
    <div id="slotList"></div>
    <div id="totalRow"><span class="lbl">Total</span><span id="totalAmt">€0</span></div>
    <div id="compatBox" class="ok">✓ Add components to begin</div>
    <div class="sb-actions">
      <button class="btn-p" onclick="doViewBuild()">🖥️ VIEW 3D BUILD</button>
      <button class="btn-s" onclick="doGaming()">🎮 TEST GAMING PERF</button>
      <button class="btn-d" onclick="clearAll()">🗑️ CLEAR ALL</button>
    </div>
  </div>

  <div id="main">
    <div id="builderPage" class="page active">
      <div id="hero">
        <h1>PC BUILDER</h1>
        <p>// SELECT COMPONENTS · COMPARE PRICES · VISUALIZE YOUR RIG</p>
        <div class="hero-stats">
          <div><div class="hv">176+</div><div class="hl">Components</div></div>
          <div><div class="hv">21</div><div class="hl">Games</div></div>
          <div><div class="hv">365D</div><div class="hl">Price Data</div></div>
          <div><div class="hv">3D</div><div class="hl">Live Viewer</div></div>
        </div>
      </div>
      <div id="catTabs">
        <button class="cat-btn active" onclick="showCat('cpu',this)">⚡ CPU</button>
        <button class="cat-btn" onclick="showCat('gpu',this)">🎮 GPU</button>
        <button class="cat-btn" onclick="showCat('motherboard',this)">🔌 Motherboard</button>
        <button class="cat-btn" onclick="showCat('ram',this)">💾 RAM</button>
        <button class="cat-btn" onclick="showCat('storage',this)">💿 Storage</button>
        <button class="cat-btn" onclick="showCat('cooler',this)">❄️ Cooler</button>
        <button class="cat-btn" onclick="showCat('psu',this)">🔋 PSU</button>
        <button class="cat-btn" onclick="showCat('case',this)">🖥️ Case</button>
      </div>
      <div id="filterBar">
        <button class="fbtn active" onclick="setFilter('',this)">All</button>
        <button class="fbtn" onclick="setFilter('top',this)">⭐ Top</button>
        <button class="fbtn" onclick="setFilter('hot',this)">🔥 Hot</button>
        <button class="fbtn" onclick="setFilter('sale',this)">💰 Sale</button>
        <button class="fbtn" onclick="setFilter('new',this)">🆕 New</button>

function renderSidebar(){

    if(it)total+=it.pr;
    h+='<div class="slot'+(it?'':' empty')+'">'+

        '<div class="slot-type">'+s.lbl+'</div>'+

    '</div>';
  }
  document.getElementById('slotList').innerHTML=h;

  checkCompat();
}

function checkCompat(){
  var el=document.getElementById('compatBox');
  var filled=SLOTS.filter(function(s){return build[s.k];}).length;
  var issues=[];
  if(build.cpu&&build.motherboard){
    var isAMD=build.cpu.br==='AMD';
    var mbAM=build.motherboard.sp.indexOf('AM5')>=0||build.motherboard.sp.indexOf('AM4')>=0;
    var isIntel=build.cpu.br==='Intel';
    var mbLGA=build.motherboard.sp.indexOf('LGA17')>=0||build.motherboard.sp.indexOf('LGA12')>=0;
    if(isAMD&&!mbAM)issues.push('Socket mismatch: AMD CPU needs AM5/AM4 motherboard');
    if(isIntel&&!mbLGA)issues.push('Socket mismatch: Intel CPU needs LGA1700 motherboard');
  }
  if(build.gpu&&build.psu){
    var m=build.psu.sp.match(/(\d+)W/);
    var pw=m?parseInt(m[1]):0;
    var gm2=build.gpu.sp.match(/(\d+)W/);
    var gw=gm2?parseInt(gm2[1]):0;
    var cw=100;
    if(build.cpu){var cm=build.cpu.sp.match(/(\d+)W/);if(cm)cw=parseInt(cm[1]);}
    if(pw&&pw<gw+cw+80)issues.push('PSU may be underpowered ('+pw+'W vs ~'+(gw+cw+80)+'W needed)');
  }
  if(issues.length){el.className='err';el.textContent='⚠ '+issues[0];}
  else if(filled===0){el.className='ok';el.textContent='✓ Add components to begin';}
  else if(filled<8){el.className='warn';el.textContent='ℹ '+filled+'/8 components selected';}
  else{el.className='ok';el.textContent='✓ Full build — looks compatible!';}
}

function genPriceData(base,days){
  var pts=[],labs=[],now=new Date(),p=base*1.06;
  for(var i=days;i>=0;i--){
    var d=new Date(now);d.setDate(d.getDate()-i);
    labs.push(d.toLocaleDateString('en-GB',{day:'2-digit',month:'short'}));
    p+=((Math.random()-.47)*base*.013);
    if(p<base*.72)p=base*.72;
    if(p>base*1.32)p=base*1.32;
    pts.push(parseFloat(p.toFixed(2)));
  }
  return{pts:pts,labs:labs};
}

function drawChart(base,days){
  var data=genPriceData(base,days),pts=data.pts,labs=data.labs;
  var W=640,H=180,pl=55,pr2=10,pt=10,pb=30;
  var cw=W-pl-pr2,ch=H-pt-pb;
  var mn=pts[0],mx=pts[0];
  for(var i=1;i<pts.length;i++){if(pts[i]<mn)mn=pts[i];if(pts[i]>mx)mx=pts[i];}
  var rng=mx-mn||1;
  function xs(i){return pl+i*(cw/(pts.length-1));}
  function ys(v){return pt+ch-((v-mn)/rng*ch);}
  var pathD='',areaD='';
  for(var i=0;i<pts.length;i++){pathD+=(i?'L':'M')+xs(i).toFixed(1)+','+ys(pts[i]).toFixed(1)+' ';}
  areaD=pathD+'L'+xs(pts.length-1).toFixed(1)+','+(pt+ch).toFixed(1)+' L'+pl+','+(pt+ch).toFixed(1)+' Z';
  var ticks='';
  for(var t=0;t<=4;t++){var v=mn+(rng*t/4);var y=ys(v);ticks+='<line x1="'+pl+'" y1="'+y.toFixed(1)+'" x2="'+(W-pr2)+'" y2="'+y.toFixed(1)+'" stroke="rgba(30,48,72,.6)" stroke-width="1"/><text x="'+(pl-4).toFixed(1)+'" y="'+y.toFixed(1)+'" fill="#4a6a8a" font-size="9" text-anchor="end" dominant-baseline="middle" font-family="monospace">€'+Math.round(v)+'</text>';}
  var xlabs='',step=Math.max(1,Math.floor(pts.length/6));
  for(var i=0;i<pts.length;i+=step){xlabs+='<text x="'+xs(i).toFixed(1)+'" y="'+(H-4).toFixed(1)+'" fill="#4a6a8a" font-size="8" text-anchor="middle" font-family="monospace">'+labs[i]+'</text>';}
  document.getElementById('chartSvg').innerHTML='<defs><linearGradient id="cg" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#00d4ff" stop-opacity=".2"/><stop offset="100%" stop-color="#00d4ff" stop-opacity="0"/></linearGradient></defs>'+ticks+xlabs+'<path d="'+areaD+'" fill="url(#cg)"/><path d="'+pathD+'" stroke="#00d4ff" stroke-width="1.8" fill="none"/><circle cx="'+xs(pts.length-1).toFixed(1)+'" cy="'+ys(pts[pts.length-1]).toFixed(1)+'" r="3" fill="#00d4ff"/>';
  var avg=0;for(var i=0;i<pts.length;i++)avg+=pts[i];avg=(avg/pts.length).toFixed(0);
  document.getElementById('pstats').innerHTML='<div class="ps"><div class="ps-l">Current</div><div class="ps-v">€'+pts[pts.length-1]+'</div></div><div class="ps"><div class="ps-l">Low '+days+'D</div><div class="ps-v" style="color:var(--green)">€'+Math.round(mn)+'</div></div><div class="ps"><div class="ps-l">High '+days+'D</div><div class="ps-v" style="color:var(--red)">€'+Math.round(mx)+'</div></div><div class="ps"><div class="ps-l">Avg '+days+'D</div><div class="ps-v">€'+avg+'</div></div>';
}

}

function setPeriod(d,btn){
  document.querySelectorAll('.ptab').forEach(function(t){t.classList.remove('active');});
  btn.classList.add('active');
  if(modalProd)drawChart(modalProd.it.pr,d);
}

function closeModal(){document.getElementById('modal').classList.remove('open');}

function doViewBuild(){
  showPage('viewer',null);
  var filled=SLOTS.filter(function(s){return build[s.k];});
  var lbl=document.getElementById('viewerLabel');
  var tbl=document.getElementById('buildSpecTable');
  if(!filled.length){lbl.textContent='// No build configured — add components first';tbl.innerHTML='';return;}
  lbl.innerHTML='// '+filled.length+'/8 COMPONENTS · RGB: ON · FAN: '+(800+Math.floor(Math.random()*800))+' RPM';
  var total=0,rows='';
  for(var i=0;i<SLOTS.length;i++){
    var s=SLOTS[i],it=build[s.k];
    if(it)total+=it.pr;
    rows+='<div class="bst-row"><div class="bst-type">'+s.lbl+'</div><div class="bst-name">'+(it?it.nm:'<span style="color:var(--dim);font-style:italic">Not selected</span>')+'</div><div class="bst-price">'+(it?'€'+it.pr:'—')+'</div></div>';
  }
  tbl.innerHTML='<div class="bst-head">⚡ Build Specifications</div>'+rows+'<div class="bst-total"><span class="lbl">Total</span><span class="val">€'+total.toLocaleString()+'</span></div>';
}

function doGaming(){
  showPage('gaming',null);
  var gc=document.getElementById('gamingContent');
  var cpu=build.cpu,gpu=build.gpu;
  if(!cpu&&!gpu){gc.innerHTML='<div class="no-build"><div class="ico">🎮</div><p>Add at least a CPU and GPU to estimate gaming performance.<br>Go to Builder → select components → click TEST GAMING PERF</p></div>';return;}
  var gm=0.5;
  if(gpu){if(gpu.pr>1500)gm=1.0;else if(gpu.pr>900)gm=0.85;else if(gpu.pr>600)gm=0.75;else if(gpu.pr>400)gm=0.65;else if(gpu.pr>200)gm=0.52;else gm=0.38;}
  var cm=0.85;
  if(cpu){if(cpu.pr>500)cm=1.0;else if(cpu.pr>300)cm=0.93;else if(cpu.pr>150)cm=0.86;else cm=0.76;}
  var pm=gm*.75+cm*.25;
  var h='<div style="padding:1.2rem 0 1rem;font-family:Share Tech Mono,monospace;font-size:.72rem;color:var(--dim);">ESTIMATED FPS — <span style="color:var(--accent)">'+(gpu?gpu.nm:'No GPU')+'</span> + <span style="color:var(--accent2)">'+(cpu?cpu.nm:'No CPU')+'</span></div>';
  h+='<div style="display:flex;gap:.8rem;margin-bottom:1.2rem;font-family:Share Tech Mono,monospace;font-size:.62rem;color:var(--dim);"><span><span style="display:inline-block;width:14px;height:5px;background:var(--green);border-radius:2px;vertical-align:middle;margin-right:4px;"></span>1080p</span><span><span style="display:inline-block;width:14px;height:5px;background:var(--accent);border-radius:2px;vertical-align:middle;margin-right:4px;"></span>1440p</span><span><span style="display:inline-block;width:14px;height:5px;background:var(--accent2);border-radius:2px;vertical-align:middle;margin-right:4px;"></span>4K</span></div><div class="game-grid">';
  for(var i=0;i<GAMES.length;i++){
    var g=GAMES[i];
    var f1=Math.round(g.b[0]*pm),f2=Math.round(g.b[1]*pm*.95),f3=Math.round(g.b[2]*pm*.88);
    var mx=g.b[0];
    var p1=Math.min(100,f1/mx*100),p2=Math.min(100,f2/mx*100),p3=Math.min(100,f3/mx*100);
    var rankCls=(i<3?' g3':'');
    h+='<div class="gcard"><div class="gcard-head"><div class="gico">'+g.ico+'</div><div class="gtitle"><div class="gname">'+g.nm+'</div><div class="ggenre">'+g.gn+'</div></div><div class="grank'+rankCls+'">#'+(i+1)+'</div></div><div class="fps-section"><div class="fps-row"><div class="fps-lbl">1080p</div><div class="fps-track"><div class="fps-fill f1" style="width:'+p1+'%"><span class="fps-num">'+f1+'</span></div></div></div><div class="fps-row"><div class="fps-lbl">1440p</div><div class="fps-track"><div class="fps-fill f2" style="width:'+p2+'%"><span class="fps-num">'+f2+'</span></div></div></div><div class="fps-row"><div class="fps-lbl">4K</div><div class="fps-track"><div class="fps-fill f3" style="width:'+p3+'%"><span class="fps-num">'+f3+'</span></div></div></div></div></div>';
  }
  h+='</div>';
  gc.innerHTML=h;
}

renderSidebar();
renderGrid();
</script>
</body>
</html>
