<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUILDFORGE — PC Builder</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap');
  
  :root {
    --bg-base: #09090b;
    --bg-panel: #18181b;
    --bg-hover: #27272a;
    --border: #3f3f46;
    --text-main: #f4f4f5;
    --text-muted: #a1a1aa;
    --accent: #3b82f6; /* Azul moderno */
    --accent-hover: #2563eb;
    --success: #10b981;
    --danger: #ef4444;
    --warning: #f59e0b;
    --font-sans: 'Inter', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    background-color: var(--bg-base);
    color: var(--text-main);
    font-family: var(--font-sans);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  button { cursor: pointer; border: none; font-family: inherit; }
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-base); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

  /* HEADER */
  header {
    height: 60px;
    background: rgba(24, 24, 27, 0.8);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 0 2rem;
    gap: 1.5rem;
    z-index: 100;
  }

  .logo {
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--text-main);
  }
  .logo span { color: var(--accent); }

  .nav-btn {
    background: transparent;
    color: var(--text-muted);
    font-weight: 500;
    font-size: 0.9rem;
    padding: 0.5rem 1rem;
    border-radius: 6px;
    transition: all 0.2s;
  }
  .nav-btn:hover, .nav-btn.active {
    background: var(--bg-hover);
    color: var(--text-main);
  }

  #myBuildToggle {
    margin-left: auto;
    background: var(--text-main);
    color: var(--bg-base);
    font-weight: 600;
    padding: 0.5rem 1.2rem;
    border-radius: 6px;
  }
  #myBuildToggle:hover { background: #e4e4e7; }

  /* LAYOUT */
  .layout { display: flex; flex: 1; overflow: hidden; }

  /* SIDEBAR (My Build) */
  .sidebar {
    width: 350px;
    background: var(--bg-panel);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    transition: transform 0.3s ease;
  }
  .sidebar.hidden { transform: translateX(-100%); position: absolute; height: 100%; z-index: 90; }
  
  .sb-header { padding: 1.5rem; border-bottom: 1px solid var(--border); }
  .sb-title { font-weight: 600; font-size: 1.1rem; }
  
  .sb-content { flex: 1; overflow-y: auto; padding: 1rem; display: flex; flex-direction: column; gap: 0.5rem; }
  
  .build-slot {
    background: var(--bg-base);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }
  .build-slot.empty { border-style: dashed; opacity: 0.6; }
  .slot-icon { width: 32px; height: 32px; background: var(--bg-hover); border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 0.8rem; }
  .slot-details { flex: 1; overflow: hidden; }
  .slot-type { font-size: 0.7rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600;}
  .slot-name { font-size: 0.85rem; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .slot-price { font-family: var(--font-mono); font-size: 0.85rem; color: var(--success); font-weight: 700; }
  .slot-remove { background: none; color: var(--text-muted); font-size: 1.2rem; padding: 0.2rem; }
  .slot-remove:hover { color: var(--danger); }

  .sb-footer { padding: 1.5rem; border-top: 1px solid var(--border); background: var(--bg-panel); }
  .total-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .total-lbl { font-weight: 600; color: var(--text-muted); }
  .total-val { font-size: 1.75rem; font-weight: 700; font-family: var(--font-mono); }
  .btn-primary { width: 100%; background: var(--accent); color: white; padding: 0.75rem; border-radius: 6px; font-weight: 600; transition: background 0.2s; }
  .btn-primary:hover { background: var(--accent-hover); }

  /* MAIN CONTENT */
  .main-content { flex: 1; display: flex; flex-direction: column; overflow: hidden; background: var(--bg-base); position: relative; }
  
  .page { display: none; flex: 1; overflow-y: auto; padding: 2rem; }
  .page.active { display: block; }

  /* BUILDER PAGE */
  .tabs { display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border); margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 0.5rem; }
  .tab { background: transparent; color: var(--text-muted); padding: 0.5rem 1rem; border-radius: 6px; font-weight: 500; white-space: nowrap; }
  .tab.active, .tab:hover { background: var(--bg-panel); color: var(--text-main); }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1rem; }
  
  .card {
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.25rem;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    gap: 1rem;
  }
  .card:hover { border-color: var(--accent); transform: translateY(-2px); }
  
  .card-img-placeholder {
    height: 120px;
    background: var(--bg-base);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 3rem;
    border: 1px solid var(--border);
  }
  
  .card-info { flex: 1; }
  .c-brand { font-size: 0.7rem; color: var(--accent); text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
  .c-name { font-size: 1rem; font-weight: 600; margin: 0.25rem 0; line-height: 1.3; }
  .c-specs { font-size: 0.8rem; color: var(--text-muted); line-height: 1.5; }
  
  .card-footer { display: flex; justify-content: space-between; align-items: center; padding-top: 1rem; border-top: 1px solid var(--border); }
  .c-price { font-family: var(--font-mono); font-size: 1.2rem; font-weight: 700; color: var(--text-main); }
  
  .btn-add {
    background: var(--bg-hover); color: var(--text-main); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; transition: 0.2s;
  }
  .btn-add:hover { background: var(--accent); color: white; }
  .btn-add.added { background: var(--success); color: #000; }

  /* 3D VIEWER PAGE */
  .viewer-container {
    display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%;
  }
  .rig-wrapper {
    width: 300px; height: 400px; perspective: 1000px;
  }
  .rig-3d {
    width: 100%; height: 100%; position: relative; transform-style: preserve-3d;
    animation: rotateRig 15s infinite linear;
    transform: rotateX(10deg) rotateY(0deg);
  }
  @keyframes rotateRig {
    0% { transform: rotateX(10deg) rotateY(0deg); }
    100% { transform: rotateX(10deg) rotateY(360deg); }
  }

  .rig-case {
    position: absolute; inset: 0;
    border: 2px solid var(--border);
    background: rgba(24, 24, 27, 0.4);
    backdrop-filter: blur(4px);
    border-radius: 8px;
    display: flex; flex-direction: column; padding: 20px;
  }
  
  /* 3D Parts dynamically injected via JS */
  .p3d-mb { width: 100%; height: 80%; background: #111; border: 1px solid #333; border-radius: 4px; position: relative; padding: 10px; display: none; }
  .p3d-cpu { width: 40px; height: 40px; background: #222; border: 2px solid var(--text-muted); position: absolute; top: 20px; left: 50%; transform: translateX(-50%); display: none; }
  .p3d-ram-slots { display: flex; gap: 4px; position: absolute; top: 20px; right: 20px; display: none; }
  .p3d-ram { width: 8px; height: 50px; background: #333; border: 1px solid #555; }
  .p3d-gpu { width: 90%; height: 50px; background: #0a0a0a; border: 2px solid var(--accent); position: absolute; bottom: 40px; left: 5%; display: none; box-shadow: 0 0 15px rgba(59, 130, 246, 0.4); }

  /* MODAL / CHARTS */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px);
    display: none; justify-content: center; align-items: center; z-index: 200;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: 12px; width: 500px; max-width: 90%; padding: 1.5rem;
  }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
  .m-title { font-weight: 600; font-size: 1.1rem; }
  .btn-close { background: none; color: var(--text-muted); font-size: 1.5rem; }
  .btn-close:hover { color: var(--text-main); }
  .chart-area {
    height: 200px; background: var(--bg-base); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 1rem; position: relative; overflow: hidden;
  }
  #chartSvg { width: 100%; height: 100%; }
</style>
</head>
<body>

<header>
  <div class="logo">BUILD<span>FORGE</span></div>
  <button class="nav-btn active" onclick="switchPage('builder')">Catálogo</button>
  <button class="nav-btn" onclick="switchPage('viewer')">Vista 3D</button>
  <button id="myBuildToggle" onclick="toggleSidebar()">A Minha Build</button>
</header>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <div class="sb-header">
      <div class="sb-title">A Minha Build</div>
    </div>
    <div class="sb-content" id="buildList">
      </div>
    <div class="sb-footer">
      <div class="total-row">
        <span class="total-lbl">Total Estimado</span>
        <span class="total-val" id="totalPrice">0€</span>
      </div>
      <button class="btn-primary" onclick="switchPage('viewer')">Visualizar Rig 3D</button>
    </div>
  </aside>

  <main class="main-content">
    
    <div id="page-builder" class="page active">
      <div class="tabs" id="categoryTabs">
        </div>
      <div class="grid" id="productGrid">
        </div>
    </div>

    <div id="page-viewer" class="page">
      <div class="viewer-container">
        <h2 style="margin-bottom: 2rem; font-weight: 500;">Simulação 3D da tua Build</h2>
        <div class="rig-wrapper">
          <div class="rig-3d">
            <div class="rig-case">
              <div class="p3d-mb" id="rig-mb">
                <div class="p3d-cpu" id="rig-cpu"></div>
                <div class="p3d-ram-slots" id="rig-ram">
                  <div class="p3d-ram"></div><div class="p3d-ram"></div>
                </div>
                <div class="p3d-gpu" id="rig-gpu"></div>
              </div>
            </div>
          </div>
        </div>
        <p style="margin-top: 2rem; color: var(--text-muted); font-size: 0.9rem;">Adiciona componentes no catálogo para preencher a caixa.</p>
      </div>
    </div>

  </main>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this) closeModal()">
  <div class="modal">
    <div class="modal-header">
      <div class="m-title" id="mTitle">Nome do Produto</div>
      <button class="btn-close" onclick="closeModal()">&times;</button>
    </div>
    <p style="font-size: 0.8rem; color: var(--text-muted); margin-bottom: 1rem;">Histórico de Preço (Últimos 6 meses)</p>
    <div class="chart-area">
      <svg id="chartSvg" viewBox="0 0 100 100" preserveAspectRatio="none">
        <path id="chartPath" fill="none" stroke="var(--accent)" stroke-width="2" />
      </svg>
    </div>
    <button class="btn-primary" style="margin-top: 1rem;" id="mAddBtn">Adicionar à Build</button>
  </div>
</div>

<script>
// DADOS DOS PRODUTOS (Preços atualizados para contexto realista ~2024/2026)
const DB = {
  cpu: [
    { id: 'c1', br: 'AMD', nm: 'Ryzen 7 7800X3D', sp: '8C/16T · 5.0GHz · AM5', pr: 389, ico: '🔲' },
    { id: 'c2', br: 'Intel', nm: 'Core i9-14900K', sp: '24C/32T · 6.0GHz · LGA1700', pr: 619, ico: '🔲' },
    { id: 'c3', br: 'AMD', nm: 'Ryzen 5 7600X', sp: '6C/12T · 5.3GHz · AM5', pr: 229, ico: '🔲' },
    { id: 'c4', br: 'Intel', nm: 'Core i5-13600K', sp: '14C/20T · 5.1GHz · LGA1700', pr: 289, ico: '🔲' }
  ],
  gpu: [
    { id: 'g1', br: 'NVIDIA', nm: 'RTX 4090', sp: '24GB GDDR6X · 450W', pr: 1850, ico: '🎮' },
    { id: 'g2', br: 'NVIDIA', nm: 'RTX 4070 Super', sp: '12GB GDDR6X · 220W', pr: 659, ico: '🎮' },
    { id: 'g3', br: 'AMD', nm: 'Radeon RX 7900 XTX', sp: '24GB GDDR6 · 355W', pr: 999, ico: '🎮' },
    { id: 'g4', br: 'AMD', nm: 'Radeon RX 7800 XT', sp: '16GB GDDR6 · 263W', pr: 539, ico: '🎮' }
  ],
  mb: [
    { id: 'm1', br: 'MSI', nm: 'MAG B650 Tomahawk', sp: 'AM5 · ATX · WiFi 6E', pr: 210, ico: '🔌' },
    { id: 'm2', br: 'ASUS', nm: 'ROG Strix Z790-F', sp: 'LGA1700 · ATX · DDR5', pr: 390, ico: '🔌' },
    { id: 'm3', br: 'Gigabyte', nm: 'B650M DS3H', sp: 'AM5 · Micro-ATX', pr: 155, ico: '🔌' }
  ],
  ram: [
    { id: 'r1', br: 'G.Skill', nm: 'Trident Z5 NEO 32GB', sp: '2x16GB · DDR5-6000 CL30', pr: 135, ico: '📻' },
    { id: 'r2', br: 'Corsair', nm: 'Vengeance 64GB', sp: '2x32GB · DDR5-5600 CL40', pr: 215, ico: '📻' }
  ],
  storage: [
    { id: 's1', br: 'Samsung', nm: '990 PRO 2TB', sp: 'NVMe M.2 · PCIe 4.0', pr: 179, ico: '💾' },
    { id: 's2', br: 'Crucial', nm: 'P3 Plus 1TB', sp: 'NVMe M.2 · PCIe 4.0', pr: 75, ico: '💾' }
  ]
};

const CATEGORIES = [
  { key: 'cpu', label: 'CPU' },
  { key: 'mb', label: 'Motherboard' },
  { key: 'ram', label: 'RAM' },
  { key: 'gpu', label: 'Placa Gráfica' },
  { key: 'storage', label: 'Armazenamento' }
];

let currentCat = 'cpu';
let myBuild = { cpu: null, mb: null, ram: null, gpu: null, storage: null };

// INICIALIZAÇÃO
function init() {
  renderTabs();
  renderGrid(currentCat);
  renderSidebar();
}

function renderTabs() {
  const container = document.getElementById('categoryTabs');
  container.innerHTML = CATEGORIES.map(cat => 
    `<button class="tab ${cat.key === currentCat ? 'active' : ''}" onclick="changeCat('${cat.key}')">${cat.label}</button>`
  ).join('');
}

function changeCat(catKey) {
  currentCat = catKey;
  renderTabs();
  renderGrid(catKey);
}

function renderGrid(catKey) {
  const container = document.getElementById('productGrid');
  const items = DB[catKey] || [];
  
  container.innerHTML = items.map(item => {
    const isAdded = myBuild[catKey]?.id === item.id;
    return `
      <div class="card">
        <div class="card-img-placeholder" onclick="openModal('${catKey}', '${item.id}')" style="cursor:pointer">
          ${item.ico}
        </div>
        <div class="card-info">
          <div class="c-brand">${item.br}</div>
          <div class="c-name">${item.nm}</div>
          <div class="c-specs">${item.sp}</div>
        </div>
        <div class="card-footer">
          <div class="c-price">${item.pr}€</div>
          <button class="btn-add ${isAdded ? 'added' : ''}" onclick="togglePart('${catKey}', '${item.id}')">
            ${isAdded ? '✓ Adicionado' : '+ Adicionar'}
          </button>
        </div>
      </div>
    `;
  }).join('');
}

// LÓGICA DA BUILD
function togglePart(catKey, itemId) {
  if (myBuild[catKey] && myBuild[catKey].id === itemId) {
    myBuild[catKey] = null; // Remover
  } else {
    myBuild[catKey] = DB[catKey].find(i => i.id === itemId); // Adicionar
  }
  renderGrid(currentCat);
  renderSidebar();
  update3DViewer();
}

function renderSidebar() {
  const container = document.getElementById('buildList');
  let total = 0;
  
  container.innerHTML = CATEGORIES.map(cat => {
    const item = myBuild[cat.key];
    if (item) total += item.pr;
    
    if (!item) {
      return `
        <div class="build-slot empty">
          <div class="slot-icon">+</div>
          <div class="slot-details">
            <div class="slot-type">${cat.label}</div>
            <div class="slot-name" style="color: var(--text-muted)">Vazio</div>
          </div>
        </div>
      `;
    }
    
    return `
      <div class="build-slot">
        <div class="slot-icon">${item.ico}</div>
        <div class="slot-details">
          <div class="slot-type">${cat.label}</div>
          <div class="slot-name">${item.br} ${item.nm}</div>
          <div class="slot-price">${item.pr}€</div>
        </div>
        <button class="slot-remove" onclick="togglePart('${cat.key}', '${item.id}')">&times;</button>
      </div>
    `;
  }).join('');
  
  document.getElementById('totalPrice').innerText = total + '€';
}

// NAVEGAÇÃO E UI
function switchPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  
  document.getElementById('page-' + pageId).classList.add('active');
  event.currentTarget.classList.add('active');
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('hidden');
}

// VISTA 3D DINÂMICA
function update3DViewer() {
  const rigMb = document.getElementById('rig-mb');
  const rigCpu = document.getElementById('rig-cpu');
  const rigRam = document.getElementById('rig-ram');
  const rigGpu = document.getElementById('rig-gpu');

  // Lógica Visual Simples
  rigMb.style.display = myBuild.mb ? 'block' : 'none';
  rigCpu.style.display = myBuild.cpu ? 'block' : 'none';
  rigRam.style.display = myBuild.ram ? 'flex' : 'none';
  
  if (myBuild.gpu) {
    rigGpu.style.display = 'block';
    // Se for uma 4090, fica maior
    rigGpu.style.height = myBuild.gpu.nm.includes('4090') ? '80px' : '50px';
  } else {
    rigGpu.style.display = 'none';
  }
}

// MODAL & GRÁFICO (Simulação de Variação de Preço SVG)
function openModal(catKey, itemId) {
  const item = DB[catKey].find(i => i.id === itemId);
  document.getElementById('mTitle').innerText = item.br + ' ' + item.nm;
  
  const addBtn = document.getElementById('mAddBtn');
  addBtn.onclick = () => {
    togglePart(catKey, item.id);
    closeModal();
  };
  
  drawChart(item.pr);
  document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
}

function drawChart(basePrice) {
  const path = document.getElementById('chartPath');
  // Gera pontos aleatórios para simular variação de preço nos últimos 6 meses
  let d = `M 0,${Math.random() * 50 + 25}`;
  for(let i = 1; i <= 10; i++) {
    d += ` L ${i * 10},${Math.random() * 60 + 20}`;
  }
  path.setAttribute('d', d);
}

// Arranque
init();
</script>
</body>
</html>
