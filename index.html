<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeMaster Pro | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(226, 232, 240, 0.8); }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="p-4 md:p-8">

<div class="max-w-7xl mx-auto">
    <header class="flex flex-col md:flex-row md:items-center justify-between mb-8 gap-4">
        <div>
            <h1 class="text-3xl font-bold text-slate-900">GradeMaster <span class="text-blue-600">Pro</span></h1>
            <p class="text-slate-500">Monitorização de performance académica em tempo real.</p>
        </div>
        <div class="flex gap-4">
            <div class="glass-card p-4 rounded-2xl shadow-sm text-center min-w-[120px]">
                <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Média Geral</span>
                <div id="media-geral" class="text-2xl font-bold text-blue-600">0.0</div>
            </div>
            <div class="glass-card p-4 rounded-2xl shadow-sm text-center min-w-[120px]">
                <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Melhor Disciplina</span>
                <div id="melhor-disc" class="text-sm font-bold text-emerald-600 mt-1">-</div>
            </div>
        </div>
    </header>

    <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-8">
            <div class="glass-card rounded-3xl shadow-sm overflow-hidden">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50">
                        <tr>
                            <th class="p-4 text-xs font-bold text-slate-400 uppercase">Disciplina</th>
                            <th class="p-4 text-xs font-bold text-slate-400 uppercase text-center">Testes</th>
                            <th class="p-4 text-xs font-bold text-slate-400 uppercase text-center">Notas (0-100)</th>
                            <th class="p-4 text-xs font-bold text-slate-400 uppercase text-right">Média</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-slate-100">
                        </tbody>
                </table>
                <div class="p-4 bg-slate-50/50 flex justify-end">
                    <button onclick="salvarEAtualizar()" class="bg-slate-900 hover:bg-slate-800 text-white px-6 py-2 rounded-xl font-semibold transition-all transform active:scale-95 shadow-lg">
                        Atualizar Dashboard
                    </button>
                </div>
            </div>
        </div>

        <div class="lg:col-span-4 space-y-6">
            <div class="glass-card p-6 rounded-3xl shadow-sm">
                <h3 class="text-lg font-bold mb-4 text-slate-800">Evolução por Disciplina</h3>
                <select id="filtro-grafico" onchange="atualizarGraficos()" class="w-full p-3 bg-slate-100 border-none rounded-xl text-sm font-medium focus:ring-2 focus:ring-blue-500 mb-4">
                    <option value="all">Todas as Disciplinas</option>
                </select>
                <div class="h-[250px]">
                    <canvas id="lineChart"></canvas>
                </div>
            </div>

            <div class="glass-card p-6 rounded-3xl shadow-sm">
                <h3 class="text-lg font-bold mb-4 text-slate-800">Equilíbrio de Competências</h3>
                <div class="h-[250px]">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const disciplinas = [
        {nome: 'História', cor: '#f43f5e'}, {nome: 'Português', cor: '#3b82f6'},
        {nome: 'Matemática', cor: '#10b981'}, {nome: 'Ciências', cor: '#f59e0b'},
        {nome: 'Físico-Química', cor: '#8b5cf6'}, {nome: 'Inglês', cor: '#06b6d4'},
        {nome: 'Francês', cor: '#ec4899'}, {nome: 'Geografia', cor: '#64748b'}
    ];

    let lineChart, radarChart;

    function init() {
        const corpo = document.getElementById('tabela-corpo');
        const filtro = document.getElementById('filtro-grafico');

        disciplinas.forEach((d, idx) => {
            // Dropdown filtro
            const opt = document.createElement('option');
            opt.value = idx;
            opt.textContent = d.nome;
            filtro.appendChild(opt);

            // Tabela
            const qSalva = localStorage.getItem(`q-${idx}`) || '3';
            const tr = document.createElement('tr');
            tr.className = "hover:bg-slate-50/50 transition-colors";
            tr.innerHTML = `
                <td class="p-4"><span class="flex items-center gap-2"><div class="w-2 h-2 rounded-full" style="background:${d.cor}"></div><span class="font-semibold text-slate-700">${d.nome}</span></span></td>
                <td class="p-4 text-center">
                    <select id="q-${idx}" onchange="toggleInputs(${idx})" class="text-xs font-bold bg-slate-100 rounded-lg p-1 border-none">
                        <option value="2" ${qSalva==='2'?'selected':''}>2</option>
                        <option value="3" ${qSalva==='3'?'selected':''}>3</option>
                        <option value="4" ${qSalva==='4'?'selected':''}>4</option>
                    </select>
                </td>
                <td class="p-4 flex justify-center gap-2">
                    ${[1,2,3,4].map(t => `<input type="number" id="n-${idx}-${t}" placeholder="T${t}" min="0" max="100" value="${localStorage.getItem(`n-${idx}-${t}`)||''}" class="w-12 h-10 text-center bg-white border border-slate-200 rounded-lg focus:ring-2 focus:ring-blue-500 transition-all text-sm font-bold">`).join('')}
                </td>
                <td class="p-4 text-right font-bold text-slate-400" id="media-${idx}">-</td>
            `;
            corpo.appendChild(tr);
            toggleInputs(idx);
        });
        atualizarGraficos();
    }

    function toggleInputs(idx) {
        const q = parseInt(document.getElementById(`q-${idx}`).value);
        for(let t=1; t<=4; t++) {
            const input = document.getElementById(`n-${idx}-${t}`);
            input.style.display = t > q ? 'none' : 'block';
        }
        localStorage.setItem(`q-${idx}`, q);
    }

    function salvarEAtualizar() {
        disciplinas.forEach((_, idx) => {
            for(let t=1; t<=4; t++) {
                localStorage.setItem(`n-${idx}-${t}`, document.getElementById(`n-${idx}-${t}`).value);
            }
        });
        atualizarGraficos();
    }

    function atualizarGraficos() {
        const filtroVal = document.getElementById('filtro-grafico').value;
        const lineData = [];
        const radarLabels = [];
        const radarValues = [];
        let somaMedias = 0;
        let countMedias = 0;
        let melhor = {nome: '-', nota: -1};

        disciplinas.forEach((d, idx) => {
            const notas = [];
            let somaDisc = 0;
            let countDisc = 0;
            const q = parseInt(document.getElementById(`q-${idx}`).value);

            for(let t=1; t<=4; t++) {
                const v = document.getElementById(`n-${idx}-${t}`).value;
                if(t <= q && v !== "") {
                    const nota = parseFloat(v);
                    notas.push(nota);
                    somaDisc += nota;
                    countDisc++;
                } else if (t <= q) {
                    notas.push(null);
                }
            }

            const media = countDisc > 0 ? (somaDisc / countDisc).toFixed(1) : null;
            const mediaEl = document.getElementById(`media-${idx}`);
            mediaEl.textContent = media || '-';
            mediaEl.className = `p-4 text-right font-bold ${media >= 70 ? 'text-emerald-500' : media < 50 ? 'text-rose-500' : 'text-amber-500'}`;

            if(media) {
                somaMedias += parseFloat(media);
                countMedias++;
                if(parseFloat(media) > melhor.nota) melhor = {nome: d.nome, nota: parseFloat(media)};
            }

            if(filtroVal === 'all' || filtroVal == idx) {
                lineData.push({
                    label: d.nome, data: notas, borderColor: d.cor, backgroundColor: d.cor,
                    tension: 0.4, borderWidth: filtroVal === 'all' ? 2 : 4, pointRadius: 4, spanGaps: true
                });
            }
            radarLabels.push(d.nome);
            radarValues.push(media || 0);
        });

        document.getElementById('media-geral').textContent = countMedias > 0 ? (somaMedias/countMedias).toFixed(1) : '0.0';
        document.getElementById('melhor-disc').textContent = melhor.nome;

        renderLine(lineData);
        renderRadar(radarLabels, radarValues);
    }

    function renderLine(datasets) {
        const ctx = document.getElementById('lineChart');
        if(lineChart) lineChart.destroy();
        lineChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['T1', 'T2', 'T3', 'T4'], datasets },
            options: { 
                responsive: true, maintainAspectRatio: false, 
                plugins: { legend: { display: false } },
                scales: { y: { min: 0, max: 100, grid: { color: '#f1f5f9' } }, x: { grid: { display: false } } }
            }
        });
    }

    function renderRadar(labels, data) {
        const ctx = document.getElementById('radarChart');
        if(radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
            type: 'radar',
            data: { 
                labels, 
                datasets: [{ label: 'Perfil', data, backgroundColor: 'rgba(59, 130, 246, 0.2)', borderColor: '#3b82f6', borderWidth: 2, pointRadius: 0 }] 
            },
            options: { 
                responsive: true, maintainAspectRatio: false,
                scales: { r: { min: 0, max: 100, ticks: { display: false } } },
                plugins: { legend: { display: false } }
            }
        });
    }

    window.onload = init;
</script>
</body>
</html>
