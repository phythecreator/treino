<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evolução das Minhas Notas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary-color: #4CAF50;
            --bg-color: #f4f7f6;
            --text-color: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            max-width: 1000px;
            margin: 0 auto;
            padding: 20px;
        }
        h1, h2 {
            text-align: center;
            color: #2c3e50;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }
        th, td {
            padding: 12px 15px;
            text-align: center;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #2c3e50;
            color: white;
        }
        input[type="number"] {
            width: 60px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            text-align: center;
        }
        button {
            display: block;
            width: 200px;
            margin: 0 auto 30px auto;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        button:hover {
            background-color: #45a049;
        }
        .chart-container {
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <h1>Gestor de Notas Escolares 📚</h1>
    <p style="text-align: center;">Insere as tuas notas abaixo (podes usar de 0 a 100 ou 0 a 20). As tuas notas ficam guardadas no teu navegador.</p>

    <div style="overflow-x:auto;">
        <table>
            <thead>
                <tr>
                    <th>Disciplina</th>
                    <th>Teste 1</th>
                    <th>Teste 2</th>
                    <th>Teste 3</th>
                    <th>Teste 4</th>
                </tr>
            </thead>
            <tbody id="tabela-notas">
                </tbody>
        </table>
    </div>

    <button onclick="atualizarGrafico()">Guardar e Atualizar Gráfico</button>

    <div class="chart-container">
        <canvas id="meuGrafico"></canvas>
    </div>

    <script>
        const disciplinas = [
            'História', 'Português', 'Matemática', 'Ciências', 
            'Físico-Química', 'Inglês', 'Francês', 'Geografia'
        ];

        // Cores para as linhas do gráfico
        const cores = [
            '#FF6384', '#36A2EB', '#FFCE56', '#4BC0C0', 
            '#9966FF', '#FF9F40', '#C9CBCF', '#8B4513'
        ];

        const tabelaBody = document.getElementById('tabela-notas');
        let chart;

        // Gerar a tabela dinamicamente
        function gerarTabela() {
            disciplinas.forEach((disciplina, index) => {
                const tr = document.createElement('tr');
                
                let htmlStr = `<td><strong>${disciplina}</strong></td>`;
                for (let i = 1; i <= 4; i++) {
                    // Tentar recuperar valores guardados anteriormente
                    const idInput = `nota-${index}-${i}`;
                    const valorGuardado = localStorage.getItem(idInput) || '';
                    htmlStr += `<td><input type="number" id="${idInput}" value="${valorGuardado}" min="0" max="100"></td>`;
                }
                
                tr.innerHTML = htmlStr;
                tabelaBody.appendChild(tr);
            });
        }

        // Função para ler as notas, guardar e desenhar o gráfico
        function atualizarGrafico() {
            const datasets = [];

            disciplinas.forEach((disciplina, index) => {
                const notasDisciplina = [];
                for (let i = 1; i <= 4; i++) {
                    const idInput = `nota-${index}-${i}`;
                    const input = document.getElementById(idInput);
                    const valor = input.value;
                    
                    // Guardar no localStorage
                    localStorage.setItem(idInput, valor);
                    
                    // Adicionar ao array (se estiver vazio, coloca null para o gráfico não quebrar)
                    notasDisciplina.push(valor !== '' ? parseFloat(valor) : null);
                }

                datasets.push({
                    label: disciplina,
                    data: notasDisciplina,
                    borderColor: cores[index],
                    backgroundColor: cores[index],
                    fill: false,
                    tension: 0.2 // Faz a linha ligeiramente curva
                });
            });

            desenharGrafico(datasets);
            alert("Notas guardadas e gráfico atualizado! ✅");
        }

        // Função para desenhar o gráfico com Chart.js
        function desenharGrafico(datasets) {
            const ctx = document.getElementById('meuGrafico').getContext('2d');
            
            // Destrói o gráfico anterior se existir para não sobrepor
            if (chart) {
                chart.destroy();
            }

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Teste 1', 'Teste 2', 'Teste 3', 'Teste 4'],
                    datasets: datasets
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: 'Nota'
                            }
                        }
                    },
                    plugins: {
                        title: {
                            display: true,
                            text: 'Variação das Notas ao Longo do Ano',
                            font: { size: 18 }
                        }
                    }
                }
            });
        }

        // Inicializar a página
        window.onload = function() {
            gerarTabela();
            atualizarGrafico(); // Desenha logo o gráfico com os dados guardados
        };
    </script>
</body>
</html>
