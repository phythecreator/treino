<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liga de Apostas dos Amigos</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --primary: #2e7d32; /* Verde relva */
            --secondary: #1b5e20;
            --bg: #f4f6f8;
            --text: #333;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }
        h1, h2, h3 { color: var(--secondary); }
        .container {
            max-width: 900px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        input, select, button {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        button {
            background-color: var(--primary);
            color: white;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: var(--secondary); }
        .game-card {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            background: #fafafa;
        }
        .team-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 1.2em;
        }
        .team-info img {
            width: 40px;
            height: 40px;
            object-fit: contain;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: center;
        }
        th { background-color: var(--primary); color: white; }
        .export-btn {
            background-color: #d32f2f;
            margin-bottom: 20px;
        }
        .export-btn:hover { background-color: #b71c1c; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏆 Liga de Apostas</h1>
    
    <div id="admin-section">
        <h2>Adicionar Novo Jogo</h2>
        <div class="form-group">
            <input type="text" id="homeTeam" placeholder="Equipa Casa" required>
            <input type="url" id="homeLogo" placeholder="URL Foto Casa">
            <span> VS </span>
            <input type="text" id="awayTeam" placeholder="Equipa Fora" required>
            <input type="url" id="awayLogo" placeholder="URL Foto Fora">
            <button onclick="addGame()">Adicionar Jogo</button>
        </div>
    </div>

    <hr>

    <button class="export-btn" onclick="exportPDF()">📄 Exportar Relatório para PDF</button>

    <div id="pdf-content">
        <h2>Tabela de Classificações</h2>
        <table>
            <thead>
                <tr>
                    <th>Posição</th>
                    <th>Jogador</th>
                    <th>Pontos</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                </tbody>
        </table>

        <h2>Jogos e Apostas</h2>
        <div id="games-list">
            </div>
    </div>
</div>

<script>
    const players = ['Sá', 'Silva', 'Pedro', 'João'];
    let games = JSON.parse(localStorage.getItem('apostas_games')) || [];

    // Função para guardar dados no navegador
    function saveData() {
        localStorage.setItem('apostas_games', JSON.stringify(games));
        render();
    }

    // Adicionar um novo jogo
    function addGame() {
        const homeTeam = document.getElementById('homeTeam').value;
        const awayTeam = document.getElementById('awayTeam').value;
        const homeLogo = document.getElementById('homeLogo').value || 'https://via.placeholder.com/40';
        const awayLogo = document.getElementById('awayLogo').value || 'https://via.placeholder.com/40';

        if (!homeTeam || !awayTeam) return alert("Preenche o nome das equipas!");

        const newGame = {
            id: Date.now(),
            homeTeam, awayTeam, homeLogo, awayLogo,
            status: 'pending', // 'pending' ou 'finished'
            homeScore: null,
            awayScore: null,
            bets: {}
        };

        games.push(newGame);
        document.getElementById('homeTeam').value = '';
        document.getElementById('awayTeam').value = '';
        document.getElementById('homeLogo').value = '';
        document.getElementById('awayLogo').value = '';
        saveData();
    }

    // Registar aposta de um jogador
    function placeBet(gameId, player) {
        const type = document.getElementById(`bet-type-${gameId}-${player}`).value;
        const gameIndex = games.findIndex(g => g.id === gameId);
        
        let betData = { type };
        
        if (type === 'exact') {
            const h = document.getElementById(`bet-home-${gameId}-${player}`).value;
            const a = document.getElementById(`bet-away-${gameId}-${player}`).value;
            if (h === '' || a === '') return alert("Preenche os golos!");
            betData.home = parseInt(h);
            betData.away = parseInt(a);
        } else {
            const outcome = document.getElementById(`bet-outcome-${gameId}-${player}`).value;
            betData.outcome = outcome;
        }

        games[gameIndex].bets[player] = betData;
        saveData();
    }

    // Registar resultado final do jogo
    function finishGame(gameId) {
        const h = document.getElementById(`res-home-${gameId}`).value;
        const a = document.getElementById(`res-away-${gameId}`).value;
        if (h === '' || a === '') return alert("Preenche o resultado final!");

        const gameIndex = games.findIndex(g => g.id === gameId);
        games[gameIndex].homeScore = parseInt(h);
        games[gameIndex].awayScore = parseInt(a);
        games[gameIndex].status = 'finished';
        saveData();
    }

    // Calcular pontos
    function calculatePoints() {
        let scores = { 'Sá': 0, 'Silva': 0, 'Pedro': 0, 'João': 0 };

        games.filter(g => g.status === 'finished').forEach(game => {
            const actualHome = game.homeScore;
            const actualAway = game.awayScore;
            
            let actualOutcome = 'draw';
            if (actualHome > actualAway) actualOutcome = 'home';
            if (actualHome < actualAway) actualOutcome = 'away';

            players.forEach(player => {
                const bet = game.bets[player];
                if (bet) {
                    if (bet.type === 'exact') {
                        // Regra: Acertou placar exato = 6. Se errar placar (mesmo acertando vencedor) = 0.
                        if (bet.home === actualHome && bet.away === actualAway) {
                            scores[player] += 6;
                        }
                    } else if (bet.type === 'outcome') {
                        // Regra: Apostou só no resultado (1x2) e acertou = 3 pontos.
                        if (bet.outcome === actualOutcome) {
                            scores[player] += 3;
                        }
                    }
                }
            });
        });
        return scores;
    }

    // Mudar os inputs dependendo do tipo de aposta escolhida
    function toggleBetInputs(gameId, player) {
        const type = document.getElementById(`bet-type-${gameId}-${player}`).value;
        document.getElementById(`exact-inputs-${gameId}-${player}`).style.display = type === 'exact' ? 'inline' : 'none';
        document.getElementById(`outcome-inputs-${gameId}-${player}`).style.display = type === 'outcome' ? 'inline' : 'none';
    }

    // Atualizar a interface HTML
    function render() {
        const gamesList = document.getElementById('games-list');
        gamesList.innerHTML = '';

        // Renderizar Jogos
        games.slice().reverse().forEach(game => {
            let html = `
                <div class="game-card">
                    <div class="team-info">
                        <img src="${game.homeLogo}" alt="Logo"> ${game.homeTeam} 
                        VS 
                        ${game.awayTeam} <img src="${game.awayLogo}" alt="Logo">
                    </div>
            `;

            if (game.status === 'pending') {
                html += `<h4>Fazer Apostas:</h4>`;
                players.forEach(player => {
                    const bet = game.bets[player];
                    if (!bet) {
                        html += `
                            <div style="margin-bottom:5px;">
                                <strong>${player}:</strong> 
                                <select id="bet-type-${game.id}-${player}" onchange="toggleBetInputs(${game.id}, '${player}')">
                                    <option value="exact">Placar Exato (6pts)</option>
                                    <option value="outcome">Só Vencedor (3pts)</option>
                                </select>
                                
                                <span id="exact-inputs-${game.id}-${player}">
                                    <input type="number" id="bet-home-${game.id}-${player}" style="width:40px;" placeholder="C"> - 
                                    <input type="number" id="bet-away-${game.id}-${player}" style="width:40px;" placeholder="F">
                                </span>
                                
                                <span id="outcome-inputs-${game.id}-${player}" style="display:none;">
                                    <select id="bet-outcome-${game.id}-${player}">
                                        <option value="home">Vitória Casa</option>
                                        <option value="draw">Empate</option>
                                        <option value="away">Vitória Fora</option>
                                    </select>
                                </span>
                                
                                <button onclick="placeBet(${game.id}, '${player}')">Guardar</button>
                            </div>
                        `;
                    } else {
                        const betStr = bet.type === 'exact' ? `${bet.home} - ${bet.away}` : (bet.outcome === 'home' ? 'Vitória Casa' : (bet.outcome === 'away' ? 'Vitória Fora' : 'Empate'));
                        html += `<div><strong>${player}:</strong> Aposta guardada (${betStr})</div>`;
                    }
                });

                html += `
                    <hr>
                    <h4>Inserir Resultado Final:</h4>
                    <input type="number" id="res-home-${game.id}" style="width:40px;"> - 
                    <input type="number" id="res-away-${game.id}" style="width:40px;">
                    <button onclick="finishGame(${game.id})">Fechar Jogo</button>
                `;
            } else {
                html += `
                    <h3 style="color:#d32f2f;">Resultado Final: ${game.homeScore} - ${game.awayScore}</h3>
                    <h4>Apostas feitas:</h4>
                    <ul>
                `;
                players.forEach(player => {
                    const bet = game.bets[player];
                    if (bet) {
                        const betStr = bet.type === 'exact' ? `${bet.home} - ${bet.away} (Placar)` : (bet.outcome === 'home' ? 'Vitória Casa' : (bet.outcome === 'away' ? 'Vitória Fora' : 'Empate'));
                        html += `<li><strong>${player}:</strong> ${betStr}</li>`;
                    } else {
                        html += `<li><strong>${player}:</strong> Não apostou.</li>`;
                    }
                });
                html += `</ul>`;
            }

            html += `</div>`;
            gamesList.innerHTML += html;
        });

        // Renderizar Classificação
        const scores = calculatePoints();
        const sortedPlayers = players.map(p => ({ name: p, points: scores[p] })).sort((a, b) => b.points - a.points);
        
        const tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        sortedPlayers.forEach((p, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>${index + 1}º</td>
                    <td><strong>${p.name}</strong></td>
                    <td>${p.points}</td>
                </tr>
            `;
        });
    }

    // Função para exportar PDF
    function exportPDF() {
        const element = document.getElementById('pdf-content');
        const opt = {
            margin:       10,
            filename:     'Apostas_Resultados.pdf',
            image:        { type: 'jpeg', quality: 0.98 },
            html2canvas:  { scale: 2 },
            jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }

    // Iniciar a página
    render();
</script>
</body>
</html>
