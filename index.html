<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GradeMaster Ultra | Performance & Orientação</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { fontSans: { 'jakarta': ['Plus Jakarta Sans', 'sans-serif'] } } }
        }
    </script>
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.3s; }
        .chart-container { height: 500px; width: 100%; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-900 dark:text-slate-100 p-4 md:p-8">

<div id="conteudo-principal" class="max-w-6xl mx-auto space-y-8">
    
    <header class="flex flex-col md:flex-row justify-between items-center gap-4 border-b border-slate-200 dark:border-slate-700 pb-6">
        <div>
            <h1 class="text-4xl font-bold tracking-tight">GradeMaster <span class="text-indigo-600">Ultra</span></h1>
            <p class="text-slate-500 dark:text-slate-400">Análise de notas e orientação vocacional para o 10º ano.</p>
        </div>
        <div class="flex gap-3">
            <button onclick="toggleDarkMode()" class="p-3 rounded-xl bg-white dark:bg-slate-800 shadow-sm hover:scale-105 transition-transform">
                <span id="dark-icon">🌙 Dark Mode</span>
            </button>
            <button onclick="gerarPDF()" class="p-3 rounded-xl bg-indigo-600 text-white font-bold shadow-lg hover:bg-indigo-700 transition-all">
                📄 Exportar Relatório PDF
            </button>
        </div>
    </header>

    <section class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700">
        <h2 class="text-xl font-bold mb-4 flex items-center gap-2">📈 Evolução de Performance</h2>
        <div id="custom-legend" class="flex flex-wrap gap-4 mb-6 p-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl justify-center">
            </div>
        <div class="chart-container">
            <canvas id="mainChart"></canvas>
        </div>
    </section>

    <section class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="lg:col-span-2 bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-lg border border-slate-100 dark:border-slate-700">
            <h2 class="text-xl font-bold mb-4">✍️ Lançamento de Notas</h2>
            <div class="overflow-x-auto">
                <table class="w-full">
                    <thead>
                        <tr class="text-left text-xs font-bold text-slate-400 uppercase tracking-wider">
                            <th class="p-3">Disciplina</th>
                            <th class="p-3 text-center">Testes</th>
                            <th class="p-3 text-center">Notas</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo"></tbody>
                </table>
            </div>
            <button onclick="salvarEAtualizar()" class="mt-6 w-full py-4 bg-slate-900 dark:bg-indigo-600 text-white rounded-2xl font-bold hover:opacity-90 transition-all">
                Guardar e Analisar Dados
            </button>
        </div>

        <div class="space-y-6">
            <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-6 rounded-3xl text-white shadow-lg">
                <p class="text-sm font-medium opacity-80 uppercase">Média Global Atual</p>
                <h3 id="media-geral" class="text-5xl font-bold mt-1">0.0</h3>
            </div>
            <div id="card-status" class="bg-white dark:bg-slate-800 p-6 rounded-3xl shadow-lg border border-slate-100 dark:border-slate-700 text-center">
                <p class="text-sm text-slate-500 mb-1">Foco Necessário</p>
                <h4 id="foco-disc" class="text-lg font-bold text-rose-500">-</h4>
            </div>
        </div>
    </section>

    <section class="bg-white dark:bg-slate-800 p-8 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-700">
        <div class="text-center mb-8">
            <h2 class="text-3xl font-bold">🎯 Orientação 10º Ano</h2>
            <p class="text-slate-500">Responde às 18 perguntas para descobrires o teu caminho.</p>
        </div>
        
        <div id="quiz-container" class="space-y-6 max-w-2xl mx-auto">
            </div>

        <div class="mt-12 text-center">
            <button onclick="calcularResultadoQuiz()" class="px-10 py-4 bg-emerald-600 text-white rounded-2xl font-bold text-lg hover:bg-emerald-700 transition-all shadow-xl shadow-emerald-200 dark:shadow-none">
                Ver Meu Destino Académico
            </button>
        </div>

        <div id="resultado-quiz" class="hidden mt-10 p-8 bg-slate-50 dark:bg-slate-900 rounded-3xl border-2 border-dashed border-slate-200 dark:border-slate-700">
            <h3 class="text-2xl font-bold text-center mb-6">O Teu Perfil Ideal:</h3>
            <div id="barras-resultado" class="space-y-6">
                </div>
            <div id="conselho-final" class="mt-8 p-4 bg-white dark:bg-slate-800 rounded-xl text-center italic text-indigo-600 dark:text-indigo-400 font-medium"></div>
        </div>
    </section>
</div>

<script>
    const disciplinas = [
        {id: 'his', nome: 'História', cor: '#ef4444', cat: 'H'},
        {id: 'por', nome: 'Português', cor: '#3b82f6', cat: 'H'},
        {id: 'mat', nome: 'Matemática', cor: '#10b981', cat: 'S'},
        {id: 'cie', nome: 'Ciências', cor: '#f59e0b', cat: 'S'},
        {id: 'fq', nome: 'Físico-Química', cor: '#8b5cf6', cat: 'S'},
        {id: 'ing', nome: 'Inglês', cor: '#06b6d4', cat: 'H'},
        {id: 'fra', nome: 'Francês', cor: '#ec4899', cat: 'H'},
        {id: 'geo', nome: 'Geografia', cor: '#64748b', cat: 'E'}
    ];

    const perguntas = [
        {p: "Gosto de resolver problemas lógicos e quebra-cabeças.", cat: 'S'},
        {p: "Interesso-me pelo funcionamento da economia e do mercado.", cat: 'E'},
        {p: "Prefiro ler livros e escrever ensaios do que fazer contas.", cat: 'H'},
        {p: "Fico fascinado com descobertas científicas e o corpo humano.", cat: 'S'},
        {p: "Gosto de debater política, história e temas sociais.", cat: 'H'},
        {p: "Tenho facilidade em interpretar gráficos e estatísticas.", cat: 'E'},
        {p: "Gostaria de trabalhar num laboratório ou engenharia.", cat: 'S'},
        {p: "Sinto-me atraído pela gestão de empresas e negócios.", cat: 'E'},
        {p: "Gostaria de trabalhar em Direito, Jornalismo ou Psicologia.", cat: 'H'},
        {p: "Matemática é a minha disciplina favorita.", cat: 'S'},
        {p: "Gosto de entender como o dinheiro e os impostos funcionam.", cat: 'E'},
        {p: "Tenho grande facilidade em aprender novas línguas.", cat: 'H'},
        {p: "Gosto de fazer experiências práticas.", cat: 'S'},
        {p: "Prefiro analisar dados concretos a ler teorias abstratas.", cat: 'E'},
        {p: "Interesso-me pelas artes e pela cultura mundial.", cat: 'H'},
        {p: "Considero-me uma pessoa muito racional e metódica.", cat: 'S'},
        {p: "Gosto de planear orçamentos e organizar finanças.", cat: 'E'},
        {p: "Prefiro decorar datas e eventos históricos a fórmulas.", cat: 'H'}
    ];

    let mainChart;

    // Inicialização
    function init() {
        const corpo = document.getElementById('tabela-corpo');
        const legend = document.getElementById('custom-legend');
        const quizBox = document.getElementById('quiz-container');

        disciplinas.forEach((d, idx) => {
            // Legenda
            legend.innerHTML += `<div class="flex items-center gap-2 px-3 py-1 bg-white dark:bg-slate-800 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm">
                <div class="w-3 h-3 rounded-full" style="background:${d.cor}"></div>
                <span class="text-xs font-bold">${d.nome}</span>
            </div>`;

            // Tabela
            const q = localStorage.getItem(`q-${idx}`) || '3';
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td class="p-3 font-semibold text-sm">${d.nome}</td>
                <td class="p-3 text-center">
                    <select id="q-${idx}" onchange="toggleInputs(${idx})" class="bg-slate-100 dark:bg-slate-700 rounded p-1 text-xs">
                        <option value="2" ${q==='2'?'selected':''}>2</option>
                        <option value="3" ${q==='3'?'selected':''}>3</option>
                        <option value="4" ${q==='4'?'selected':''}>4</option>
                    </select>
                </td>
                <td class="p-3 flex gap-1 justify-center">
                    ${[1,2,3,4].map(t => `<input type="number" id="n-${idx}-${t}" placeholder="${t}" value="${localStorage.getItem(`n-${idx}-${t}`)||''}" class="w-10 h-10 text-center border dark:bg-slate-800 dark:border-slate-600 rounded-lg text-sm font-bold">`).join('')}
                </td>
            `;
            corpo.appendChild(tr);
            toggleInputs(idx);
        });

        perguntas.forEach((p, idx) => {
            quizBox.innerHTML += `
                <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-900/50 rounded-2xl">
                    <p class="text-sm font-medium mr-4">${idx+1}. ${p.p}</p>
                    <div class="flex gap-2">
                        <button onclick="setQuiz(${idx}, 0)" id="qbtn-${idx}-0" class="w-10 h-10 rounded-lg border-2 border-slate-200 dark:border-slate-700 hover:bg-rose-500 hover:text-white transition-all">❌</button>
                        <button onclick="setQuiz(${idx}, 1)" id="qbtn-${idx}-1" class="w-10 h-10 rounded-lg border-2 border-slate-200 dark:border-slate-700 hover:bg-emerald-500 hover:text-white transition-all">✅</button>
                    </div>
                </div>
            `;
        });

        atualizarGrafico();
    }

    const respostasQuiz = Array(18).fill(null);
    function setQuiz(idx, val) {
        respostasQuiz[idx] = val;
        document.getElementById(`qbtn-${idx}-0`).style.background = val === 0 ? '#f43f5e' : '';
        document.getElementById(`qbtn-${idx}-1`).style.background = val === 1 ? '#10b981' : '';
    }

    function toggleInputs(idx) {
        const q = parseInt(document.getElementById(`q-${idx}`).value);
        for(let t=1; t<=4; t++) {
            document.getElementById(`n-${idx}-${t}`).style.visibility = t > q ? 'hidden' : 'visible';
        }
        localStorage.setItem(`q-${idx}`, q);
    }

    function salvarEAtualizar() {
        disciplinas.forEach((_, idx) => {
            for(let t=1; t<=4; t++) {
                localStorage.setItem(`n-${idx}-${t}`, document.getElementById(`n-${idx}-${t}`).value);
            }
        });
        atualizarGrafico();
    }

    function atualizarGrafico() {
        const datasets = disciplinas.map((d, idx) => {
            const notas = [];
            const q = parseInt(document.getElementById(`q-${idx}`).value);
            for(let t=1; t<=4; t++) {
                const v = document.getElementById(`n-${idx}-${t}`).value;
                notas.push(t <= q && v !== "" ? parseFloat(v) : null);
            }
            return {
                label: d.nome, data: notas, borderColor: d.cor, backgroundColor: d.cor,
                tension: 0.4, borderWidth: 3, pointRadius: 5, spanGaps: true
            };
        });

        const ctx = document.getElementById('mainChart').getContext('2d');
        if(mainChart) mainChart.destroy();
        mainChart = new Chart(ctx, {
            type: 'line',
            data: { labels: ['Teste 1', 'Teste 2', 'Teste 3', 'Teste 4'], datasets },
            options: {
                responsive: true, maintainAspectRatio: false,
                plugins: { legend: { display: false } },
                scales: { 
                    y: { min: 0, max: 100, grid: { color: document.documentElement.classList.contains('dark') ? '#334155' : '#e2e8f0' } },
                    x: { grid: { display: false } }
                }
            }
        });

        // Calcular Média
        let total = 0, conta = 0;
        disciplinas.forEach((_, idx) => {
            for(let t=1; t<=4; t++) {
                const v = document.getElementById(`n-${idx}-${t}`).value;
                if(v !== "") { total += parseFloat(v); conta++; }
            }
        });
        document.getElementById('media-geral').textContent = conta > 0 ? (total/conta).toFixed(1) : '0.0';
    }

    function calcularResultadoQuiz() {
        if(respostasQuiz.includes(null)) { alert("Responde a todas as 18 perguntas!"); return; }

        let s=0, e=0, h=0;
        respostasQuiz.forEach((val, idx) => {
            if(val === 1) {
                const cat = perguntas[idx].cat;
                if(cat === 'S') s++; else if(cat === 'E') e++; else h++;
            }
        });

        // Adicionar influência das notas atuais (peso extra)
        disciplinas.forEach((d, idx) => {
            let mediaD = 0, c = 0;
            for(let t=1; t<=4; t++) {
                const v = document.getElementById(`n-${idx}-${t}`).value;
                if(v !== "") { mediaD += parseFloat(v); c++; }
            }
            if(c > 0 && mediaD/c > 75) {
                if(d.cat === 'S') s += 2; else if(d.cat === 'E') e += 2; else h += 2;
            }
        });

        const total = s + e + h;
        const pS = Math.round((s/total)*100) || 0;
        const pE = Math.round((e/total)*100) || 0;
        const pH = Math.round((h/total)*100) || 0;

        const resDiv = document.getElementById('resultado-quiz');
        resDiv.classList.remove('hidden');
        document.getElementById('barras-resultado').innerHTML = `
            ${barra("Ciências e Tecnologias", pS, "bg-emerald-500")}
            ${barra("Socioeconómicas", pE, "bg-blue-500")}
            ${barra("Línguas e Humanidades", pH, "bg-purple-500")}
        `;

        let conselho = "Tens um perfil equilibrado. Segue o que te apaixona mais!";
        if(pS > pE && pS > pH) conselho = "O teu caminho parece ser a investigação ou engenharia. Ciências é para ti!";
        else if(pE > pS && pE > pH) conselho = "Números e estratégia são o teu forte. Economia espera por ti!";
        else if(pH > pS && pH > pE) conselho = "Tens um dom para a comunicação e análise social. Humanidades é o teu destino!";
        
        document.getElementById('conselho-final').textContent = conselho;
        window.scrollTo({ top: resDiv.offsetTop, behavior: 'smooth' });
    }

    function barra(titulo, perc, cor) {
        return `<div>
            <div class="flex justify-between mb-1 text-sm font-bold"><span>${titulo}</span><span>${perc}%</span></div>
            <div class="w-full bg-slate-200 dark:bg-slate-700 rounded-full h-4">
                <div class="${cor} h-4 rounded-full transition-all duration-1000" style="width: ${perc}%"></div>
            </div>
        </div>`;
    }

    function toggleDarkMode() {
        document.documentElement.classList.toggle('dark');
        const isDark = document.documentElement.classList.contains('dark');
        document.getElementById('dark-icon').textContent = isDark ? "☀️ Light Mode" : "🌙 Dark Mode";
        atualizarGrafico();
    }

    async function gerarPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a4');
        const container = document.getElementById('conteudo-principal');
        
        const canvas = await html2canvas(container, { scale: 2 });
        const imgData = canvas.toDataURL('image/png');
        
        const imgProps = doc.getImageProperties(imgData);
        const pdfWidth = doc.internal.pageSize.getWidth();
        const pdfHeight = (imgProps.height * pdfWidth) / imgProps.width;
        
        doc.addImage(imgData, 'PNG', 0, 0, pdfWidth, pdfHeight);
        doc.save('Relatorio_GradeMaster.pdf');
    }

    window.onload = init;
</script>
</body>
</html>
