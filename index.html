<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🦉 Codolingo - Duolingo de Código</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;family=Space+Grotesk:wght@500;600&display=swap');
        
        :root {
            --tw-color-primary: #22c55e;
        }
        
        * {
            font-family: 'Inter', system_ui, sans-serif;
        }
        
        .logo-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .duo-green {
            background: linear-gradient(135deg, #22c55e, #16a34a);
        }
        
        .card-hover {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
        }
        
        .editor {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
            line-height: 1.5;
            tab-size: 4;
        }
        
        .modal {
            animation: modalPop 0.3s ease;
        }
        
        @keyframes modalPop {
            0% { transform: scale(0.95); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body class="bg-zinc-950 text-white">
    <!-- NAVBAR -->
    <nav class="bg-zinc-900 border-b border-zinc-800 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-8 py-4 flex items-center justify-between">
            <!-- Logo -->
            <div class="flex items-center gap-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-2xl flex items-center justify-center text-3xl">🦉</div>
                <h1 class="logo-font text-3xl tracking-tighter text-white">codolingo</h1>
            </div>

            <!-- Stats -->
            <div class="flex items-center gap-x-8">
                <div onclick="showStreak()" class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-3xl cursor-pointer">
                    <span class="text-2xl">🔥</span>
                    <div>
                        <span id="streak-count" class="font-semibold text-xl">7</span>
                        <span class="text-zinc-400 text-sm ml-1">dias</span>
                    </div>
                </div>

                <div class="flex items-center gap-x-2 bg-zinc-800 hover:bg-zinc-700 px-5 py-2 rounded-3xl cursor-pointer">
                    <i class="fa-solid fa-gem text-yellow-400 text-2xl"></i>
                    <span id="xp-count" class="font-semibold text-xl">1240</span>
                    <span class="text-emerald-400 text-sm font-medium">XP</span>
                </div>

                <!-- Hearts -->
                <div class="flex items-center gap-x-1">
                    <i onclick="loseHeart()" class="fa-solid fa-heart text-red-500 text-3xl cursor-pointer"></i>
                    <i onclick="loseHeart()" class="fa-solid fa-heart text-red-500 text-3xl cursor-pointer"></i>
                    <i onclick="loseHeart()" class="fa-solid fa-heart text-red-500 text-3xl cursor-pointer"></i>
                    <i onclick="loseHeart()" class="fa-solid fa-heart text-red-500 text-3xl cursor-pointer"></i>
                    <i onclick="loseHeart()" class="fa-solid fa-heart text-red-500 text-3xl cursor-pointer"></i>
                </div>

                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-violet-500 rounded-2xl flex items-center justify-center text-xl">👨‍💻</div>
                    <div>
                        <p class="font-medium">DevAprendiz</p>
                        <p class="text-xs text-emerald-400">Nível 12</p>
                    </div>
                </div>
            </div>

            <!-- Navigation -->
            <div class="flex items-center gap-x-2 text-sm font-medium">
                <button onclick="navigate('dashboard')" 
                        class="nav-btn flex items-center gap-x-2 px-6 py-3 rounded-3xl hover:bg-white/10 transition-colors active">
                    <i class="fa-solid fa-house"></i>
                    <span>Início</span>
                </button>
                <button onclick="navigate('js')" 
                        class="nav-btn flex items-center gap-x-2 px-6 py-3 rounded-3xl hover:bg-white/10 transition-colors">
                    <span class="text-2xl">🟨</span>
                    <span>JavaScript</span>
                </button>
                <button onclick="navigate('python')" 
                        class="nav-btn flex items-center gap-x-2 px-6 py-3 rounded-3xl hover:bg-white/10 transition-colors">
                    <span class="text-2xl">🐍</span>
                    <span>Python</span>
                </button>
                <button onclick="navigate('profile')" 
                        class="nav-btn flex items-center gap-x-2 px-6 py-3 rounded-3xl hover:bg-white/10 transition-colors">
                    <i class="fa-solid fa-user"></i>
                    <span>Perfil</span>
                </button>
            </div>
        </div>
    </nav>

    <div class="max-w-screen-2xl mx-auto flex">
        <!-- SIDEBAR -->
        <div class="w-72 bg-zinc-900 min-h-[calc(100vh-73px)] border-r border-zinc-800 p-6 hidden lg:flex flex-col">
            <div class="mb-8">
                <h2 class="text-emerald-400 text-xs font-semibold tracking-widest mb-3">SEUS CURSOS</h2>
                <div onclick="navigate('js')" class="flex items-center gap-x-4 p-4 rounded-3xl hover:bg-zinc-800 cursor-pointer mb-2">
                    <div class="text-4xl">🟨</div>
                    <div class="flex-1">
                        <p class="font-semibold">JavaScript</p>
                        <div class="h-2 bg-zinc-700 rounded-full mt-2">
                            <div id="progress-js" class="h-2 bg-emerald-500 rounded-full w-3/4"></div>
                        </div>
                    </div>
                    <span class="text-sm font-medium text-emerald-400">75%</span>
                </div>
                <div onclick="navigate('python')" class="flex items-center gap-x-4 p-4 rounded-3xl hover:bg-zinc-800 cursor-pointer">
                    <div class="text-4xl">🐍</div>
                    <div class="flex-1">
                        <p class="font-semibold">Python</p>
                        <div class="h-2 bg-zinc-700 rounded-full mt-2">
                            <div id="progress-py" class="h-2 bg-emerald-500 rounded-full w-1/3"></div>
                        </div>
                    </div>
                    <span class="text-sm font-medium text-emerald-400">33%</span>
                </div>
            </div>

            <div class="mt-auto pt-8 border-t border-zinc-800">
                <div class="text-xs font-medium text-zinc-400 mb-4">PRÓXIMOS TESTES</div>
                <div class="space-y-4">
                    <div class="flex gap-x-3 text-sm">
                        <div class="text-2xl">🔥</div>
                        <div>
                            <p class="font-medium">Desafio Diário JS</p>
                            <p class="text-zinc-400 text-xs">Loops + Arrays</p>
                        </div>
                    </div>
                    <div class="flex gap-x-3 text-sm">
                        <div class="text-2xl">🐍</div>
                        <div>
                            <p class="font-medium">Desafio Diário Python</p>
                            <p class="text-zinc-400 text-xs">Funções + Listas</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mt-10 text-xs text-zinc-500 flex items-center gap-x-2">
                <i class="fa-solid fa-code"></i>
                <span>Feito com ❤️ por Grok para você</span>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div id="main-content" class="flex-1 p-8 overflow-auto">
            <!-- O conteúdo é carregado via JavaScript -->
        </div>
    </div>

    <!-- EXERCISE MODAL -->
    <div id="exercise-modal" onclick="if(event.target.id === 'exercise-modal') closeExercise()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[100]">
        <div onclick="event.stopImmediatePropagation()" 
             class="bg-zinc-900 w-full max-w-4xl mx-4 rounded-3xl overflow-hidden modal">
            
            <div class="px-8 pt-6 pb-4 border-b border-zinc-800 flex items-center justify-between">
                <div class="flex items-center gap-x-3">
                    <span id="exercise-lang-icon" class="text-3xl"></span>
                    <h2 id="exercise-title" class="text-2xl font-semibold"></h2>
                </div>
                <button onclick="closeExercise()" class="text-zinc-400 hover:text-white">
                    <i class="fa-solid fa-xmark text-3xl"></i>
                </button>
            </div>

            <div class="p-8">
                <p id="exercise-desc" class="text-zinc-300 text-lg mb-8"></p>
                
                <!-- Editor -->
                <div class="mb-6">
                    <div class="flex justify-between text-xs font-medium mb-2 text-zinc-400">
                        <span>SEU CÓDIGO</span>
                        <span id="lang-label" class="px-3 py-1 bg-zinc-800 rounded-2xl"></span>
                    </div>
                    <textarea id="code-editor" 
                              class="editor w-full h-72 bg-zinc-950 border border-zinc-700 focus:border-emerald-500 rounded-3xl p-6 text-emerald-200 text-base resize-none outline-none"></textarea>
                </div>

                <div class="flex gap-x-4">
                    <button onclick="runCode()" 
                            class="flex-1 bg-white text-zinc-900 font-semibold py-4 rounded-3xl flex items-center justify-center gap-x-3 hover:bg-emerald-100">
                        <i class="fa-solid fa-play"></i>
                        <span>TESTAR CÓDIGO</span>
                    </button>
                    
                    <button onclick="submitForAI()" 
                            class="flex-1 bg-emerald-500 hover:bg-emerald-600 font-semibold py-4 rounded-3xl flex items-center justify-center gap-x-3">
                        <i class="fa-solid fa-robot"></i>
                        <span>ENVIAR PARA A IA (Avaliar 0-10)</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- FEEDBACK MODAL -->
    <div id="feedback-modal" onclick="if(event.target.id === 'feedback-modal') hideFeedback()" 
         class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-[110]">
        <div class="bg-white text-zinc-900 w-full max-w-lg mx-4 rounded-3xl overflow-hidden modal p-8">
            <div class="flex justify-center mb-6">
                <div id="score-circle" class="w-32 h-32 rounded-full border-8 border-emerald-500 flex items-center justify-center text-5xl font-bold"></div>
            </div>
            
            <h2 id="feedback-title" class="text-center text-3xl font-semibold mb-2"></h2>
            <p id="feedback-subtitle" class="text-center text-zinc-500 mb-8"></p>
            
            <div id="feedback-text" class="bg-zinc-100 rounded-3xl p-6 text-lg leading-relaxed mb-8"></div>
            
            <div class="flex gap-x-4">
                <button onclick="retryExercise()" 
                        class="flex-1 border border-zinc-300 font-medium py-4 rounded-3xl">Tentar novamente</button>
                <button onclick="finishExercise()" 
                        class="flex-1 bg-emerald-500 text-white font-semibold py-4 rounded-3xl">Continuar →</button>
            </div>
            
            <p class="text-center text-xs text-zinc-400 mt-8">A IA Grok analisou seu código e deu esta nota!</p>
        </div>
    </div>

    <script>
        // ==================== CONFIGURAÇÃO TAILWIND ====================
        function initTailwind() {
            tailwind.config = {
                content: [],
                theme: {
                    extend: {}
                }
            }
        }

        // ==================== DADOS DO APP ====================
        let currentUser = {
            xp: 1240,
            streak: 7,
            hearts: 5,
            progressJS: 75,
            progressPY: 33
        }

        const courses = {
            js: {
                name: "JavaScript",
                emoji: "🟨",
                units: [
                    {
                        id: 1,
                        title: "Fundamentos Básicos",
                        completed: 3,
                        total: 5,
                        exercises: [
                            {
                                id: 101,
                                title: "Olá, Mundo!",
                                desc: "Escreva um código que imprima 'Olá, Mundo!' no console. É o primeiro passo de todo programador!",
                                type: "js",
                                template: `console.log("Olá, Mundo!");`,
                                expected: "Olá, Mundo!",
                                aiFeedbackGood: "Perfeito! Você entendeu o básico do console.log. Nota máxima!",
                                aiFeedbackBad: "Quase lá! O console.log precisa estar correto. Tente novamente."
                            },
                            {
                                id: 102,
                                title: "Soma de dois números",
                                desc: "Crie uma função chamada 'soma' que receba dois números e retorne a soma deles.",
                                type: "js",
                                template: `function soma(a, b) {\n  // seu código aqui\n  return a + b;\n}`,
                                expected: 8,
                                testCode: `soma(5, 3)`,
                                aiFeedbackGood: "Excelente! Sua função está limpa e correta. Isso é código profissional.",
                                aiFeedbackBad: "A função não retornou o valor certo. Verifique o return."
                            }
                        ]
                    }
                ]
            },
            python: {
                name: "Python",
                emoji: "🐍",
                units: [
                    {
                        id: 1,
                        title: "Fundamentos Básicos",
                        completed: 1,
                        total: 5,
                        exercises: [
                            {
                                id: 201,
                                title: "Olá, Mundo! (Python)",
                                desc: "Escreva um código que imprima 'Olá, Mundo!' usando print().",
                                type: "python",
                                template: `print("Olá, Mundo!")`,
                                aiFeedbackGood: "Muito bom! Python é simples e bonito. Você dominou o print!",
                                aiFeedbackBad: "Faltou o print() ou as aspas. Tente de novo!"
                            },
                            {
                                id: 202,
                                title: "Função de soma (Python)",
                                desc: "Crie uma função chamada 'soma' que some dois números.",
                                type: "python",
                                template: `def soma(a, b):\n    # seu código aqui\n    return a + b`,
                                aiFeedbackGood: "Perfeito! Python é ótimo para funções simples.",
                                aiFeedbackBad: "A indentação ou o return estão errados. Python é sensível a espaços!"
                            }
                        ]
                    }
                ]
            }
        }

        let currentExercise = null
        let currentLanguage = null

        // ==================== RENDERIZAÇÃO ====================
        function renderDashboard() {
            return `
            <div class="max-w-5xl mx-auto">
                <div class="mb-10">
                    <h1 class="text-5xl font-semibold logo-font tracking-tighter">Bom dia, DevAprendiz! 👋</h1>
                    <p class="text-zinc-400 text-xl">Vamos aprender JavaScript e Python hoje?</p>
                </div>

                <!-- Daily streak -->
                <div class="bg-gradient-to-r from-emerald-500 to-teal-600 text-white rounded-3xl p-8 flex items-center justify-between mb-10">
                    <div>
                        <div class="flex items-center gap-x-4">
                            <span class="text-6xl">🔥</span>
                            <div>
                                <p class="text-4xl font-bold">${currentUser.streak} dias</p>
                                <p class="text-xl">de sequência!</p>
                            </div>
                        </div>
                    </div>
                    <div class="text-right">
                        <p class="text-sm opacity-90">Continue assim e ganhe +50 XP amanhã</p>
                        <button onclick="claimDaily()" 
                                class="mt-4 bg-white text-emerald-600 px-8 py-3 rounded-3xl font-semibold">Pegar recompensa diária</button>
                    </div>
                </div>

                <!-- Progress cards -->
                <div class="grid grid-cols-2 gap-8">
                    <!-- JS Card -->
                    <div onclick="navigate('js')" class="bg-zinc-900 rounded-3xl p-8 card-hover cursor-pointer">
                        <div class="flex justify-between items-start">
                            <div class="text-7xl">🟨</div>
                            <div class="text-right">
                                <span class="inline-block px-4 py-1 bg-emerald-500 text-white text-sm font-medium rounded-3xl">${courses.js.progressJS || currentUser.progressJS}%</span>
                            </div>
                        </div>
                        <h3 class="text-3xl font-semibold mt-6">JavaScript</h3>
                        <p class="text-zinc-400">12 lições • 4 testes concluídos</p>
                        <div class="mt-8 h-3 bg-zinc-800 rounded-3xl">
                            <div class="h-3 bg-emerald-500 rounded-3xl" style="width: ${currentUser.progressJS}%"></div>
                        </div>
                    </div>

                    <!-- Python Card -->
                    <div onclick="navigate('python')" class="bg-zinc-900 rounded-3xl p-8 card-hover cursor-pointer">
                        <div class="flex justify-between items-start">
                            <div class="text-7xl">🐍</div>
                            <div class="text-right">
                                <span class="inline-block px-4 py-1 bg-emerald-500 text-white text-sm font-medium rounded-3xl">${courses.python.progressPY || currentUser.progressPY}%</span>
                            </div>
                        </div>
                        <h3 class="text-3xl font-semibold mt-6">Python</h3>
                        <p class="text-zinc-400">8 lições • 1 teste concluído</p>
                        <div class="mt-8 h-3 bg-zinc-800 rounded-3xl">
                            <div class="h-3 bg-emerald-500 rounded-3xl" style="width: ${currentUser.progressPY}%"></div>
                        </div>
                    </div>
                </div>

                <div class="mt-12">
                    <h3 class="font-medium text-xl mb-6 flex items-center gap-x-2">
                        <span>Próximos exercícios</span>
                        <span class="flex-1 h-px bg-gradient-to-r from-transparent via-zinc-700 to-transparent"></span>
                    </h3>
                    <div class="grid grid-cols-3 gap-6">
                        <div onclick="startExercise('js', 0, 0)" class="bg-zinc-900 p-6 rounded-3xl cursor-pointer card-hover">
                            <div class="flex justify-between"><span class="text-4xl">🟨</span><span class="text-emerald-400">Fácil</span></div>
                            <p class="mt-6 font-semibold">Olá, Mundo! em JavaScript</p>
                        </div>
                        <div onclick="startExercise('js', 0, 1)" class="bg-zinc-900 p-6 rounded-3xl cursor-pointer card-hover">
                            <div class="flex justify-between"><span class="text-4xl">🟨</span><span class="text-emerald-400">Médio</span></div>
                            <p class="mt-6 font-semibold">Função de soma em JavaScript</p>
                        </div>
                        <div onclick="startExercise('python', 0, 0)" class="bg-zinc-900 p-6 rounded-3xl cursor-pointer card-hover">
                            <div class="flex justify-between"><span class="text-4xl">🐍</span><span class="text-emerald-400">Fácil</span></div>
                            <p class="mt-6 font-semibold">Olá, Mundo! em Python</p>
                        </div>
                    </div>
                </div>
            </div>`
        }

        function renderJS() {
            let html = `<div class="max-w-5xl mx-auto"><h1 class="text-5xl font-semibold mb-2 flex items-center gap-x-4"><span class="text-6xl">🟨</span> JavaScript</h1><p class="text-emerald-400 text-2xl mb-10">Aprenda do zero ao avançado</p>`
            
            courses.js.units.forEach((unit, unitIndex) => {
                html += `
                <div class="mb-12">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-2xl">${unit.title}</h2>
                        <div class="text-sm bg-zinc-800 px-4 py-2 rounded-3xl">${unit.completed}/${unit.total} lições</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`
                
                unit.exercises.forEach((ex, exIndex) => {
                    html += `
                    <div onclick="startExercise('js', ${unitIndex}, ${exIndex})" 
                         class="bg-zinc-900 rounded-3xl p-6 card-hover cursor-pointer flex flex-col">
                        <div class="flex-1">
                            <p class="font-medium">${ex.title}</p>
                            <p class="text-sm text-zinc-400 line-clamp-2 mt-2">${ex.desc}</p>
                        </div>
                        <div class="mt-6 flex justify-end">
                            <span class="text-xs px-5 py-2 bg-emerald-500/10 text-emerald-400 rounded-3xl">Praticar agora</span>
                        </div>
                    </div>`
                })
                html += `</div></div>`
            })
            html += `</div>`
            return html
        }

        function renderPython() {
            let html = `<div class="max-w-5xl mx-auto"><h1 class="text-5xl font-semibold mb-2 flex items-center gap-x-4"><span class="text-6xl">🐍</span> Python</h1><p class="text-emerald-400 text-2xl mb-10">A linguagem mais amada do mundo</p>`
            
            courses.python.units.forEach((unit, unitIndex) => {
                html += `
                <div class="mb-12">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="font-semibold text-2xl">${unit.title}</h2>
                        <div class="text-sm bg-zinc-800 px-4 py-2 rounded-3xl">${unit.completed}/${unit.total} lições</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`
                
                unit.exercises.forEach((ex, exIndex) => {
                    html += `
                    <div onclick="startExercise('python', ${unitIndex}, ${exIndex})" 
                         class="bg-zinc-900 rounded-3xl p-6 card-hover cursor-pointer flex flex-col">
                        <div class="flex-1">
                            <p class="font-medium">${ex.title}</p>
                            <p class="text-sm text-zinc-400 line-clamp-2 mt-2">${ex.desc}</p>
                        </div>
                        <div class="mt-6 flex justify-end">
                            <span class="text-xs px-5 py-2 bg-emerald-500/10 text-emerald-400 rounded-3xl">Praticar agora</span>
                        </div>
                    </div>`
                })
                html += `</div></div>`
            })
            html += `</div>`
            return html
        }

        function renderProfile() {
            return `
            <div class="max-w-2xl mx-auto text-center pt-10">
                <div class="mx-auto w-28 h-28 bg-gradient-to-br from-violet-400 to-emerald-400 rounded-3xl flex items-center justify-center text-6xl mb-6">👨‍💻</div>
                <h1 class="text-4xl font-semibold">DevAprendiz</h1>
                <p class="text-emerald-400">Nível 12 • 1240 XP</p>
                
                <div class="mt-16 grid grid-cols-3 gap-6">
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <p class="text-5xl font-bold text-emerald-400">12</p>
                        <p class="text-sm text-zinc-400">Dias de streak</p>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <p class="text-5xl font-bold">47</p>
                        <p class="text-sm text-zinc-400">Exercícios feitos</p>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-8">
                        <p class="text-5xl font-bold text-amber-400">8.7</p>
                        <p class="text-sm text-zinc-400">Média das avaliações</p>
                    </div>
                </div>
                
                <p class="mt-20 text-zinc-400">Este é o seu Duolingo de código. Continue praticando e a IA vai te ajudar a melhorar a cada exercício!</p>
            </div>`
        }

        // ==================== NAVEGAÇÃO ====================
        function navigate(page) {
            const main = document.getElementById('main-content')
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'))
            
            if (page === 'dashboard') {
                main.innerHTML = renderDashboard()
            } else if (page === 'js') {
                main.innerHTML = renderJS()
                document.querySelectorAll('.nav-btn')[1].classList.add('active')
            } else if (page === 'python') {
                main.innerHTML = renderPython()
                document.querySelectorAll('.nav-btn')[2].classList.add('active')
            } else if (page === 'profile') {
                main.innerHTML = renderProfile()
            }
        }

        // ==================== EXERCÍCIOS ====================
        function startExercise(lang, unitIndex, exerciseIndex) {
            currentLanguage = lang
            const course = courses[lang]
            currentExercise = course.units[unitIndex].exercises[exerciseIndex]
            
            const modal = document.getElementById('exercise-modal')
            document.getElementById('exercise-lang-icon').innerHTML = course.emoji
            document.getElementById('exercise-title').textContent = currentExercise.title
            document.getElementById('exercise-desc').innerHTML = `<strong>Desafio:</strong> ${currentExercise.desc}`
            document.getElementById('lang-label').innerHTML = lang === 'js' ? 'JavaScript' : 'Python'
            document.getElementById('code-editor').value = currentExercise.template
            
            modal.classList.remove('hidden')
            modal.classList.add('flex')
        }

        function closeExercise() {
            const modal = document.getElementById('exercise-modal')
            modal.classList.add('hidden')
            modal.classList.remove('flex')
            currentExercise = null
        }

        // Executa o código (demo rápido)
        function runCode() {
            const code = document.getElementById('code-editor').value
            if (!currentExercise) return
            
            let result = "Código executado com sucesso!"
            
            if (currentExercise.type === 'js') {
                try {
                    // Simula execução JS
                    if (currentExercise.id === 101 && code.includes('Olá, Mundo!')) {
                        result = "✅ Console: Olá, Mundo!"
                    } else if (currentExercise.id === 102) {
                        // Testa função
                        const funcTest = new Function(code + `\nreturn ${currentExercise.testCode};`)
                        const output = funcTest()
                        if (output === currentExercise.expected) {
                            result = `✅ Sua função retornou ${output}`
                        } else {
                            result = `❌ Retornou ${output} (esperado 8)`
                        }
                    }
                    alert(result)
                } catch(e) {
                    alert("Erro no seu código JS: " + e.message)
                }
            } else {
                alert("🐍 Python simulado! No GitHub Pages não temos execução real de Python (mas no backend completo teremos).")
            }
        }

        // Avaliação completa com IA (simulada)
        function submitForAI() {
            if (!currentExercise) return
            
            const code = document.getElementById('code-editor').value.trim()
            let score = 0
            let feedback = ""
            let isGood = false
            
            // Lógica simples de avaliação
            if (currentExercise.type === 'js') {
                if (currentExercise.id === 101) {
                    isGood = code.includes('console.log') && code.includes('Olá, Mundo!')
                    score = isGood ? 10 : 4
                } else if (currentExercise.id === 102) {
                    try {
                        const testFunc = new Function(code + `\nreturn ${currentExercise.testCode};`)
                        const result = testFunc()
                        isGood = result === currentExercise.expected
                        score = isGood ? 10 : (result === 8 ? 9 : 3)
                    } catch(e) {
                        score = 2
                    }
                }
                feedback = isGood ? currentExercise.aiFeedbackGood : currentExercise.aiFeedbackBad
            } 
            else if (currentExercise.type === 'python') {
                // Simulação Python
                isGood = code.includes('print') || code.includes('def soma')
                score = isGood ? (code.length > 30 ? 10 : 8) : 5
                feedback = isGood ? currentExercise.aiFeedbackGood : currentExercise.aiFeedbackBad
            }
            
            // Atualiza XP
            if (score >= 8) {
                currentUser.xp += 50
                document.getElementById('xp-count').textContent = currentUser.xp
            }
            
            closeExercise()
            showFeedback(score, feedback, isGood)
        }

        function showFeedback(score, feedbackText, isGood) {
            const modal = document.getElementById('feedback-modal')
            const circle = document.getElementById('score-circle')
            
            circle.innerHTML = `
                <div class="text-center">
                    <div class="text-6xl">${score}</div>
                    <div class="text-xs tracking-widest font-medium -mt-2">/10</div>
                </div>
            `
            circle.style.borderColor = score >= 8 ? '#22c55e' : (score >= 5 ? '#eab308' : '#ef4444')
            
            document.getElementById('feedback-title').innerHTML = isGood ? 
                `🎉 Perfeito! <span class="text-emerald-500">+50 XP</span>` : 
                `Quase lá! Você tirou <span class="text-amber-500">${score}</span>`
            
            document.getElementById('feedback-subtitle').innerHTML = isGood ? 
                'A IA achou seu código limpo e correto!' : 
                'A IA corrigiu alguns pontos. Veja o feedback:'
            
            document.getElementById('feedback-text').innerHTML = `
                <strong>O que está bom:</strong> ${feedbackText}<br><br>
                <strong>Sugestão da IA:</strong> ${isGood ? 'Nada! Está ótimo.' : 'Tente usar mais nomes claros de variáveis e evitar repetição.'}
            `
            
            modal.classList.remove('hidden')
            modal.classList.add('flex')
        }

        function hideFeedback() {
            const modal = document.getElementById('feedback-modal')
            modal.classList.add('hidden')
            modal.classList.remove('flex')
        }

        function retryExercise() {
            hideFeedback()
            // Reabre o mesmo exercício
            if (currentExercise) {
                const modal = document.getElementById('exercise-modal')
                modal.classList.remove('hidden')
                modal.classList.add('flex')
            }
        }

        function finishExercise() {
            hideFeedback()
            // Atualiza progresso fake
            if (currentLanguage === 'js') currentUser.progressJS = Math.min(100, currentUser.progressJS + 15)
            else currentUser.progressPY = Math.min(100, currentUser.progressPY + 15)
            
            navigate(currentLanguage)
        }

        function loseHeart() {
            if (currentUser.hearts > 0) {
                currentUser.hearts--
                alert(`💔 Você perdeu 1 coração! Restam ${currentUser.hearts}`)
            }
        }

        function showStreak() {
            alert(`🔥 Sua sequência está em ${currentUser.streak} dias!\n\nContinue estudando todo dia para não perder!`)
        }

        function claimDaily() {
            currentUser.xp += 50
            currentUser.streak++
            document.getElementById('xp-count').textContent = currentUser.xp
            document.getElementById('streak-count').textContent = currentUser.streak
            alert("🎁 +50 XP e +1 dia de streak! Parabéns!")
        }

        // ==================== INICIALIZAÇÃO ====================
        window.onload = function() {
            initTailwind()
            navigate('dashboard')
            
            console.log('%c✅ Codolingo carregado com sucesso! Este é o seu Duolingo de Código completo.', 'color:#22c55e; font-size:13px')
            console.log('Copie este arquivo como index.html no GitHub e ative GitHub Pages. Quer um backend Node.js + Python real? É só pedir!')
        }
    </script>
</body>
</html>
