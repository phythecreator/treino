<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Avaliação Escolar - Sistema de Notas</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 30px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #e0e0e0;
            flex-wrap: wrap;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s;
            color: #666;
            font-weight: 500;
        }

        .tab:hover {
            color: #667eea;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .disciplinas-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
            max-height: 70vh;
            overflow-y: auto;
            padding: 5px;
        }

        .disciplina-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .disciplina-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .disciplina-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e0e0e0;
        }

        .disciplina-nome {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .disciplina-media {
            font-size: 1.2em;
            font-weight: bold;
            padding: 5px 12px;
            border-radius: 20px;
            background: white;
        }

        .media-excelente { color: #28a745; }
        .media-bom { color: #17a2b8; }
        .media-regular { color: #ffc107; }
        .media-insuficiente { color: #dc3545; }

        .testes-container {
            margin: 15px 0;
        }

        .testes-container strong {
            display: block;
            margin-bottom: 8px;
            color: #555;
        }

        .teste-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .teste-item span {
            min-width: 60px;
            font-size: 0.9em;
        }

        .teste-item input {
            flex: 1;
            padding: 6px 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 0.9em;
        }

        .btn-add-teste {
            background: #28a745;
            color: white;
            border: none;
            padding: 5px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
            margin-top: 5px;
        }

        .btn-remove-teste {
            background: #dc3545;
            color: white;
            border: none;
            padding: 4px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8em;
        }

        .comportamento-inputs {
            margin: 15px 0;
            padding: 12px;
            background: white;
            border-radius: 10px;
        }

        .comportamento-inputs strong {
            display: block;
            margin-bottom: 8px;
            color: #555;
        }

        .comportamento-inputs input {
            width: 100%;
            padding: 6px 10px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .comportamento-inputs label {
            font-size: 0.85em;
            color: #666;
            margin-bottom: 10px;
            display: block;
        }

        .questoes-input {
            margin: 10px 0;
        }

        .questoes-input strong {
            display: block;
            margin-bottom: 8px;
            color: #555;
        }

        .questoes-input input {
            width: 100%;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 8px;
        }

        .graficos-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            margin-top: 20px;
        }

        .grafico-card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        .grafico-card h3 {
            margin-bottom: 20px;
            color: #333;
        }

        canvas {
            max-height: 350px;
        }

        .resumo-geral {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .resumo-stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .stat {
            text-align: center;
            padding: 15px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
            margin-top: 5px;
        }

        .btn-salvar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.3s;
            margin-top: 20px;
            display: block;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .btn-salvar:hover {
            transform: scale(1.05);
        }

        .btn-reset {
            background: #dc3545;
            margin-top: 10px;
        }

        .footer {
            text-align: center;
            padding: 20px;
            background: #f8f9fa;
            color: #666;
            font-size: 0.9em;
        }

        @media (max-width: 768px) {
            .graficos-container {
                grid-template-columns: 1fr;
            }
            
            .disciplinas-grid {
                grid-template-columns: 1fr;
                max-height: 60vh;
            }
            
            .header h1 {
                font-size: 1.5em;
            }
            
            .tabs {
                gap: 5px;
            }
            
            .tab {
                padding: 8px 16px;
                font-size: 0.9em;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #888;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 Plataforma de Avaliação Escolar</h1>
            <p>Sistema completo de gestão de notas com cálculo de médias e gráficos de evolução</p>
        </div>

        <div class="content">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('notas')">📝 Lançar Notas</button>
                <button class="tab" onclick="switchTab('graficos')">📈 Gráficos & Evolução</button>
                <button class="tab" onclick="switchTab('resumo')">📋 Resumo Geral</button>
            </div>

            <div id="notas" class="tab-content active">
                <div class="disciplinas-grid" id="disciplinasContainer"></div>
                <div style="display: flex; gap: 15px; justify-content: center;">
                    <button class="btn-salvar" onclick="salvarTodasNotas()">💾 Salvar Todas as Notas</button>
                    <button class="btn-salvar btn-reset" onclick="resetarTodasNotas()">🔄 Resetar Tudo</button>
                </div>
            </div>

            <div id="graficos" class="tab-content">
                <div class="graficos-container">
                    <div class="grafico-card">
                        <h3>📊 Média por Disciplina</h3>
                        <canvas id="mediasChart"></canvas>
                    </div>
                    <div class="grafico-card">
                        <h3>📈 Evolução das Notas (Testes)</h3>
                        <canvas id="evolucaoChart"></canvas>
                    </div>
                </div>
            </div>

            <div id="resumo" class="tab-content">
                <div class="resumo-geral" id="resumoGeral"></div>
            </div>
        </div>

        <div class="footer">
            <p>✨ Sistema de Avaliação | Testes (60%) | Comportamento (20%) | Questões de Aula (20%)</p>
        </div>
    </div>

    <script>
        const disciplinas = [
            "Matemática", "Português", "Ciências", "Físico-Química",
            "Inglês", "Francês", "História", "Geografia"
        ];

        let dadosDisciplinas = {};

        function inicializarDados() {
            disciplinas.forEach(disciplina => {
                if (!dadosDisciplinas[disciplina]) {
                    dadosDisciplinas[disciplina] = {
                        testes: [5.0, 5.0],
                        comportamento: {
                            pontualidade: 5,
                            atitudes: 5,
                            empenho: 5
                        },
                        questoesAula: 5
                    };
                }
            });
        }

        function calcularMediaTestes(testes) {
            if (!testes || testes.length === 0) return 0;
            const soma = testes.reduce((acc, nota) => acc + nota, 0);
            return soma / testes.length;
        }

        function calcularMediaComportamento(comportamento) {
            return (comportamento.pontualidade + comportamento.atitudes + comportamento.empenho) / 3;
        }

        function calcularMediaFinal(disciplina) {
            const dados = dadosDisciplinas[disciplina];
            const mediaTestes = calcularMediaTestes(dados.testes);
            const mediaComportamento = calcularMediaComportamento(dados.comportamento);
            
            const notaFinal = (mediaTestes * 0.6) + (mediaComportamento * 0.2) + (dados.questoesAula * 0.2);
            return Math.round(notaFinal * 10) / 10;
        }

        function getMediaClass(media) {
            if (media >= 4.5) return 'media-excelente';
            if (media >= 3.5) return 'media-bom';
            if (media >= 2.5) return 'media-regular';
            return 'media-insuficiente';
        }

        function renderizarDisciplinas() {
            const container = document.getElementById('disciplinasContainer');
            if (!container) return;
            
            container.innerHTML = '';
            
            disciplinas.forEach(disciplina => {
                const dados = dadosDisciplinas[disciplina];
                const mediaFinal = calcularMediaFinal(disciplina);
                const mediaClass = getMediaClass(mediaFinal);
                const disciplinaId = disciplina.replace(/[^a-zA-Z]/g, '');
                
                const card = document.createElement('div');
                card.className = 'disciplina-card';
                card.innerHTML = `
                    <div class="disciplina-header">
                        <span class="disciplina-nome">${disciplina}</span>
                        <span class="disciplina-media ${mediaClass}">${mediaFinal.toFixed(1)}</span>
                    </div>
                    
                    <div class="testes-container">
                        <strong>📝 Testes (60%)</strong>
                        <div id="testes-${disciplinaId}">
                            ${renderizarTestes(disciplina, dados.testes)}
                        </div>
                        <button class="btn-add-teste" onclick="adicionarTeste('${disciplina}')">+ Adicionar Teste</button>
                    </div>
                    
                    <div class="comportamento-inputs">
                        <strong>👥 Comportamento (20%)</strong>
                        <input type="number" step="0.1" min="0" max="5" 
                               value="${dados.comportamento.pontualidade}" 
                               onchange="atualizarComportamento('${disciplina}', 'pontualidade', this.value)">
                        <label>Pontualidade (0-5)</label>
                        
                        <input type="number" step="0.1" min="0" max="5" 
                               value="${dados.comportamento.atitudes}" 
                               onchange="atualizarComportamento('${disciplina}', 'atitudes', this.value)">
                        <label>Atitudes e Valores (0-5)</label>
                        
                        <input type="number" step="0.1" min="0" max="5" 
                               value="${dados.comportamento.empenho}" 
                               onchange="atualizarComportamento('${disciplina}', 'empenho', this.value)">
                        <label>Empenho (0-5)</label>
                    </div>
                    
                    <div class="questoes-input">
                        <strong>📚 Questões de Aula (20%)</strong>
                        <input type="number" step="0.1" min="0" max="5" 
                               value="${dados.questoesAula}" 
                               onchange="atualizarQuestoes('${disciplina}', this.value)">
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderizarTestes(disciplina, testes) {
            let html = '';
            testes.forEach((nota, index) => {
                html += `
                    <div class="teste-item">
                        <span>Teste ${index + 1}:</span>
                        <input type="number" step="0.1" min="0" max="5" 
                               value="${nota}" 
                               onchange="atualizarTeste('${disciplina}', ${index}, this.value)">
                        <button class="btn-remove-teste" onclick="removerTeste('${disciplina}', ${index})">✖</button>
                    </div>
                `;
            });
            return html;
        }

        function adicionarTeste(disciplina) {
            dadosDisciplinas[disciplina].testes.push(5.0);
            renderizarDisciplinas();
            atualizarGraficosEResumo();
        }

        function removerTeste(disciplina, index) {
            if (dadosDisciplinas[disciplina].testes.length > 2) {
                dadosDisciplinas[disciplina].testes.splice(index, 1);
                renderizarDisciplinas();
                atualizarGraficosEResumo();
            } else {
                alert("⚠️ Mínimo de 2 testes é necessário!");
            }
        }

        function atualizarTeste(disciplina, index, valor) {
            const nota = parseFloat(valor);
            if (!isNaN(nota) && nota >= 0 && nota <= 5) {
                dadosDisciplinas[disciplina].testes[index] = nota;
                renderizarDisciplinas();
                atualizarGraficosEResumo();
            }
        }

        function atualizarComportamento(disciplina, campo, valor) {
            const nota = parseFloat(valor);
            if (!isNaN(nota) && nota >= 0 && nota <= 5) {
                dadosDisciplinas[disciplina].comportamento[campo] = nota;
                renderizarDisciplinas();
                atualizarGraficosEResumo();
            }
        }

        function atualizarQuestoes(disciplina, valor) {
            const nota = parseFloat(valor);
            if (!isNaN(nota) && nota >= 0 && nota <= 5) {
                dadosDisciplinas[disciplina].questoesAula = nota;
                renderizarDisciplinas();
                atualizarGraficosEResumo();
            }
        }

        let mediasChart, evolucaoChart;

        function atualizarGraficos() {
            const medias = disciplinas.map(d => calcularMediaFinal(d));
            const cores = medias.map(m => {
                if (m >= 4.5) return '#28a745';
                if (m >= 3.5) return '#17a2b8';
                if (m >= 2.5) return '#ffc107';
                return '#dc3545';
            });

            const ctx = document.getElementById('mediasChart');
            if (ctx) {
                if (mediasChart) {
                    mediasChart.data.datasets[0].data = medias;
                    mediasChart.data.datasets[0].backgroundColor = cores;
                    mediasChart.update();
                } else {
                    mediasChart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: disciplinas,
                            datasets: [{
                                label: 'Média Final (0-5)',
                                data: medias,
                                backgroundColor: cores,
                                borderColor: '#333',
                                borderWidth: 1
                            }]
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: 5,
                                    ticks: { stepSize: 1 }
                                }
                            }
                        }
                    });
                }
            }

            const todosTestes = disciplinas.map(d => dadosDisciplinas[d].testes);
            const maxTestes = Math.max(...todosTestes.map(t => t.length));
            
            const datasets = [];
            for (let i = 0; i < maxTestes; i++) {
                const mediasTeste = disciplinas.map((d, idx) => {
                    return dadosDisciplinas[d].testes[i] || null;
                });
                datasets.push({
                    label: `Teste ${i + 1}`,
                    data: mediasTeste,
                    borderColor: `hsl(${i * 60}, 70%, 50%)`,
                    backgroundColor: `hsla(${i * 60}, 70%, 50%, 0.1)`,
                    tension: 0.1,
                    fill: false
                });
            }

            const ctx2 = document.getElementById('evolucaoChart');
            if (ctx2) {
                if (evolucaoChart) {
                    evolucaoChart.data.datasets = datasets;
                    evolucaoChart.update();
                } else {
                    evolucaoChart = new Chart(ctx2, {
                        type: 'line',
                        data: {
                            labels: disciplinas,
                            datasets: datasets
                        },
                        options: {
                            responsive: true,
                            maintainAspectRatio: true,
                            scales: {
                                y: {
                                    beginAtZero: true,
                                    max: 5,
                                    ticks: { stepSize: 1 }
                                }
                            }
                        }
                    });
                }
            }
        }

        function atualizarResumo() {
            const medias = disciplinas.map(d => calcularMediaFinal(d));
            const mediaGeral = medias.reduce((a, b) => a + b, 0) / disciplinas.length;
            const aprovados = medias.filter(m => m >= 3.0).length;
            const excelentes = medias.filter(m => m >= 4.5).length;
            
            const melhorDisciplina = disciplinas[medias.indexOf(Math.max(...medias))];
            const piorDisciplina = disciplinas[medias.indexOf(Math.min(...medias))];
            
            let classificacao = '';
            if (mediaGeral >= 4.5) classificacao = '🏆 Excelente! Parabéns pelo desempenho excepcional!';
            else if (mediaGeral >= 3.5) classificacao = '👍 Bom trabalho! Continue se dedicando!';
            else if (mediaGeral >= 2.5) classificacao = '⚠️ Regular. Você precisa melhorar seu desempenho!';
            else classificacao = '❌ Insuficiente. É necessário muita dedicação para recuperar!';
            
            const resumoHTML = `
                <h2>📊 Resumo do Período</h2>
                <div class="resumo-stats">
                    <div class="stat">
                        <div class="stat-value">${mediaGeral.toFixed(1)}</div>
                        <div class="stat-label">Média Geral</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${aprovados}/8</div>
                        <div class="stat-label">Disciplinas Aprovadas</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${excelentes}</div>
                        <div class="stat-label">Disciplinas Excelentes</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${melhorDisciplina}</div>
                        <div class="stat-label">Melhor Disciplina</div>
                    </div>
                    <div class="stat">
                        <div class="stat-value">${piorDisciplina}</div>
                        <div class="stat-label">Disciplina a Melhorar</div>
                    </div>
                </div>
                <div style="margin-top: 20px; padding: 15px; background: rgba(255,255,255,0.1); border-radius: 10px;">
                    <h3>🎯 Classificação Geral:</h3>
                    <p style="font-size: 1.2em; margin-top: 10px;">${classificacao}</p>
                </div>
            `;
            
            const resumoElement = document.getElementById('resumoGeral');
            if (resumoElement) {
                resumoElement.innerHTML = resumoHTML;
            }
        }

        function atualizarGraficosEResumo() {
            atualizarGraficos();
            atualizarResumo();
        }

        function salvarTodasNotas() {
            localStorage.setItem('dadosDisciplinas', JSON.stringify(dadosDisciplinas));
            alert('✅ Todas as notas foram salvas com sucesso!');
        }

        function resetarTodasNotas() {
            if (confirm('⚠️ Tem certeza que deseja resetar todas as notas? Esta ação não pode ser desfeita!')) {
                dadosDisciplinas = {};
                inicializarDados();
                renderizarDisciplinas();
                atualizarGraficosEResumo();
                alert('🔄 Todas as notas foram resetadas para os valores padrão!');
            }
        }

        function carregarDados() {
            const dadosSalvos = localStorage.getItem('dadosDisciplinas');
            if (dadosSalvos) {
                dadosDisciplinas = JSON.parse(dadosSalvos);
            } else {
                inicializarDados();
            }
        }

        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab').forEach(tab => {
                tab.classList.remove('active');
            });
            
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
            
            if (tabName === 'graficos') {
                setTimeout(() => atualizarGraficos(), 100);
            } else if (tabName === 'resumo') {
                atualizarResumo();
            }
        }

        carregarDados();
        renderizarDisciplinas();
        atualizarGraficosEResumo();
    </script>
</body>
</html>
