<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxFinder — O teu próximo vício no Roblox</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           UI GAMER MODERNA (DARK MODE)
           ========================================= */
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #00b0f0; /* Azul Roblox */
            --accent-hover: #008ecc;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Outfit', sans-serif; }
        body { background: var(--bg); color: var(--text-main); min-height: 100vh; padding-bottom: 50px; }

        /* CABEÇALHO */
        header { text-align: center; padding: 60px 20px 40px; background: linear-gradient(180deg, rgba(0,176,240,0.05) 0%, var(--bg) 100%); }
        header h1 { font-size: clamp(2.5rem, 5vw, 4rem); font-weight: 900; letter-spacing: -1px; margin-bottom: 10px; }
        header h1 span { color: var(--accent); }
        header p { color: var(--text-muted); font-size: 1.1rem; }

        /* PESQUISA E FILTROS */
        .controls-container { max-width: 900px; margin: 0 auto 40px; padding: 0 20px; }
        
        .search-bar { 
            display: flex; background: var(--card-bg); border: 2px solid #334155; 
            border-radius: 16px; padding: 12px 25px; margin-bottom: 25px; transition: 0.3s;
        }
        .search-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 20px rgba(0,176,240,0.15); }
        .search-bar i { color: var(--text-muted); font-size: 20px; margin-top: 5px; margin-right: 15px; }
        .search-bar input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }

        .filters { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
        .btn-filter { 
            background: var(--card-bg); color: var(--text-main); border: 1px solid #334155; 
            padding: 8px 20px; border-radius: 50px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.3s;
        }
        .btn-filter:hover { border-color: var(--accent); }
        .btn-filter.active { background: var(--accent); color: white; border-color: var(--accent); box-shadow: 0 5px 15px rgba(0,176,240,0.3); }

        /* GRELHA DE JOGOS */
        .games-grid { 
            display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); 
            gap: 25px; max-width: 1200px; margin: 0 auto; padding: 0 20px;
        }
        
        .game-card { 
            background: var(--card-bg); border-radius: 20px; overflow: hidden; 
            border: 1px solid #334155; transition: 0.3s; display: flex; flex-direction: column;
        }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 15px 30px rgba(0,0,0,0.4); }
        
        .game-img { width: 100%; height: 160px; object-fit: cover; background: #000; border-bottom: 1px solid #334155; }
        .game-info { padding: 20px; flex: 1; display: flex; flex-direction: column; }
        .game-title { font-size: 20px; font-weight: 800; margin-bottom: 8px; }
        .game-desc { font-size: 14px; color: var(--text-muted); margin-bottom: 20px; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        
        .game-meta { display: flex; justify-content: space-between; align-items: center; margin-top: auto; }
        .tag { background: rgba(0,176,240,0.1); color: var(--accent); padding: 5px 12px; border-radius: 8px; font-size: 11px; font-weight: 800; text-transform: uppercase; }
        .play-btn { background: white; color: var(--bg); padding: 8px 15px; border-radius: 10px; font-size: 13px; font-weight: 800; transition: 0.3s; text-decoration: none; }
        .game-card:hover .play-btn { background: var(--accent); color: white; }

        /* ESTADO VAZIO */
        .no-results { text-align: center; grid-column: 1 / -1; padding: 50px; color: var(--text-muted); font-size: 1.2rem; }
    </style>
</head>
<body>

    <header>
        <h1>Blox<span>Finder</span></h1>
        <p>A maior base de dados de recomendações Roblox. O que queres jogar hoje?</p>
    </header>

    <div class="controls-container">
        <div class="search-bar">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Pesquisa por nome do jogo (ex: Blox Fruits)..." onkeyup="filterGames()">
        </div>

        <div class="filters" id="filterButtons">
            <button class="btn-filter active" onclick="setCategory('Todos', this)">Todos</button>
            <button class="btn-filter" onclick="setCategory('Ação', this)">Ação & Luta</button>
            <button class="btn-filter" onclick="setCategory('Tycoon', this)">Tycoon</button>
            <button class="btn-filter" onclick="setCategory('Terror', this)">Terror</button>
            <button class="btn-filter" onclick="setCategory('RPG', this)">Roleplay (RPG)</button>
            <button class="btn-filter" onclick="setCategory('Simulador', this)">Simulador</button>
            <button class="btn-filter" onclick="setCategory('Anime', this)">Anime</button>
        </div>
    </div>

    <div class="games-grid" id="gamesContainer"></div>

    <script>
        // A TUA BASE DE DADOS GIGANTE!
        // Podes copiar os blocos { } e adicionar os teus 500 jogos aqui dentro.
        const robloxGames = [
            // --- AÇÃO E LUTA ---
            { title: "Arsenal", category: "Ação", desc: "Um jogo de tiros FPS super rápido. Ganha assistências, sobe de nível e usa armas malucas para vencer.", img: "https://tr.rbxcdn.com/153a81f3e7ed2cdab31ba7dc1ed406ff/768/432/Image/Png" },
            { title: "Phantom Forces", category: "Ação", desc: "Um dos FPS táticos mais avançados do Roblox. Dezenas de armas, mapas e modos de jogo.", img: "https://tr.rbxcdn.com/5df6b53995f7ef57d9f78ea2252a12aa/768/432/Image/Png" },
            { title: "BedWars", category: "Ação", desc: "Protege a tua cama e destrói as dos inimigos num jogo de estratégia e combate acelerado.", img: "https://tr.rbxcdn.com/f0ee3e8e1da4ecf3da3b48f6c58cf312/768/432/Image/Png" },
            { title: "Blade Ball", category: "Ação", desc: "Usa o timing perfeito para rebater uma bola teleguiada que fica cada vez mais rápida. Muito viciante!", img: "https://tr.rbxcdn.com/00ddbd62f23ec08d098a586821d3f99d/768/432/Image/Png" },
            { title: "Da Hood", category: "Ação", desc: "Um jogo de sobrevivência e combate nas ruas. Sê um polícia ou junta-te ao crime.", img: "https://tr.rbxcdn.com/068a73a6e9dc7da3fce19f201e74f4b2/768/432/Image/Png" },

            // --- ANIME ---
            { title: "Blox Fruits", category: "Anime", desc: "Torna-te um mestre espadachim ou usa frutas mágicas. O jogo mais famoso da plataforma!", img: "https://tr.rbxcdn.com/83917812cd892b15e3b624ea80cb6dc1/768/432/Image/Png" },
            { title: "Anime Defenders", category: "Anime", desc: "Um Tower Defense incrível com as tuas personagens de anime favoritas.", img: "https://tr.rbxcdn.com/12e84c98e2183c500ab435cebc61d15c/768/432/Image/Png" },
            { title: "All Star Tower Defense", category: "Anime", desc: "Usa lutadores de anime para defender a tua base contra hordas de inimigos.", img: "https://tr.rbxcdn.com/c6f7b1dfdf8de3b53f6da64b971a938c/768/432/Image/Png" },
            { title: "Shindo Life", category: "Anime", desc: "Mundo aberto focado em ninjas. Aprende jutsus, explora aldeias e luta com amigos.", img: "https://tr.rbxcdn.com/71d184a44b9d0ab080dd6d8ebda3b593/768/432/Image/Png" },
            { title: "Anime Dimensions", category: "Anime", desc: "Viaja por diferentes dimensões de animes e derrota bosses épicos para ganhares personagens.", img: "https://tr.rbxcdn.com/2ce2f96cf9efab6ebdf7f0559648c66e/768/432/Image/Png" },

            // --- TERROR ---
            { title: "DOORS", category: "Terror", desc: "Avança por 100 portas de um hotel amaldiçoado. Cada monstro tem mecânicas diferentes.", img: "https://tr.rbxcdn.com/39e99a224f2b0bb62b0e68e0d4bb272a/768/432/Image/Png" },
            { title: "Piggy", category: "Terror", desc: "Sobrevive a monstros assustadores enquanto tentas resolver puzzles para escapar do mapa.", img: "https://tr.rbxcdn.com/2d5db0df2b77c5ff0dded5a230f5ecb8/768/432/Image/Png" },
            { title: "Evade", category: "Terror", desc: "Corre pelas tuas vidas de 'Nextbots' gigantes que te perseguem implacavelmente.", img: "https://tr.rbxcdn.com/a42cd9a6de0a876ce37c0ebec91f6bb6/768/432/Image/Png" },
            { title: "Apeirophobia", category: "Terror", desc: "Preso nas Backrooms. Explora salas infinitas e foge de entidades misteriosas. Puzzle e terror.", img: "https://tr.rbxcdn.com/d5b5465d64a2a1b9d40b0ce1952e50cf/768/432/Image/Png" },
            { title: "The Mimic", category: "Terror", desc: "Criado com base em lendas urbanas japonesas. Gráficos incríveis e muitos sustos.", img: "https://tr.rbxcdn.com/0c4a4f808f921d7bcf054199c23af23b/768/432/Image/Png" },

            // --- RPG / ROLEPLAY ---
            { title: "Brookhaven 🏡RP", category: "RPG", desc: "Constrói a tua casa, escolhe carros e vive a tua vida ideal. O rei do Roleplay no Roblox.", img: "https://tr.rbxcdn.com/1ce0be2bc0c210416b08e2858b90cbf3/768/432/Image/Png" },
            { title: "Adopt Me!", category: "RPG", desc: "Adota pets raros, decora a tua casa e faz trocas (trades) com outros jogadores.", img: "https://tr.rbxcdn.com/8cb372c3dff5b4f620bd3c59a60e0cc1/768/432/Image/Png" },
            { title: "Welcome to Bloxburg", category: "RPG", desc: "Trabalha, ganha dinheiro e constrói mansões épicas detalhe a detalhe.", img: "https://tr.rbxcdn.com/9dc0d5b7dc490e54d6fb26fbfabeb642/768/432/Image/Png" },
            { title: "Livetopia", category: "RPG", desc: "Explora uma cidade gigante com comboios, aeroportos, trabalhos fantásticos e segredos escondidos.", img: "https://tr.rbxcdn.com/c6c39179d67efbbbcda4483a90100d2d/768/432/Image/Png" },
            { title: "MeepCity", category: "RPG", desc: "Socializa, personaliza a tua casa e adota Meeps super divertidos.", img: "https://tr.rbxcdn.com/1be0ecff06e6ed4dd17e9b0d1e5ec600/768/432/Image/Png" },

            // --- SIMULADORES ---
            { title: "Pet Simulator 99!", category: "Simulador", desc: "Coleciona milhares de pets incríveis, desbloqueia mundos gigantes e quebra moedas.", img: "https://tr.rbxcdn.com/97486e92110c7bf26f1c4df1ecbdde71/768/432/Image/Png" },
            { title: "Bee Swarm Simulator", category: "Simulador", desc: "Cria um enxame de abelhas único, recolhe pólen e faz missões de ursos gigantes.", img: "https://tr.rbxcdn.com/182a3d0ed1501c5cc15d9cc03dc15e8d/768/432/Image/Png" },
            { title: "Driving Empire", category: "Simulador", desc: "Conduz hipercarros realistas, participa em corridas e explora um mapa imenso.", img: "https://tr.rbxcdn.com/cf66cc6dfa9c4e20ef935825206ab450/768/432/Image/Png" },
            { title: "Weapon Fighting Simulator", category: "Simulador", desc: "Usa feitiços e armas espirituais para derrotar bosses e subir de rank.", img: "https://tr.rbxcdn.com/5df4696fb32ed24b81c4e9f74075f8f5/768/432/Image/Png" },
            { title: "Strongman Simulator", category: "Simulador", desc: "Puxa objetos super pesados para ficares cada vez maior e mais forte.", img: "https://tr.rbxcdn.com/b4b574164bba55db29a3a7f80db721eb/768/432/Image/Png" },

            // --- TYCOON ---
            { title: "Theme Park Tycoon 2", category: "Tycoon", desc: "Constrói o teu próprio parque de diversões. Cria montanhas russas incrivelmente detalhadas.", img: "https://tr.rbxcdn.com/391c53ce20dff0c5268c1f016bd9860b/768/432/Image/Png" },
            { title: "Restaurant Tycoon 2", category: "Tycoon", desc: "Gere o teu restaurante, cozinha pratos de todo o mundo e contrata empregados.", img: "https://tr.rbxcdn.com/7936a267d6056ceafde52f01f0545f1b/768/432/Image/Png" },
            { title: "My Restaurant!", category: "Tycoon", desc: "Atende clientes VIP num restaurante focado na gestão rápida e design eficiente.", img: "https://tr.rbxcdn.com/12bd1d0337c7674ed4a96b3d16279f57/768/432/Image/Png" },
            { title: "Tropical Resort Tycoon", category: "Tycoon", desc: "Cria um resort de luxo numa ilha tropical com helicópteros e motas de água.", img: "https://tr.rbxcdn.com/c6f7b1dfdf8de3b53f6da64b971a938c/768/432/Image/Png" },
            { title: "Lumber Tycoon 2", category: "Tycoon", desc: "Um clássico! Corta árvores, processa a madeira e constrói a tua base.", img: "https://tr.rbxcdn.com/466faebc7eaad12b18c991b1cd896803/768/432/Image/Png" }
        ];

        let currentCategory = 'Todos';

        // Função para Renderizar os Jogos no Ecrã
        function renderGames(games) {
            const container = document.getElementById('gamesContainer');
            container.innerHTML = ''; // Limpa antes de colocar os novos

            if (games.length === 0) {
                container.innerHTML = `<div class="no-results"><i class="fas fa-ghost" style="font-size: 40px; margin-bottom: 15px;"></i><br>Não encontrámos nenhum jogo com esse nome.</div>`;
                return;
            }

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <img src="${game.img}" alt="${game.title}" class="game-img">
                    <div class="game-info">
                        <h3 class="game-title">${game.title}</h3>
                        <p class="game-desc">${game.desc}</p>
                        <div class="game-meta">
                            <span class="tag">${game.category}</span>
                            <a href="https://www.roblox.com/search/experiences?keyword=${encodeURIComponent(game.title)}" target="_blank" class="play-btn">Jogar</a>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Função para Mudar a Categoria no Botão
        function setCategory(category, buttonElement) {
            currentCategory = category;
            
            // Muda a cor do botão ativo
            document.querySelectorAll('.btn-filter').forEach(btn => btn.classList.remove('active'));
            buttonElement.classList.add('active');
            
            filterGames();
        }

        // Função Mestre de Filtro (Pesquisa de Texto + Categoria)
        function filterGames() {
            const searchText = document.getElementById('searchInput').value.toLowerCase();
            
            const filtered = robloxGames.filter(game => {
                const matchName = game.title.toLowerCase().includes(searchText);
                const matchCategory = (currentCategory === 'Todos' || game.category === currentCategory);
                return matchName && matchCategory;
            });

            renderGames(filtered);
        }

        // Arranca o site a mostrar todos os jogos
        renderGames(robloxGames);
    </script>
</body>
</html>
